 {t:"Malware types & removal", h:`
  <p>Know each by behavior:</p>
  <table class="ports">
   <tr><td class="mono">Virus</td><td>attaches to a file, runs when opened</td></tr>
   <tr><td class="mono">Worm</td><td>self-replicates across a network, no host file needed</td></tr>
   <tr><td class="mono">Trojan</td><td>disguised as legit software</td></tr>
   <tr><td class="mono">Ransomware</td><td>encrypts data and demands payment</td></tr>
   <tr><td class="mono">Rootkit</td><td>hides deep in the OS, hard to detect</td></tr>
   <tr><td class="mono">Keylogger</td><td>records keystrokes</td></tr>
   <tr><td class="mono">Spyware</td><td>secretly collects info</td></tr>
   <tr><td class="mono">Cryptominer</td><td>hijacks CPU/GPU to mine coins</td></tr>
  </table>
  <p><b>The 7-step malware-removal process, in order</b> (memorize it — it's a classic exam question):</p>
  <ol>
   <li>Investigate and verify symptoms.</li>
   <li>Quarantine the infected system.</li>
   <li>Disable System Restore (in Windows).</li>
   <li>Remediate: update anti-malware, then scan and remove (safe mode / pre-installation environment).</li>
   <li>Schedule scans and run updates.</li>
   <li>Enable System Restore and create a fresh restore point.</li>
   <li>Educate the end user.</li>
  </ol>`},
 {t:"Social engineering, threats & vulnerabilities", h:`
  <p><b>Social engineering</b> targets people, not systems:</p>
  <table class="ports">
   <tr><td class="mono">Phishing</td><td>fraudulent email; <b>spear</b> = targeted, <b>whaling</b> = execs</td></tr>
   <tr><td class="mono">Vishing / smishing</td><td>by voice call / by SMS text</td></tr>
   <tr><td class="mono">Shoulder surfing</td><td>watching you enter credentials</td></tr>
   <tr><td class="mono">Tailgating</td><td>following someone through a secure door</td></tr>
   <tr><td class="mono">Impersonation</td><td>pretending to be staff/authority</td></tr>
   <tr><td class="mono">Dumpster diving</td><td>digging through trash for info</td></tr>
   <tr><td class="mono">Evil twin</td><td>rogue Wi-Fi AP mimicking a real one</td></tr>
  </table>
  <p><b>Network attacks:</b> DoS/DDoS, spoofing, on-path (man-in-the-middle), brute force, dictionary, zero-day, and insider threats. <b>Vulnerabilities:</b> unpatched/non-compliant systems, EOL software, and unprotected BYOD devices.</p>`},
 {t:"Wireless security & authentication", h:`
  <p><b>Wireless encryption (best to worst):</b> <span class="kw">WPA3</span> &gt; <span class="kw">WPA2</span> (AES/CCMP) &gt; WPA (TKIP, weak) &gt; WEP (broken — never use). On the exam, "use stronger security" almost always means WPA2 or WPA3.</p>
  <p><b>Authentication:</b> <span class="kw">RADIUS</span> and <span class="kw">TACACS+</span> centralize login (AAA) for networks and devices; <span class="kw">Kerberos</span> is the domain authentication protocol. <span class="kw">MFA</span> (multifactor) combines factors: something you know (password), have (token/phone), and are (biometric). Reuse the AAA idea from Core 1 here.</p>`},
 {t:"Windows security settings", h:`
  <p><b>Defender Antivirus</b> and the <b>Windows Firewall</b> are built in. Manage accounts in <b>Users and Groups</b>; follow <span class="kw">least privilege</span> (standard user for daily work, admin only when needed).</p>
  <p><b>NTFS vs. share permissions:</b> NTFS permissions apply locally and over the network; share permissions only apply over the network. When they conflict, the <b>most restrictive</b> effective permission wins.</p>
  <p><span class="kw">UAC</span> (User Account Control) prompts before privileged actions. <span class="kw">BitLocker</span> encrypts whole drives (uses TPM); <span class="kw">EFS</span> encrypts individual files. Sign-in options include PIN, password, and biometrics.</p>`},
 {t:"Hardening workstations & SOHO", h:`
  <p><b>Workstation hardening:</b> strong/unique passwords and a lockout policy, disable AutoRun/AutoPlay, remove or disable unused accounts (rename/disable the default admin and guest), keep the OS and apps patched, and use account-management best practices like screen-lock timeouts.</p>
  <p><b>SOHO router hardening:</b> change default admin credentials, update firmware, use WPA2/WPA3, disable WPS, turn off remote management/UPnP if not needed, change the default SSID, and segment guests onto a guest network.</p>
  <p><b>Data destruction:</b> physical (shred, drill, degauss) for true destruction; or a secure wipe/standard format + overwrite before reuse. Recycling a drive without wiping it leaks data.</p>`},
 {t:"Browser & data security", h:`
  <p><b>Browser security:</b> verify <span class="kw">HTTPS</span> (valid certificate) before entering credentials, install extensions only from trusted stores, use a password manager, enable pop-up and ad/script blocking, and clear cache/cookies when troubleshooting. Watch for typo-squatted or look-alike domains.</p>
  <p><b>Protecting data in motion and at rest:</b> encryption (BitLocker/EFS, full-disk on mobile), VPNs for remote access, and MFA on accounts. Recognize <span class="kw">PII</span> (personal data) and regulated data like <span class="kw">PCI</span> (cards) and healthcare info that demand extra care.</p>`},
],
3:[
 {t:"Windows OS problems", h:`
  <p>Symptom → likely fix:</p>
  <ul>
   <li><b>BSOD / spontaneous restart</b> → bad driver, failing hardware (RAM), or recent update; check Event Viewer and roll back.</li>
   <li><b>Boot fails / "no OS found"</b> → boot order, corrupt boot files (<span class="mono">bootrec</span>), or a dead drive; try Startup Repair in the recovery environment.</li>
   <li><b>Slow performance</b> → too many startup apps, low disk space, malware, or a failing drive; use Task Manager and <span class="mono">sfc /scannow</span>.</li>
   <li><b>Services won't start / frequent crashes</b> → check dependencies and logs; repair system files.</li>
   <li><b>Profile won't load / corrupt profile</b> → rebuild the user profile.</li>
  </ul>
  <p><b>Recovery toolkit:</b> Safe Mode, System Restore, Startup Repair, <span class="mono">sfc</span>, <span class="mono">chkdsk</span>, Reset this PC, and (last resort) reimage/reinstall. Practice these in a VM with a snapshot so you can roll back.</p>`},
 {t:"Malware symptoms & PC security issues", h:`
  <p><b>Red flags of infection:</b> pop-ups and redirected searches, unexpected new toolbars/extensions, slow system, high disk/CPU/network with no cause, disabled antivirus/Task Manager, renamed or missing files, and altered certificates or invalid cert warnings.</p>
  <p><b>Response:</b> follow the 7-step removal process (verify → quarantine → disable System Restore → remediate in safe mode → schedule scans → re-enable System Restore → educate). Disconnect from the network early to stop spread, and never trust the infected machine's own tools to confirm it's clean.</p>`},
 {t:"Mobile OS, app & security issues", h:`
  <ul>
   <li><b>App won't install/launch or crashes</b> → not enough storage, OS too old, or corrupt app data; update/clear cache/reinstall.</li>
   <li><b>Fast battery drain / overheating</b> → a rogue app, poor signal forcing high power, or background sync; check battery usage stats.</li>
   <li><b>No connectivity</b> → toggle airplane mode, forget/re-join Wi-Fi, re-pair Bluetooth, check APN/cellular.</li>
   <li><b>Slow/laggy or frozen</b> → close apps, free storage, reboot, update the OS.</li>
  </ul>
  <p><b>Mobile security symptoms:</b> high data usage, unexpected app permissions, fake/leaked notifications, unauthorized account access, or unusual battery drain can indicate malware or a compromised account. Remedies: update the OS, remove suspicious apps, change passwords, and as a last resort factory-reset or remote-wipe.</p>`},
],
4:[
 {t:"Documentation & change management", h:`
  <p><b>Documentation a tech relies on:</b> ticketing systems, asset management/inventory, a knowledge base, standard operating procedures (SOPs), network topology diagrams, acceptable-use policies (AUP), and incident reports.</p>
  <p><b>Change management</b> reduces the risk of breaking production. The pieces: a documented <span class="kw">request</span>, the <span class="kw">purpose</span> and <span class="kw">scope</span>, a <span class="kw">risk analysis</span>, approval from a change board, a <span class="kw">rollback/backout plan</span>, an end-user acceptance step, and a scheduled maintenance window. The big idea: <b>plan and get approval before you change anything important.</b></p>`},
 {t:"Backups & recovery", h:`
  <p><b>Backup types:</b></p>
  <table class="ports">
   <tr><td class="mono">Full</td><td>everything every time; fastest restore, most storage</td></tr>
   <tr><td class="mono">Incremental</td><td>only what changed since the last backup; small/fast backups, slower restore (needs the chain)</td></tr>
   <tr><td class="mono">Differential</td><td>everything changed since the last full; bigger than incremental, simpler restore</td></tr>
   <tr><td class="mono">Synthetic</td><td>combines a full with later increments into a new full</td></tr>
  </table>
  <p>Follow the <span class="kw">3-2-1 rule</span>: three copies, on two different media, one off-site. And always <b>test restores</b> — a backup you've never restored is a guess. Know on-site vs. off-site/cloud and backup rotation (e.g. grandfather-father-son).</p>`},
 {t:"Safety & environment", h:`
  <p><b>Personal/equipment safety:</b> use an <span class="kw">ESD strap</span> and mat to protect components, unplug before servicing, discharge stored power (don't open a PSU or CRT — capacitors hold lethal charge), and lift with your legs.</p>
  <p><b>Environmental:</b> read the <span class="kw">SDS</span> (safety data sheet, formerly MSDS) for any chemical or battery; control temperature and humidity (humidity too low → more ESD); and protect against power problems with a <span class="kw">surge suppressor</span> and a <span class="kw">UPS</span> (battery backup for clean shutdown). Dispose of batteries, toner, and CRTs per local regulations.</p>`},
 {t:"Privacy, licensing & policy", h:`
  <p><b>Regulated/sensitive data:</b> <span class="kw">PII</span> (personally identifiable info), <span class="kw">PHI</span> (health), and <span class="kw">PCI</span> (payment cards) all require careful handling. Know <b>GDPR</b>-style data-privacy obligations at a high level.</p>
  <p><b>Licensing:</b> understand the <span class="kw">EULA</span>, the difference between <b>open-source</b> and <b>commercial/proprietary</b> licenses, personal vs. enterprise (volume) licensing, and <span class="kw">DRM</span>. Use valid, non-expired licenses.</p>
  <p><b>Incident response:</b> preserve evidence and maintain <span class="kw">chain of custody</span>, document the incident, and report through the proper channels. First responders don't tamper with evidence.</p>`},
 {t:"Communication & professionalism", h:`
  <p>The "soft skills" CompTIA tests as right-vs-wrong behavior: use clear language and <b>avoid jargon</b> with end users, actively listen and don't interrupt, be on time and set realistic expectations, maintain a positive attitude, and keep customer information <b>private and confidential</b>.</p>
  <p>Handle a difficult customer by staying calm, not arguing or being defensive, not minimizing their problem, and not taking calls or texting while working with them. Always follow up afterward to confirm satisfaction.</p>`},
 {t:"Scripting fundamentals", h:`
  <p>You won't write complex code on the exam, but you should read a simple script and know the building blocks.</p>
  <ul>
   <li><b>Variables</b> hold values you reuse; a <span class="kw">data type</span> is what kind of value it is (text/string, whole number/integer, true-false/boolean).</li>
   <li><b>Environment variables</b> are system-wide values scripts can read, like <span class="mono">%USERNAME%</span> or <span class="mono">%PATH%</span> on Windows.</li>
   <li><b>Comments</b> (<span class="mono">#</span> or <span class="mono">REM</span>) are notes the computer ignores — they explain what the script does.</li>
   <li><b>Conditionals</b> (<span class="mono">if</span>) run code only when something is true; <b>loops</b> (<span class="mono">for</span>/<span class="mono">while</span>) repeat code until a condition is met.</li>
  </ul>
  <p><b>Good use cases:</b> automating backups, mapping network drives at login, installing apps across many machines, and routine maintenance. <b>Risks to respect:</b> a buggy script can change the wrong system settings, crash systems, create runaway resource use, or loop forever — always test on one machine (or a VM snapshot) before running it widely.</p>`},
 {t:"Script file types & remote access", h:`
  <p><b>Script file types:</b></p>
  <table class="ports">
   <tr><td class="mono">.bat</td><td>Windows batch</td></tr>
   <tr><td class="mono">.ps1</td><td>PowerShell</td></tr>
   <tr><td class="mono">.sh</td><td>shell (Linux/macOS)</td></tr>
   <tr><td class="mono">.py</td><td>Python</td></tr>
   <tr><td class="mono">.js</td><td>JavaScript</td></tr>
   <tr><td class="mono">.vbs</td><td>VBScript (legacy)</td></tr>
  </table>
  <p>Scripts automate tasks like backups, drive mapping, and app installs — but a bad script can cause mistakes, loops, or resource exhaustion, so test safely. <b>Remote access:</b> <span class="kw">RDP</span> (Remote Desktop), <span class="kw">VPN</span>, <span class="kw">SSH</span>, <span class="kw">VNC</span>, <span class="kw">MSRA</span> (Quick Assist), and <span class="kw">RMM</span> tools — each trades off security and convenience; prefer encrypted options.</p>`},
],
};

const QUESTIONS2 = [{"d":1,"q":"A user needs to store a single 6 GB video file on a USB drive that will also be read on a Mac. Which file system should you use?","o":["FAT32","NTFS","exFAT","ext4"],"c":2,"e":"exFAT handles files larger than 4 GB and is readable by both Windows and macOS. FAT32 caps single files at 4 GB. NTFS is Windows-native (macOS reads it but can't write by default). ext4 is a Linux file system."},{"d":1,"q":"Which Windows edition is the minimum required to join an Active Directory domain?","o":["Home","Pro","Enterprise","Education"],"c":1,"e":"Windows Pro is the lowest edition that can join a domain. Home can only join workgroups. Enterprise and Education can also join domains but Pro is the minimum."},{"d":1,"q":"A technician wants to view system and application error logs to diagnose a recurring crash. Which tool should they open?","o":["Task Scheduler (taskschd)","Event Viewer (eventvwr)","Device Manager (devmgmt)","Performance Monitor (perfmon)"],"c":1,"e":"Event Viewer (eventvwr) collects system, application, and security logs. Task Scheduler runs automated tasks, Device Manager manages hardware/drivers, and Performance Monitor tracks live metrics."},{"d":1,"q":"Which command repairs corrupted protected Windows system files?","o":["chkdsk","sfc /scannow","gpupdate","diskpart"],"c":1,"e":"sfc /scannow (System File Checker) scans and repairs protected OS files. chkdsk checks the disk's file system, gpupdate refreshes Group Policy, and diskpart manages partitions."},{"d":1,"q":"A Windows 11 installation fails on otherwise capable hardware. Which requirement is the most likely cause?","o":["A spinning HDD instead of an SSD","Missing TPM 2.0 / Secure Boot","Less than 16 GB of RAM","An AMD instead of Intel CPU"],"c":1,"e":"Windows 11 requires TPM 2.0 and UEFI Secure Boot. Storage type, exact RAM beyond the 4 GB minimum, and CPU vendor aren't the blocking requirement here."},{"d":1,"q":"Which command displays and lets you renew a Windows client's IP configuration?","o":["netstat","nslookup","ipconfig","hostname"],"c":2,"e":"ipconfig shows IP settings and supports /release and /renew. netstat lists connections, nslookup queries DNS, and hostname prints the computer name."},{"d":1,"q":"A partition scheme is needed for a 4 TB boot drive on a UEFI system. Which should you choose?","o":["MBR","GPT","FAT","Dynamic"],"c":1,"e":"GPT supports drives larger than 2 TB and pairs with UEFI. MBR is limited to 2 TB and four primary partitions. FAT is a file system, not a partition scheme; 'dynamic' is a disk type, not the partition style asked for."},{"d":1,"q":"On Linux, which command changes a file's permissions?","o":["chown","chmod","grep","ps"],"c":1,"e":"chmod changes permission modes. chown changes ownership, grep searches text, and ps lists processes."},{"d":1,"q":"A technician wants to keep all installed applications and personal files while moving from Windows 10 to Windows 11. Which method fits?","o":["Clean install","In-place upgrade","Reimage","Reset this PC (remove everything)"],"c":1,"e":"An in-place upgrade preserves apps and files. A clean install, reimage, and 'remove everything' reset all wipe installed applications."},{"d":1,"q":"Which utility lets you control which programs launch automatically at startup?","o":["regedit","Task Manager (Startup tab)","dxdiag","Disk Management"],"c":1,"e":"Task Manager's Startup tab enables/disables startup programs (msconfig also historically did this). regedit edits the registry, dxdiag reports graphics info, and Disk Management handles partitions."},{"d":1,"q":"Which macOS feature provides automated, scheduled backups to an external drive?","o":["Keychain","Spotlight","Time Machine","Mission Control"],"c":2,"e":"Time Machine performs scheduled backups. Keychain stores passwords, Spotlight is search, and Mission Control manages windows/desktops."},{"d":1,"q":"A Linux admin needs to install a package from the distribution's repository on a Debian/Ubuntu system. Which tool is appropriate?","o":["yum","apt","brew","chmod"],"c":1,"e":"apt is the Debian/Ubuntu package manager. yum/dnf are used on Red Hat-based systems, brew is for macOS, and chmod changes permissions."},{"d":2,"q":"Malware encrypts a user's files and displays a message demanding payment for the decryption key. What type is this?","o":["Rootkit","Ransomware","Keylogger","Worm"],"c":1,"e":"Ransomware encrypts data and demands payment. A rootkit hides itself, a keylogger records keystrokes, and a worm self-replicates across networks."},{"d":2,"q":"What is the correct first step of the malware-removal process?","o":["Disable System Restore","Quarantine the system","Investigate and verify symptoms","Educate the end user"],"c":2,"e":"You first investigate and verify the symptoms to confirm malware. Then quarantine, disable System Restore, remediate, schedule scans, re-enable System Restore, and finally educate the user."},{"d":2,"q":"An attacker sends a text message pretending to be the bank to trick a user into revealing a code. What is this attack called?","o":["Phishing","Vishing","Smishing","Whaling"],"c":2,"e":"Smishing is phishing over SMS text. Phishing is generic (usually email), vishing is by voice call, and whaling targets high-value executives."},{"d":2,"q":"Which wireless security option should a technician choose for the strongest protection on a modern network?","o":["WEP","WPA","WPA2","WPA3"],"c":3,"e":"WPA3 is the newest and strongest. WPA2 (AES) is still acceptable, WPA (TKIP) is weak, and WEP is broken and should never be used."},{"d":2,"q":"A standard user gets a UAC prompt when trying to install software. What security principle does this enforce?","o":["Least privilege","Defense in depth","Non-repudiation","Implicit deny"],"c":0,"e":"UAC enforces least privilege by requiring elevation for administrative actions, so users run with minimal rights by default. The others are related security concepts but not what UAC primarily demonstrates."},{"d":2,"q":"On the same folder, a user's NTFS permission is Read and the share permission is Full Control over the network. What is the effective network access?","o":["Full Control","Read","Modify","No access"],"c":1,"e":"When NTFS and share permissions combine, the most restrictive effective permission applies. Read (NTFS) is more restrictive than Full Control (share), so the user gets Read over the network."},{"d":2,"q":"A rogue access point is set up to imitate a legitimate company SSID to capture traffic. This is known as a(n):","o":["On-path attack","Evil twin","Tailgating","Zero-day"],"c":1,"e":"An evil twin is a malicious AP impersonating a real one. An on-path attack intercepts traffic between two parties, tailgating is following someone through a secure door, and a zero-day exploits an unknown flaw."},{"d":2,"q":"Which technology encrypts an entire Windows drive and can use the TPM to protect the key?","o":["EFS","BitLocker","Defender","UAC"],"c":1,"e":"BitLocker encrypts whole volumes and integrates with the TPM. EFS encrypts individual files, Defender is antivirus, and UAC controls privilege elevation."},{"d":2,"q":"What is the best way to ensure data on a failed hard drive cannot be recovered before disposal?","o":["Quick format the drive","Delete the partition","Physically shred or degauss the drive","Move files to the Recycle Bin and empty it"],"c":2,"e":"Physical destruction (shred/drill/degauss) makes data unrecoverable. Formatting, deleting partitions, and emptying the Recycle Bin leave data that can be recovered, especially on a drive being discarded."},{"d":2,"q":"Before entering credentials on a banking website, which indicator best confirms the connection is secure?","o":["The page loads quickly","The URL begins with https and has a valid certificate","The site has a professional logo","The browser is up to date"],"c":1,"e":"HTTPS with a valid certificate confirms an encrypted, authenticated connection. Load speed, logos, and browser version don't verify the site's legitimacy or encryption."},{"d":2,"q":"A SOHO router still uses its factory admin password. What is the most important hardening step?","o":["Hide the SSID","Change the default administrator credentials","Lower the Wi-Fi transmit power","Disable the guest network"],"c":1,"e":"Default credentials are widely known and the top risk, so change them first. Hiding the SSID is weak security, reducing power and disabling guest networks are minor by comparison."},{"d":2,"q":"Which authentication approach requires something you know plus something you have?","o":["Single sign-on","Multifactor authentication","Least privilege","Federation"],"c":1,"e":"Multifactor authentication combines factors from different categories (e.g., password + phone token). SSO is one login for many services, least privilege limits rights, and federation shares identity across organizations."},{"d":2,"q":"Users in a building are tricked into letting an unknown person follow them through a badge-controlled door. What is this?","o":["Shoulder surfing","Dumpster diving","Tailgating","Impersonation"],"c":2,"e":"Tailgating is following an authorized person through a secure entrance. Shoulder surfing is watching credential entry, dumpster diving is searching trash, and impersonation is posing as someone with authority."},{"d":3,"q":"A Windows PC repeatedly shows a blue screen shortly after a recent driver update. What is the best first action?","o":["Reinstall Windows","Roll back the driver","Replace the motherboard","Run a full disk defragment"],"c":1,"e":"A BSOD right after a driver update points at that driver; roll it back first. Reinstalling Windows or replacing hardware is premature, and defragmenting won't address a driver fault."},{"d":3,"q":"Windows won't boot and reports missing operating system. Which recovery tool should you try first?","o":["Startup Repair in the recovery environment","Format the system drive","Replace the RAM","Disable the firewall"],"c":0,"e":"Startup Repair attempts to fix boot files automatically and is the least destructive first step. Formatting destroys data, replacing RAM is unrelated to boot files, and the firewall has nothing to do with booting."},{"d":3,"q":"A computer has become very slow. Task Manager shows the disk at 100% with no obvious heavy app. Which is the most likely cause to investigate?","o":["The monitor refresh rate","Malware or a failing drive","The keyboard driver","The default web browser"],"c":1,"e":"Sustained 100% disk with no clear app commonly indicates malware activity or a failing/overwhelmed drive. Refresh rate, keyboard driver, and browser choice don't cause constant disk saturation."},{"d":3,"q":"To safely scan and remove stubborn malware that loads with Windows, which environment is most effective?","o":["Normal mode with antivirus","Safe Mode or a preinstallation environment","BIOS/UEFI setup","A guest user account"],"c":1,"e":"Safe Mode or a preinstallation environment loads minimal components so persistent malware can't run and block removal. Normal mode lets it interfere, and BIOS/guest accounts don't run malware scans."},{"d":3,"q":"During malware remediation, why should System Restore be disabled before cleaning?","o":["It speeds up the scan","Restore points can harbor the infection","It frees disk space permanently","It is required to install updates"],"c":1,"e":"Restore points can contain copies of the malware, so they're disabled (and purged) during cleanup, then re-enabled with a fresh point afterward. The other reasons are incorrect."},{"d":3,"q":"A user's phone app crashes immediately on launch after working for months. Which step is the best first try?","o":["Factory reset the phone","Clear the app's cache/data or reinstall it","Replace the battery","Disable Wi-Fi"],"c":1,"e":"Clearing the app's cache/data or reinstalling resolves most single-app crashes with the least disruption. A factory reset is a last resort, and battery or Wi-Fi aren't the cause of one app crashing."},{"d":3,"q":"Which symptom most strongly suggests a mobile device may be compromised rather than simply low on battery?","o":["Slightly dimmer screen","Unexpectedly high data usage and unknown app permissions","A cracked screen protector","Slower charging on an old cable"],"c":1,"e":"Unexplained high data usage plus unfamiliar app permissions point to malware or a compromised account. A dim screen, cracked protector, or slow charging are hardware/cosmetic, not security indicators."},{"d":3,"q":"A technician needs to verify a malware-infected machine is no longer spreading on the network during cleanup. What should they do early?","o":["Disconnect it from the network","Defragment the drive","Update the BIOS","Increase the page file"],"c":0,"e":"Disconnecting (quarantining) stops the malware from spreading or communicating. Defragmenting, BIOS updates, and page-file changes don't contain an infection."},{"d":3,"q":"After many failed Windows updates, services fail to start and files seem corrupt. Which command-line repair is appropriate before reinstalling?","o":["ping","sfc /scannow","tracert","hostname"],"c":1,"e":"sfc /scannow repairs corrupted protected system files and is a sensible step before a full reinstall. ping/tracert test networking and hostname just prints the name."},{"d":4,"q":"Following the 3-2-1 backup rule, how many total copies of data should you keep?","o":["One","Two","Three","Five"],"c":2,"e":"3-2-1 means three copies of the data, on two different media types, with one copy off-site."},{"d":4,"q":"Which backup type captures only the data changed since the last full backup, and is simpler to restore than incremental?","o":["Differential","Incremental","Synthetic","Snapshot"],"c":0,"e":"A differential backup includes everything changed since the last full backup, so restoring needs only the full plus the latest differential. Incremental backups need the full plus every increment in the chain."},{"d":4,"q":"A technician is about to deploy a major configuration change to production servers. Which step should happen first?","o":["Apply the change immediately to save time","Get approval and document a rollback plan","Delete old backups to free space","Disable monitoring during the change"],"c":1,"e":"Change management requires documenting the change, obtaining approval, and having a rollback/backout plan before implementing. Rushing, deleting backups, or disabling monitoring all increase risk."},{"d":4,"q":"Which precaution best protects sensitive components from electrostatic discharge while servicing a PC?","o":["Work on carpet for grip","Wear an ESD wrist strap connected to ground","Keep the room very dry","Use a magnetized screwdriver"],"c":1,"e":"An ESD wrist strap safely equalizes charge to ground. Carpet and low humidity increase static, and a magnetized screwdriver can risk data on drives and doesn't address ESD."},{"d":4,"q":"What document should a technician consult for safe handling and disposal of a leaking battery or chemical?","o":["EULA","SDS (Safety Data Sheet)","SOP","Change request"],"c":1,"e":"The SDS (formerly MSDS) details safe handling, storage, and disposal of hazardous materials. A EULA is a license agreement, an SOP is a procedure, and a change request documents a change."},{"d":4,"q":"Which device provides battery backup so a server can shut down cleanly during a power outage?","o":["Surge suppressor","Power strip","UPS","PDU"],"c":2,"e":"A UPS (uninterruptible power supply) supplies battery power during outages for a clean shutdown. A surge suppressor only blocks spikes, a power strip just adds outlets, and a basic PDU distributes power without battery backup."},{"d":4,"q":"While handling evidence after a security incident, what must be maintained to keep the evidence admissible?","o":["Chain of custody","An open-source license","A maintenance window","A differential backup"],"c":0,"e":"Chain of custody documents who handled evidence and when, preserving its integrity. The other items are unrelated to evidence handling."},{"d":4,"q":"A customer becomes upset and starts venting about an unrelated problem. What is the most professional response?","o":["Interrupt to correct them","Take a personal call to wait it out","Listen actively and avoid being defensive","Tell them the issue isn't your job"],"c":2,"e":"Professionalism calls for active listening, staying calm, and not being defensive or dismissive. Interrupting, taking calls mid-service, and brushing off the customer are all poor practice."},{"d":4,"q":"Which file extension indicates a PowerShell script?","o":[".bat",".sh",".ps1",".vbs"],"c":2,"e":".ps1 is PowerShell. .bat is Windows batch, .sh is a shell script for Linux/macOS, and .vbs is VBScript."},{"d":4,"q":"A remote support tool must give a technician encrypted, full control of a Windows desktop across the internet. Which is most appropriate?","o":["Telnet","RDP over a VPN","FTP","SMTP"],"c":1,"e":"RDP (encrypted), ideally tunneled through a VPN, provides secure remote desktop control. Telnet is unencrypted, while FTP and SMTP are for file transfer and email, not remote control."},{"d":4,"q":"What is the main risk of running an untested automation script on production systems?","o":["It always improves performance","It could cause errors, loops, or resource exhaustion","It encrypts the drive automatically","It updates the BIOS"],"c":1,"e":"A flawed script can introduce mistakes, infinite loops, or consume resources, so test in a safe environment first. The other options are not inherent script behaviors."},{"d":4,"q":"Which regulated data category specifically covers payment card information?","o":["PII","PHI","PCI","DRM"],"c":2,"e":"PCI (Payment Card Industry) data covers cardholder information. PII is general personal data, PHI is protected health information, and DRM is digital rights management."},{"d":4,"q":"A help desk wants a consistent record of issues, steps taken, and resolutions for future reference. Which tool best supports this?","o":["A ticketing system with a knowledge base","A personal sticky-note system","Disabling logging to save space","Verbal handoffs only"],"c":0,"e":"A ticketing system plus a knowledge base creates searchable, consistent documentation. Sticky notes, disabling logs, and verbal-only handoffs lose information and aren't repeatable."},{"d":4,"q":"In a script, what does an environment variable such as %USERNAME% represent?","o":["A comment the system ignores","A system-provided value the script can read","A loop that repeats code","A type of remote-access protocol"],"c":1,"e":"Environment variables are system-wide values (like the current user or PATH) that scripts can read. Comments are ignored notes, loops repeat code, and remote access is unrelated."},{"d":4,"q":"Which scripting construct repeats a block of code until a condition is met?","o":["A variable","A comment","A loop","A data type"],"c":2,"e":"A loop (for/while) repeats code. A variable stores a value, a comment is an ignored note, and a data type describes what kind of value something is."},{"d":4,"q":"What is the safest practice before running a new maintenance script on many production machines?","o":["Run it everywhere at once to save time","Test it on a single machine or VM snapshot first","Delete the backups first","Disable antivirus during the run"],"c":1,"e":"Testing on one machine or a VM snapshot limits the blast radius if the script misbehaves. Mass-running untested code, deleting backups, and disabling antivirus all increase risk."},{"d":1,"q":"A Windows application needs to connect to a SQL database. Which Control Panel/admin tool configures that connection?","o":["Data Sources (ODBC)","Device Manager","Disk Management","Event Viewer"],"c":0,"e":"ODBC Data Sources sets up connections between Windows applications and databases. Device Manager handles hardware, Disk Management handles partitions, and Event Viewer shows logs."},{"d":1,"q":"A technician wants a single console that includes Disk Management, Device Manager, Event Viewer, and Services together. Which tool fits?","o":["Task Manager","Computer Management","Registry Editor","Control Panel"],"c":1,"e":"Computer Management bundles those snap-ins in one console. Task Manager shows live processes/performance, the Registry Editor edits the registry, and Control Panel holds individual applets."},{"d":1,"q":"Which macOS feature provides full-disk encryption, similar to BitLocker on Windows?","o":["Time Machine","Keychain","FileVault","Spotlight"],"c":2,"e":"FileVault encrypts the entire macOS startup disk. Time Machine is backups, Keychain stores passwords, and Spotlight is search."},{"d":1,"q":"Which Control Panel applet is used to uninstall a desktop application in Windows?","o":["Programs and Features","Indexing Options","Power Options","Sound"],"c":0,"e":"Programs and Features lists installed apps and lets you uninstall or change them. Indexing Options tunes search, Power Options manages sleep/battery, and Sound configures audio."},{"d":2,"q":"A targeted phishing attack aimed specifically at a company's senior executives is known as what?","o":["Smishing","Whaling","Vishing","Scareware"],"c":1,"e":"Whaling targets high-value individuals like executives. Smishing is by text, vishing is by phone call, and scareware tricks users with fake alerts."},{"d":2,"q":"Malware that secretly records the websites a user visits and the keystrokes they type is best described as what?","o":["Spam","Spyware","Adware","A worm"],"c":1,"e":"Spyware covertly collects activity like browsing history and keystrokes. Spam is unsolicited messaging, adware shows ads, and a worm self-replicates."},{"d":2,"q":"An organization wants to block employees from reaching gambling and social-media websites by category. Which control does this?","o":["Port security","Content filtering","A loopback plug","NTP"],"c":1,"e":"Content filtering blocks websites by category or URL. Port security limits switch ports, a loopback plug tests ports, and NTP syncs time."},{"d":2,"q":"To configure a client computer to use a proxy server, which information must you provide?","o":["The proxy's MAC address only","The proxy server's IP address and port number","The local computer's MAC address","The administrator's password on the local PC"],"c":1,"e":"A client needs the proxy's IP address and the port it listens on. MAC addresses and local admin passwords aren't what point a client at a proxy."},{"d":2,"q":"What is the purpose of a screened subnet (DMZ)?","o":["To speed up the internal LAN","To host public-facing servers while isolating them from the internal network","To assign IP addresses automatically","To encrypt all internal traffic"],"c":1,"e":"A screened subnet/DMZ places internet-facing services in a buffer zone separated from the internal LAN by firewall rules, limiting exposure if they're breached."},{"d":2,"q":"Nobody on the network can ping a particular Windows computer, though it works fine otherwise. Which tool most likely controls this behavior?","o":["Windows Defender Firewall","Disk Management","Task Scheduler","Device Manager"],"c":0,"e":"By default the Windows firewall can block incoming ICMP (ping). Adjusting a firewall rule allows the pings. The other tools don't govern ping responses."},{"d":2,"q":"What is the difference between a local security policy and a domain (group) policy?","o":["They are identical","A local policy applies to one computer; a domain policy is centrally managed and can apply to many computers and users","A local policy requires the internet","A domain policy only applies to printers"],"c":1,"e":"A local security policy affects only that single machine, while a domain/group policy is managed centrally and pushed to many users and computers."},{"d":2,"q":"An unexpected email claiming to be from your bank asks you to click a link and verify your account details. What type of attack is this?","o":["Phishing","A denial-of-service attack","Spyware","A VPN"],"c":0,"e":"This is phishing: a fraudulent message designed to trick you into revealing credentials. The others are not message-based credential traps."},{"d":4,"q":"A bank forbids any changes to customer-data systems during the last week of each month while statements are generated. Which change-management term describes this?","o":["Emergency change","Change freeze","Risk analysis","Rollback plan"],"c":1,"e":"A change freeze blocks changes during a sensitive period. Emergency changes are urgent fixes, risk analysis evaluates impact, and a rollback plan reverts a failed change."},{"d":4,"q":"A project plan lists scope, responsibilities, due dates, and quality checkpoints, but provides no way to undo the change if it fails. What is missing?","o":["A backout (rollback) plan","A network diagram","An asset tag","A surge suppressor"],"c":0,"e":"A backout/rollback plan describes how to revert if the change goes wrong, and it's the missing element here."},{"d":4,"q":"Which part of the change-management process evaluates whether a proposed change is worth implementing?","o":["Scope definition","Risk analysis","Backout plan","End-user acceptance"],"c":1,"e":"Risk analysis weighs the benefits against the potential downsides to decide if the change should proceed."},{"d":4,"q":"Which class of fire extinguisher is appropriate for an electrical fire?","o":["Class A","Class C","Class D","Class K"],"c":1,"e":"Class C extinguishers are rated for energized electrical fires (an ABC-rated extinguisher also covers them). Class A is for ordinary combustibles, D for metals, K for cooking oils."},{"d":4,"q":"You pull the fire alarm, everyone evacuates, and you grab an extinguisher for a small printer fire. Using the PASS method, what is the first action?","o":["Aim the nozzle at the base of the fire","Pull the safety pin","Squeeze the handle","Sweep side to side"],"c":1,"e":"PASS = Pull, Aim, Squeeze, Sweep. You first pull the safety pin, then aim, squeeze, and sweep."},{"d":4,"q":"Which device protects equipment from a power increase (a surge) but does NOT help during a power decrease or outage?","o":["UPS","Surge suppressor","Battery backup","Generator"],"c":1,"e":"A surge suppressor blocks spikes but provides no power during a sag or outage. A UPS/battery backup keeps equipment running through an outage."},{"d":4,"q":"What is the safest way to clean up spilled laser toner?","o":["Wipe it with moist paper towels","Blow it away with a hair dryer","Use a vacuum equipped with a HEPA filter","Brush it off with your hand"],"c":2,"e":"A HEPA-filter vacuum safely captures the ultra-fine toner particles. Moisture, blowing, or hands spread the toner and can cause it to smear or become airborne."},{"d":4,"q":"What is a safety risk associated with old or damaged batteries?","o":["They can leak corrosive chemicals","They become magnetic","They emit radio waves","All sizes become interchangeable"],"c":0,"e":"Aging or damaged batteries can leak corrosive electrolyte and, with lithium types, pose fire risk. This is why they require careful handling and proper disposal."},{"d":4,"q":"What is the proper way to dispose of old PCs, monitors, toner cartridges, and batteries?","o":["Place them in normal household trash","Take them to an approved e-waste recycling or municipal collection point","Burn them","Bury them on site"],"c":1,"e":"Electronics and batteries contain hazardous materials and must go to approved recycling or municipal collection, not landfill or incineration."},{"d":4,"q":"A user asks for help downloading and installing software on a corporate laptop. Which IT document governs whether this is allowed?","o":["Network topology diagram","Acceptable use policy (AUP)","Inventory report","Incident report"],"c":1,"e":"The AUP defines what users may and may not do with company equipment, including installing software."},{"d":4,"q":"Which two items are most associated with IT inventory/asset management?","o":["Asset tags and barcodes","Firewalls and proxies","Surge suppressors and UPS units","SSIDs and VLANs"],"c":0,"e":"Asset tags and barcodes track and identify equipment in inventory management. The other pairs relate to security, power, and networking."},{"d":4,"q":"When first dealing with an angry, confrontational customer, what is the best initial response?","o":["Argue your point firmly","Take a breath and stay calm before responding","Immediately escalate to a supervisor","End the call"],"c":1,"e":"Staying calm and composed first keeps the situation from escalating. Arguing inflames it, and escalating or hanging up should not be the immediate reflex."},{"d":1,"q":"Which Windows built-in tool is designed to capture a screenshot?","o":["Notepad","Snip & Sketch","Microsoft Edge","Disk Cleanup"],"c":1,"e":"Snip & Sketch (and the Snipping Tool) captures screenshots. Notepad edits text, Edge is a browser, and Disk Cleanup frees space."},{"d":1,"q":"Which simple Windows application can create a plain text (.txt) file?","o":["Notepad","Paint","Calculator","Task Manager"],"c":0,"e":"Notepad is the basic plain-text editor. Paint is for images, Calculator does math, and Task Manager manages processes."}];</script>

const EXTRA_QUESTIONS1 = [{"d":3,"q":"Match each part with the correct description.\n____ motherboard\n____ RAM\n____ DVD drive\n____ hard drive\n____ adapter\n____ power supply\nChoices:\nA. Converts AC to DC.\nB. Holds the most data.\nC. Has the most electronics.\nD. Fits in an expansion slot.\nE. Contents disappear when power is off.\nF. Holds a disc.","o":["motherboard = F\nRAM = C\nDVD drive = B\nhard drive = E\nadapter = A\npower supply = D","motherboard = C\nRAM = E\nDVD drive = F\nhard drive = B\nadapter = D\npower supply = A","motherboard = D\nRAM = C\nDVD drive = A\nhard drive = F\nadapter = B\npower supply = E","motherboard = D\nRAM = E\nDVD drive = F\nhard drive = A\nadapter = B\npower supply = C"],"c":1,"e":"Correct mapping:\nmotherboard = C\nRAM = E\nDVD drive = F\nhard drive = B\nadapter = D\npower supply = A\n\nSource note: Extra file category 1 Introduction to the World of IT, Q1.","src":"extra-reworded"},{"d":3,"q":"A technician has been asked to provide support to an administrative assistant who is participating in a video conference session. Which peripheral would be used in the conference more than in normal daily tasks?","o":["mouse","hard drive","all-in-one printer","webcam"],"c":3,"e":"Correct answer: D. webcam\n\nSource note: Extra file category 1 Introduction to the World of IT, Q2.","src":"extra-reworded"},{"d":3,"q":"Which options are important suggested internet search tips? (Choose two.)","o":["Use as many common words—such as the, in, at, or for—as possible.","Avoid using the name of the equipment manufacturer.","Try another search engine if the first one does not provide satisfactory results.","Put quotation marks around two or more words that might be found consecutively in output.","Use as few words as possible."],"c":[2,3],"e":"Correct answers: C, D. C. Try another search engine if the first one does not provide satisfactory results.; D. Put quotation marks around two or more words that might be found consecutively in output.\n\nSource note: Extra file category 1 Introduction to the World of IT, Q3.","src":"extra-reworded"},{"d":3,"t":"flash","q":"What is the acronym used to describe memory that is commonly found on a motherboard?\n____","a":"RAM","e":"Expected answer:\nRAM\n\nExtra file category 1 Introduction to the World of IT, Q4.","src":"extra-reworded"},{"d":3,"q":"How many tests must a person take in order to be A+ certified?","o":["1","2","3","0","4"],"c":1,"e":"Correct answer: B. 2\n\nSource note: Extra file category 1 Introduction to the World of IT, Q6.","src":"extra-reworded"},{"d":3,"q":"Which of the following devices are common output devices? (Choose all that apply.)","o":["digital piano","speakers","display","stylus","printer","track stick","barcode reader"],"c":[1,2,4],"e":"Correct answers: B, C, E. B. speakers; C. display; E. printer\n\nSource note: Extra file category 1 Introduction to the World of IT, Q9.","src":"extra-reworded"},{"d":3,"t":"flash","q":"Rewrite the following so that it includes an open-ended question.\nTechnician: Good morning. I have a service log that states you are getting an error message whenever you access a PDF file. Have you done your Acrobat updates lately?\n____","a":"Example: “What happens when you try to open a PDF file?”","e":"Expected answer:\nExample: “What happens when you try to open a PDF file?”\n\nExtra file category 1 Introduction to the World of IT, Q13.","src":"extra-reworded"},{"d":3,"t":"flash","q":"Name one procedure you would try to fix an erratic optical mouse.\n____\n____","a":"Clean the optical sensor and mouse surface; also check the battery/cable or try another USB port.","e":"Expected answer:\nClean the optical sensor and mouse surface; also check the battery/cable or try another USB port.\n\nExtra file category 1 Introduction to the World of IT, Q14.","src":"extra-reworded"},{"d":3,"q":"Match each capacity with the matching description.\n____ bit\n____ kilobyte\n____ megabyte\n____ byte\n____ gigabyte\n____ terabyte\nChoices:\nA. 8 bits\nB. a 1 or a 0\nC. approximately 1,000 bytes\nD. approximately 1 million bytes\nE. approximately 1 trillion bytes\nF. approximately 1 billion bytes","o":["bit = D\nkilobyte = B\nmegabyte = E\nbyte = F\ngigabyte = A\nterabyte = C","bit = E\nkilobyte = C\nmegabyte = B\nbyte = A\ngigabyte = D\nterabyte = F","bit = C\nkilobyte = B\nmegabyte = E\nbyte = F\ngigabyte = D\nterabyte = A","bit = B\nkilobyte = C\nmegabyte = D\nbyte = A\ngigabyte = F\nterabyte = E"],"c":3,"e":"Correct mapping:\nbit = B\nkilobyte = C\nmegabyte = D\nbyte = A\ngigabyte = F\nterabyte = E\n\nSource note: Extra file category 1 Introduction to the World of IT, Q15.","src":"extra-reworded"},{"d":3,"q":"Match each device with the matching description. ____ flatbed scanner\n____ adapter\n____ ADF\n____ power supply\n____ webcam\nChoices:\nA. Can have an ADF\nB. Used to feed multiple sheets of paper one page at a time\nC. Used to capture video\nD. Inserts into an expansion slot\nE. Converts AC to DC","o":["flatbed scanner = A\nadapter = B\nADF = C\npower supply = E\nwebcam = D","flatbed scanner = C\nadapter = B\nADF = A\npower supply = D\nwebcam = E","flatbed scanner = A\nadapter = D\nADF = B\npower supply = E\nwebcam = C","flatbed scanner = C\nadapter = B\nADF = E\npower supply = D\nwebcam = A"],"c":2,"e":"Correct mapping:\nflatbed scanner = A\nadapter = D\nADF = B\npower supply = E\nwebcam = C\n\nSource note: Extra file category 1 Introduction to the World of IT, Q16.","src":"extra-reworded"},{"d":3,"q":"What is a feature of an optical mouse?","o":["electrical conversion","LED","volatility","contacts"],"c":1,"e":"Correct answer: B. LED\n\nSource note: Extra file category 1 Introduction to the World of IT, Q17.","src":"extra-reworded"},{"d":3,"q":"Which device is normally found inside a computer?","o":["ADF","hard drive","headset","printer"],"c":1,"e":"Correct answer: B. hard drive\n\nSource note: Extra file category 1 Introduction to the World of IT, Q18.","src":"extra-reworded"},{"d":3,"q":"Which device normally can be seen if looking inside a desktop computer with the cover off and when normally looking at the front of a desktop computer?","o":["motherboard","hard drive","RAM","optical drive"],"c":3,"e":"Correct answer: D. optical drive\n\nSource note: Extra file category 1 Introduction to the World of IT, Q19.","src":"extra-reworded"},{"d":3,"q":"Where can you find the motherboard in a tower computer?","o":["inside the power supply","beside the RAM","below the hard drive","on the side of the case"],"c":3,"e":"Correct answer: D. on the side of the case\n\nSource note: Extra file category 1 Introduction to the World of IT, Q20.","src":"extra-reworded"},{"d":2,"q":"Match each port with the correct description.\n___ DVI\n___ VGA\n___ Thunderbolt\n___ USB\n___ NIC\n___ S/PDIF\nChoices:\nA. Ethernet\nB. TOSLINK\nC. Up to 127 devices\nD. Daisy chain up to 6 devices\nE. Older monitor\nF. Digital signals to monitor","o":["DVI = F\nVGA = E\nThunderbolt = D\nUSB = B\nNIC = C\nS/PDIF = A","DVI = B\nVGA = F\nThunderbolt = E\nUSB = C\nNIC = A\nS/PDIF = D","DVI = F\nVGA = C\nThunderbolt = B\nUSB = E\nNIC = D\nS/PDIF = A","DVI = F\nVGA = E\nThunderbolt = D\nUSB = C\nNIC = A\nS/PDIF = B"],"c":3,"e":"Correct mapping:\nDVI = F\nVGA = E\nThunderbolt = D\nUSB = C\nNIC = A\nS/PDIF = B\n\nSource note: Extra file category 2 Connectivity, Q1.","src":"extra-reworded"},{"d":2,"q":"Which connectors are used with fiber-optic cabling? (Choose all that apply.)","o":["UTP","Thunderbolt","DVI","LC","Lightning","ST","BNC"],"c":[5,3],"e":"Correct answers: D, F. D. LC; F. ST\n\nSource note: Extra file category 2 Connectivity, Q2.","src":"extra-reworded"},{"d":2,"t":"flash","q":"What is a visual indication that a port is USB version 3.0?\n____","a":"The port insert is usually blue, often with a SuperSpeed/SS marking.","e":"Expected answer:\nThe port insert is usually blue, often with a SuperSpeed/SS marking.\n\nExtra file category 2 Connectivity, Q3.","src":"extra-reworded"},{"d":2,"q":"Which port uses an RJ45 connector?","o":["S/PDIF","Lightning","Ethernet","modem"],"c":2,"e":"Correct answer: C. Ethernet\n\nSource note: Extra file category 2 Connectivity, Q4.","src":"extra-reworded"},{"d":2,"t":"flash","q":"What feature does an eSATAp port have that makes it different from an eSATA port?\n____","a":"It supplies power as well as eSATA data, unlike a standard eSATA port.","e":"Expected answer:\nIt supplies power as well as eSATA data, unlike a standard eSATA port.\n\nExtra file category 2 Connectivity, Q5.","src":"extra-reworded"},{"d":2,"q":"Considering VGA, HDMI, DVI, and DisplayPort, which video port can output both digital audio and video signals and is the most technologically advanced?","o":["DVI","DisplayPort","VGA","HDMI"],"c":1,"e":"Correct answer: B. DisplayPort\n\nSource note: Extra file category 2 Connectivity, Q6.","src":"extra-reworded"},{"d":2,"q":"What is the most common DVI port?","o":["DVI-A","DVI-C","DVI-I","DVI-D"],"c":2,"e":"Correct answer: C. DVI-I\n\nSource note: Extra file category 2 Connectivity, Q7.","src":"extra-reworded"},{"d":2,"q":"Which has the faster transfer rate, a USB 3.0 or 1,000 Mb/s Ethernet port?","o":["1,000 Mb/s Ethernet","USB 3.0"],"c":1,"e":"Correct answer: B. USB 3.0\n\nSource note: Extra file category 2 Connectivity, Q8.","src":"extra-reworded"},{"d":2,"q":"What is the maximum cable length for an Ethernet UTP cable?","o":["1000 meters","150 meters","100 meters","200 meters"],"c":2,"e":"Correct answer: C. 100 meters\n\nSource note: Extra file category 2 Connectivity, Q9.","src":"extra-reworded"},{"d":2,"q":"Which color of sound port would be used to attach a speaker?","o":["green","black","pink","white"],"c":0,"e":"Correct answer: A. green\n\nSource note: Extra file category 2 Connectivity, Q10.","src":"extra-reworded"},{"d":2,"t":"flash","q":"Name two titles that might be used in the workplace that are besides sir or ma’am.\n____","a":"Examples: Mr., Ms., Dr., Professor, or the person’s preferred name/title.","e":"Expected answer:\nExamples: Mr., Ms., Dr., Professor, or the person’s preferred name/title.\n\nExtra file category 2 Connectivity, Q11.","src":"extra-reworded"},{"d":2,"t":"flash","q":"You see a port on a computer that you have never seen before. There are no markings. How can you determine the purpose of the port?\n____","a":"Check the computer/motherboard documentation, manufacturer support site, model specifications, or port symbols.","e":"Expected answer:\nCheck the computer/motherboard documentation, manufacturer support site, model specifications, or port symbols.\n\nExtra file category 2 Connectivity, Q12.","src":"extra-reworded"},{"d":2,"q":"Which type of connection commonly uses an RJ11 connector?","o":["Ethernet","Keyboard","DSL/telephone modem line","Display"],"c":2,"e":"Correct answer: C. DSL/telephone modem line","src":"extra-reworded"},{"d":2,"q":"Which port is more commonly found on an Apple computer than any other type of PC?","o":["USB-C","RJ45","Ethernet","Thunderbolt"],"c":3,"e":"Correct answer: D. Thunderbolt\n\nSource note: Extra file category 2 Connectivity, Q14.","src":"extra-reworded"},{"d":2,"q":"On which type of cable would you find an F-type connector?","o":["VGA","Lightning","coaxial","Thunderbolt"],"c":2,"e":"Correct answer: C. coaxial\n\nSource note: Extra file category 2 Connectivity, Q15.","src":"extra-reworded"},{"d":2,"q":"On which type of card would a DB9 connector be found?","o":["NIC","video","audio","serial"],"c":3,"e":"Correct answer: D. serial\n\nSource note: Extra file category 2 Connectivity, Q16.","src":"extra-reworded"},{"d":2,"q":"Which cable can carry video and audio signals and can be used to connect external storage devices?","o":["Type-A","mini-DIN","DVI-I","Thunderbolt"],"c":3,"e":"Correct answer: D. Thunderbolt\n\nSource note: Extra file category 2 Connectivity, Q17.","src":"extra-reworded"},{"d":2,"q":"In which of the following situations would Bluetooth most likely be used?","o":["To connect a PC to a phone line","To connect a flash drive to a camera","To connect a keyboard to a PC","To connect to a corporate wireless network"],"c":2,"e":"Correct answer: C. To connect a keyboard to a PC\n\nSource note: Extra file category 2 Connectivity, Q18.","src":"extra-reworded"},{"d":2,"t":"flash","q":"Name one advantage of having an adapter rather than an integrated motherboard port.\n____","a":"An adapter can be replaced or upgraded and can add features without replacing the motherboard.","e":"Expected answer:\nAn adapter can be replaced or upgraded and can add features without replacing the motherboard.\n\nExtra file category 2 Connectivity, Q19.","src":"extra-reworded"},{"d":2,"q":"Which two coaxial cable types are commonly used in video distribution systems? (Choose two.)","o":["RJ11","RG-6","RG-11","RG-59","RJ45"],"c":[1,3],"e":"Correct answers: B, D. B. RG-6; D. RG-59","src":"extra-reworded"},{"d":3,"q":"Which component can be located both on a video card and on a motherboard?","o":["PCI expansion slot","PCIe expansion slot","GPU","TPM"],"c":2,"e":"Correct answer: C. GPU\n\nSource note: Extra file category 3 On the Motherboard, Q1.","src":"extra-reworded"},{"d":3,"q":"Which expansion slot is best for a video card in a new desktop computer?","o":["AGP","PCI","USB","PCIe"],"c":3,"e":"Correct answer: D. PCIe\n\nSource note: Extra file category 3 On the Motherboard, Q2.","src":"extra-reworded"},{"d":3,"q":"A motherboard has a PCIe x16 expansion slot. Which PCIe adapter size(s) will fit in this slot? (Choose any that apply.)","o":["x1","x2","x16","x4","x32","x8"],"c":[0,1,3,5,2],"e":"Correct answers: A, B, C, D, F. A. x1; B. x2; C. x16; D. x4; F. x8\n\nSource note: Extra file category 3 On the Motherboard, Q3.","src":"extra-reworded"},{"d":3,"q":"Match each motherboard part with the correct description.\n____ L1 cache\n____ CPU\n____ FSB\n____ heat sink\n____ SoC\n____ throttling\nChoices:\nA. Mounted on top of the CPU\nB. Memory found in the CPU\nC. Executes software instructions\nD. Bus between the CPU and motherboard components\nE. Slows the CPU to cool it\nF. Single chip that has CPU, RAM, and ports","o":["L1 cache = B\nCPU = C\nFSB = D\nheat sink = A\nSoC = F\nthrottling = E","L1 cache = A\nCPU = C\nFSB = F\nheat sink = E\nSoC = D\nthrottling = B","L1 cache = C\nCPU = F\nFSB = A\nheat sink = E\nSoC = B\nthrottling = D","L1 cache = D\nCPU = B\nFSB = C\nheat sink = F\nSoC = E\nthrottling = A"],"c":0,"e":"Correct mapping:\nL1 cache = B\nCPU = C\nFSB = D\nheat sink = A\nSoC = F\nthrottling = E\n\nSource note: Extra file category 3 On the Motherboard, Q4.","src":"extra-reworded"},{"d":3,"q":"What is the front side bus?","o":["The internal data bus that connects the processor core to the L1 cache","The external data bus that connects the processor to the L2 cache","The internal data bus that connects the processor core to the L2 cache","The external data bus that connects the processor to the motherboard components"],"c":3,"e":"Correct answer: D. The external data bus that connects the processor to the motherboard components\n\nSource note: Extra file category 3 On the Motherboard, Q5.","src":"extra-reworded"},{"d":3,"q":"A customer wants to upgrade the L2 cache. Which of the following does this definitely require?","o":["A RAM module purchase","A motherboard purchase","A video card purchase","A CPU purchase"],"c":3,"e":"Correct answer: D. A CPU purchase\n\nSource note: Extra file category 3 On the Motherboard, Q6.","src":"extra-reworded"},{"d":3,"q":"Match each expansion slot with its definition. Each answer is only used one time.\n____ PCIe x16\n____ PCI\n____ PCIe\nChoices:\nA. 32- or 64-bit parallel bus\nB. commonly used for video cards\nC. has a varying number of lanes","o":["PCIe x16 = C\nPCI = B\nPCIe = A","PCIe x16 = B\nPCI = A\nPCIe = C","PCIe x16 = A\nPCI = B\nPCIe = C","PCIe x16 = A\nPCI = C\nPCIe = B"],"c":1,"e":"Correct mapping:\nPCIe x16 = B\nPCI = A\nPCIe = C\n\nSource note: Extra file category 3 On the Motherboard, Q7.","src":"extra-reworded"},{"d":3,"t":"flash","q":"Name three things that would indicate that the processor or motherboard needs to be replaced.\n____\n____\n____\n____","a":"Examples: no POST/beep-code failures, random shutdowns or freezes, swollen/leaking capacitors, overheating, or no power.","e":"Expected answer:\nExamples: no POST/beep-code failures, random shutdowns or freezes, swollen/leaking capacitors, overheating, or no power.\n\nExtra file category 3 On the Motherboard, Q8.","src":"extra-reworded"},{"d":3,"q":"What should a technician do if a swollen capacitor is found on a motherboard?","o":["Replace the motherboard.","Check the voltages coming from the power supply.","Replace the power supply.","Replace the capacitor."],"c":0,"e":"Correct answer: A. Replace the motherboard.\n\nSource note: Extra file category 3 On the Motherboard, Q9.","src":"extra-reworded"},{"d":3,"q":"Which of the following statements is true regarding PCIe?","o":["PCIe is being replaced by PCI-X.","A PCIe slot will not accept a PCI card.","PCIe is a 32- or 64-bit bus technology.","PCIe is a parallel bus technology."],"c":1,"e":"Correct answer: B. A PCIe slot will not accept a PCI card.\n\nSource note: Extra file category 3 On the Motherboard, Q10.","src":"extra-reworded"},{"d":3,"q":"A PCIe x8 adapter always transmits using eight lanes.","o":["True","False"],"c":1,"e":"Correct answer: B. False\n\nSource note: Extra file category 3 On the Motherboard, Q11.","src":"extra-reworded"},{"d":3,"q":"What is the significance of a motherboard specification that states the following: 1 PCIe x16 (x8 mode) slot?","o":["The slot can transmit traffic using 8 or 16 lanes.","The slot accepts x8 or x16 cards.","The slot accepts x16 cards but uses only 8 lanes.","The slot can transmit in bursts of 8 or 16 bytes at a time."],"c":2,"e":"Correct answer: C. The slot accepts x16 cards but uses only 8 lanes.\n\nSource note: Extra file category 3 On the Motherboard, Q12.","src":"extra-reworded"},{"d":3,"q":"What are two security options that would help with password management and encryption? (Choose two.)","o":["HSM","TPM","PCIe standard","GPU","CPU"],"c":[1,0],"e":"Correct answers: A, B. A. HSM; B. TPM\n\nSource note: Extra file category 3 On the Motherboard, Q13.","src":"extra-reworded"},{"d":5,"t":"flash","q":"A technician for a college is going to repair a problem in another building. A professor stops the technician to talk about her slow computer. The technician gives a little eye roll but then stops and listens to the professor. The professor comments, “I can’t get my email or even type my tests. The computer takes at least 20 minutes just to boot.” The technician looks around, a little exasperated, and says, “Uh huh.” “I logged this problem over a week ago,” continues the professor, “and no one has dropped by.” “Uh huh,” replies the technician again. “Do you know when you folks might get to that issue or have an idea about what might be the problem?” the professor asks. The technician looks at the professor and says, “It is probably a virus that has been going around. Jim was supposed to get to those. We will get to you as soon as we can.” The technician’s phone rings, and he walks away to get to the phone.\nName three active listening techniques and good customer support procedures that would lead to a better interaction.\n____\n____\n____\n____\n____","a":"Listen without eye-rolling, acknowledge the problem, ask open-ended questions, take ownership or escalate properly, and provide a clear next step/timeline.","e":"Expected answer:\nListen without eye-rolling, acknowledge the problem, ask open-ended questions, take ownership or escalate properly, and provide a clear next step/timeline.\n\nExtra file category 3 On the Motherboard, Q14.","src":"extra-reworded"},{"d":3,"t":"flash","q":"Explain how a technician might be culturally insensitive.\n____\n____\n____","a":"Examples: making assumptions about someone’s culture, accent, gender, title, customs, or communication style.","e":"Expected answer:\nExamples: making assumptions about someone’s culture, accent, gender, title, customs, or communication style.\n\nExtra file category 3 On the Motherboard, Q15.","src":"extra-reworded"},{"d":3,"q":"Which component can be adjusted to overclock?","o":["expansion slot","heat sink","chipset","CPU"],"c":3,"e":"Correct answer: D. CPU\n\nSource note: Extra file category 3 On the Motherboard, Q16.","src":"extra-reworded"},{"d":3,"q":"When installing a CPU, orient pin 1 to pin 1 on the socket and align the other pins. Lower the ZIF socket lever and lock. Power on the computer to ensure that the CPU works. Power down the computer and install the heat sink and/or fan.","o":["True","False"],"c":1,"e":"Correct answer: B. False\n\nSource note: Extra file category 3 On the Motherboard, Q17.","src":"extra-reworded"},{"d":3,"q":"What is applied between a processor and a heat sink to increase heat dissipation?","o":["a capacitor","cache memory","a fan","thermal paste"],"c":3,"e":"Correct answer: D. thermal paste\n\nSource note: Extra file category 3 On the Motherboard, Q18.","src":"extra-reworded"},{"d":3,"q":"When looking over the specifications for the motherboard, you see LGA 2066. Which component is being referenced?","o":["HSM","expansion slot","RAM","processor"],"c":3,"e":"Correct answer: D. processor\n\nSource note: Extra file category 3 On the Motherboard, Q19.","src":"extra-reworded"},{"d":3,"q":"Which method is not used to cool a processor?","o":["CPU fan","heat sink","thermal tank","case fan"],"c":2,"e":"Correct answer: C. thermal tank\n\nSource note: Extra file category 3 On the Motherboard, Q20.","src":"extra-reworded"},{"d":3,"q":"When would a technician flash a BIOS/UEFI?","o":["When the date and time start to be incorrect","When the motherboard battery fails","When a port or motherboard component does not perform at its maximum potential","When the driver for a motherboard port is out of date"],"c":2,"e":"Correct answer: C. When a port or motherboard component does not perform at its maximum potential\n\nSource note: Extra file category 4 Introduction to Configuration, Q1.","src":"extra-reworded"},{"d":3,"q":"What is the effect of setting an administrator password in BIOS/UEFI?","o":["It prevents a user from changing system Setup settings.","It prevents the computer from having multiple devices that can boot the system.","It prevents the BIOS/UEFI from being infected with a virus.","It prevents a user from accessing the computer operating system."],"c":0,"e":"Correct answer: A. It prevents a user from changing system Setup settings.\n\nSource note: Extra file category 4 Introduction to Configuration, Q2.","src":"extra-reworded"},{"d":3,"q":"Which tool is used to determine the driver version being used for a card installed in a computer?","o":["Task Manager","BIOS","system Setup","CMOS","Device Manager"],"c":4,"e":"Correct answer: E. Device Manager\n\nSource note: Extra file category 4 Introduction to Configuration, Q3.","src":"extra-reworded"},{"d":3,"q":"Which program is commonly used to verify that a new piece of hardware is recognized by the operating system, functions, and the system resources assigned?","o":["manufacturer-provided application","Device Manager","BIOS/UEFI","CMOS"],"c":1,"e":"Correct answer: B. Device Manager\n\nSource note: Extra file category 4 Introduction to Configuration, Q4.","src":"extra-reworded"},{"d":3,"q":"Where would a CR2032 lithium battery most likely be used in a tower PC?","o":["In the CMOS","As a laptop battery","Inside the processor","On the motherboard"],"c":3,"e":"Correct answer: D. On the motherboard\n\nSource note: Extra file category 4 Introduction to Configuration, Q5.","src":"extra-reworded"},{"d":3,"q":"Which BIOS/UEFI option might need to be modified in order to boot a Windows computer from a flash drive that contains Ubuntu, a Linux-based operating system?","o":["USB Configuration","Virus Protection","Hyper-Threading","Secure Boot","LoJack"],"c":3,"e":"Correct answer: D. Secure Boot\n\nSource note: Extra file category 4 Introduction to Configuration, Q6.","src":"extra-reworded"},{"d":3,"q":"What is a TPM?","o":["The technique used by a USB hub when multiple devices are attached to it","A type of lithium battery used to keep current Setup configuration data","A method of sharing resources between adapters","A physical module that stores passwords and digital certificates"],"c":3,"e":"Correct answer: D. A physical module that stores passwords and digital certificates\n\nSource note: Extra file category 4 Introduction to Configuration, Q7.","src":"extra-reworded"},{"d":3,"q":"A technician is looking at a used computer that was recently purchased by someone. The computer is requesting a password before the operating system loads. What can the technician do to remove the password?","o":["Remove the CMOS battery for a minute and then reinstall it.","Press the key to enter BIOS.","Press the F8 key as the computer boots.","Hold down the power button for 10 seconds as the computer is booting."],"c":0,"e":"Correct answer: A. Remove the CMOS battery for a minute and then reinstall it.\n\nSource note: Extra file category 4 Introduction to Configuration, Q8.","src":"extra-reworded"},{"d":3,"q":"Which tab of a device’s Properties dialog has a Device Status section that might contain helpful troubleshooting information or the status of the device?","o":["Management","Details","Driver","General","Advanced"],"c":3,"e":"Correct answer: D. General\n\nSource note: Extra file category 4 Introduction to Configuration, Q9.","src":"extra-reworded"},{"d":3,"t":"flash","q":"A technician receives a complaint about a computer being slow to respond to typed keystrokes. The technician installs more memory and a new keyboard. The customer is happy. What, if anything, Can have been done better?\n____\n____\n____","a":"The technician should have followed troubleshooting steps first: ask questions, identify the problem, test a theory, change one thing at a time, and document the repair.","e":"Expected answer:\nThe technician should have followed troubleshooting steps first: ask questions, identify the problem, test a theory, change one thing at a time, and document the repair.\n\nExtra file category 4 Introduction to Configuration, Q10.","src":"extra-reworded"},{"d":3,"q":"What is the maximum wattage that can be provided by a USB port?","o":["4.5 Consider the following BIOS/UEFI configuration menu options when answering Questions 12–15. Main menu Onboard Devices menu Boot Device Priority menu BIOS information PCIe 1st boot device BIOS version LAN1 controller 2nd boot device Build date USB 2.0 controller 3rd boot device EC F/W version USB 3.0 controller 4th boot device CPU information Audio Memory information OnChip SATA controller System information SATA System language HDMI/DVI System date System time","5","100","2.5"],"c":2,"e":"Correct answer: C. 100\n\nSource note: Extra file category 4 Introduction to Configuration, Q11.","src":"extra-reworded"},{"d":3,"q":"Which menu would you use to determine whether the system should be flashed?","o":["Boot Device Priority menu","Onboard Devices menu","Main menu"],"c":2,"e":"Correct answer: C. Main menu\n\nSource note: Extra file category 4 Introduction to Configuration, Q12.","src":"extra-reworded"},{"d":3,"q":"A computer is mounted inside a cabinet, and you want to know if the USB 3.0 port has been disabled. Which menu would you use?","o":["Boot Device Priority menu","Main menu","Onboard Devices menu"],"c":2,"e":"Correct answer: C. Onboard Devices menu\n\nSource note: Extra file category 4 Introduction to Configuration, Q13.","src":"extra-reworded"},{"d":3,"q":"Which menu would you use to determine whether the particular SATA port you used to connect to an eSATA bracket is enabled?","o":["Main menu","Boot Device Priority menu","Onboard Devices menu"],"c":2,"e":"Correct answer: C. Onboard Devices menu\n\nSource note: Extra file category 4 Introduction to Configuration, Q14.","src":"extra-reworded"},{"d":3,"q":"A technician wants to boot from an eSATA external hard drive. Which submenu item should she use?","o":["OnChip SATA controller","1st boot device","CPU information","SATA"],"c":1,"e":"Correct answer: B. 1st boot device\n\nSource note: Extra file category 4 Introduction to Configuration, Q15.","src":"extra-reworded"},{"d":3,"q":"A technician keeps having to configure the date and time. What component is suspect?","o":["CPU","CMOS battery","chipset","BIOS/UEFI"],"c":1,"e":"Correct answer: B. CMOS battery\n\nSource note: Extra file category 4 Introduction to Configuration, Q16.","src":"extra-reworded"},{"d":3,"q":"What are three ways to get more USB ports? (Choose three.)","o":["Install a USB bracket that has USB ports and attaches to motherboard pins.","Install a PCIe adapter that has USB ports.","Install an AGP adapter that has USB ports.","Connect a network hub to an existing USB port.","Use a USB port multiplexer.","Connect a USB hub to an existing USB port."],"c":[5,1,0],"e":"Correct answers: A, B, F. A. Install a USB bracket that has USB ports and attaches to motherboard pins.; B. Install a PCIe adapter that has USB ports.; F. Connect a USB hub to an existing USB port.\n\nSource note: Extra file category 4 Introduction to Configuration, Q17.","src":"extra-reworded"},{"d":3,"q":"When would a technician use UEFI?","o":["When the date and/or time continues to be wrong","When managing configuration through Device Manager","When replacing a motherboard","When an adapter has just been installed"],"c":2,"e":"Correct answer: C. When replacing a motherboard\n\nSource note: Extra file category 4 Introduction to Configuration, Q18.","src":"extra-reworded"},{"d":3,"q":"A computer is being used in a medical office. For security reasons, the technician has been asked to reasonably ensure that no one attaches any external media. What would the technician probably do?","o":["Swap out the motherboard for one that doesn’t have extra ports.","Encrypt the hard drive.","Password protect the BIOS/UEFI and disable unused ports.","Assign user rights through user passwords on the computer.","Flash the chipset."],"c":2,"e":"Correct answer: C. Password protect the BIOS/UEFI and disable unused ports.\n\nSource note: Extra file category 4 Introduction to Configuration, Q19.","src":"extra-reworded"},{"d":3,"t":"flash","q":"A technician for a small company set a BIOS/UEFI password on every computer. The technician leaves the company, and the replacement technician needs to access the BIOS/UEFI. What should the new technician do?\n____\n____\n____","a":"Use authorized recovery only: check company records, contact the previous technician/vendor/manufacturer if appropriate, clear the BIOS/UEFI password with the documented jumper/CMOS procedure if allowed, then document the new password.","e":"Expected answer:\nUse authorized recovery only: check company records, contact the previous technician/vendor/manufacturer if appropriate, clear the BIOS/UEFI password with the documented jumper/CMOS procedure if allowed, then document the new password.\n\nExtra file category 4 Introduction to Configuration, Q20.","src":"extra-reworded"},{"d":3,"t":"flash","q":"What is likely to happen if you removed the battery from a motherboard by accident?\n____","a":"The BIOS/UEFI setup data, date, and time may reset to defaults until the battery is replaced/reinstalled.","e":"Expected answer:\nThe BIOS/UEFI setup data, date, and time may reset to defaults until the battery is replaced/reinstalled.\n\nExtra file category 5 Disassembly and Power, Q1.","src":"extra-reworded"},{"d":3,"t":"flash","q":"Name three tasks commonly performed during preventive maintenance.\n____\n____\n____","a":"Examples: remove dust, check/clean fans and vents, inspect cables/connections, update software/firmware, verify backups, and check system health.","e":"Expected answer:\nExamples: remove dust, check/clean fans and vents, inspect cables/connections, update software/firmware, verify backups, and check system health.\n\nExtra file category 5 Disassembly and Power, Q2.","src":"extra-reworded"},{"d":5,"q":"Computers used in a grocery store warehouse for inventory control have a higher part failure rate than do the other company computers. Which option is most likely to help in this situation?","o":["antistatic pads","an antistatic wrist strap","high-wattage power supplies","a preventive maintenance plan"],"c":3,"e":"Correct answer: D. a preventive maintenance plan\n\nSource note: Extra file category 5 Disassembly and Power, Q3.","src":"extra-reworded"},{"d":3,"q":"Which option can prolong the life of a computer and conserve energy? (Choose all that apply.)","o":["extra case fans","upgraded power supply","a preventive maintenance plan","antistatic mats and pads","a power plan","Li-ion replacement batteries"],"c":[2,4],"e":"Correct answers: C, E. C. a preventive maintenance plan; E. a power plan\n\nSource note: Extra file category 5 Disassembly and Power, Q4.","src":"extra-reworded"},{"d":3,"q":"Which power component has a 24-pin connector?","o":["case fan","AUX power for the CPU","main motherboard connector","power supply fan"],"c":2,"e":"Correct answer: C. main motherboard connector\n\nSource note: Extra file category 5 Disassembly and Power, Q5.","src":"extra-reworded"},{"d":3,"q":"A mechanical hard drive randomly becomes unavailable, and after replacing the drive, the technician suspects that the drive may not be getting 5 volts consistently. What could help in this situation?","o":["a preventive maintenance plan","a power supply tester","antistatic wipes","a UPS","a surge protector"],"c":1,"e":"Correct answer: B. a power supply tester\n\nSource note: Extra file category 5 Disassembly and Power, Q6.","src":"extra-reworded"},{"d":3,"q":"When disassembling a computer, which item helps you safely remove a memory module by preventing ESD damage?","o":["#1 or #2 Phillips screwdriver","antistatic wrist strap","magnetic screwdriver","needle-nose pliers"],"c":1,"e":"Correct answer: B. antistatic wrist strap","src":"extra-reworded"},{"d":3,"q":"A user had a motherboard problem last week, and a technician fixed it. Now the same computer has a different problem. The user reports that the USB ports on the front do not work anymore. What is the first thing you should check?","o":["motherboard connections to the front panel","power connection to the front panel","power supply","voltage output from the power supply to the USB connectors"],"c":0,"e":"Correct answer: A. motherboard connections to the front panel\n\nSource note: Extra file category 5 Disassembly and Power, Q8.","src":"extra-reworded"},{"d":3,"q":"Which of the following items would be specialized for use with a laser printer?","o":["toner-safe/HEPA vacuum","antistatic wrist strap","surge strip","power supply tester"],"c":0,"e":"Correct answer: A. toner-safe/HEPA vacuum","src":"extra-reworded"},{"d":5,"q":"Which two of the following would most likely cause an unusual noise on a desktop computer? (Choose two.)","o":["PCIe adapter","USB drive","memory","case fan","power supply","motherboard"],"c":[4,3],"e":"Correct answers: D, E. D. case fan; E. power supply\n\nSource note: Extra file category 5 Disassembly and Power, Q10.","src":"extra-reworded"},{"d":5,"q":"A computer will not power on. Which option would be used to check the wall outlet?","o":["power supply tester","multimeter","UPS","POST"],"c":1,"e":"Correct answer: B. multimeter\n\nSource note: Extra file category 5 Disassembly and Power, Q11.","src":"extra-reworded"},{"d":5,"q":"A computer will not power on. After checking the wall outlet and swapping the power cord, what would the technician use next?","o":["antistatic wrist strap","resistance","magnetic screwdriver","nonmagnetic screwdriver","power supply tester"],"c":4,"e":"Correct answer: E. power supply tester\n\nSource note: Extra file category 5 Disassembly and Power, Q12.","src":"extra-reworded"},{"d":3,"q":"W
