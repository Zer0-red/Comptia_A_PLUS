wer: B. operating system\n\nSource note: Extra file category 14 Introduction to Operating Systems, Q1.","src":"extra-reworded"},{"d":1,"q":"What is the core of a computer’s operating system?","o":["RAM","commands","CPU","kernel"],"c":3,"e":"Correct answer: D. kernel\n\nSource note: Extra file category 14 Introduction to Operating Systems, Q2.","src":"extra-reworded"},{"d":1,"q":"Programs and drivers written for 64-bit systems can always run on 32-bit systems.","o":["True","False"],"c":1,"e":"Correct answer: B. False\n\nSource note: Extra file category 14 Introduction to Operating Systems, Q3.","src":"extra-reworded"},{"d":1,"q":"Two methods of interacting with the operating system are through a(n) ____ or a(n) ____. (Choose two.)","o":["tunnel","OS cache","GUI","workstation","command line","core"],"c":[2,4],"e":"Correct answers: C, E. C. GUI; E. command line\n\nSource note: Extra file category 14 Introduction to Operating Systems, Q4.","src":"extra-reworded"},{"d":1,"t":"flash","q":"Name two features specifically needed on a mobile device’s operating system.\n____\n____","a":"Touch/gesture support, cellular/Wi-Fi/mobile connectivity, location services/sensors, power management, and app-store support.","e":"Expected answer:\nTouch/gesture support, cellular/Wi-Fi/mobile connectivity, location services/sensors, power management, and app-store support.\n\nExtra file category 14 Introduction to Operating Systems, Q5.","src":"extra-reworded"},{"d":1,"t":"flash","q":"Name three possible consequences associated with using software that has reached its end-of-life (EOL).\n____\n____","a":"No security patches, no vendor support, compatibility problems, and increased compliance/security risk.","e":"Expected answer:\nNo security patches, no vendor support, compatibility problems, and increased compliance/security risk.\n\nExtra file category 14 Introduction to Operating Systems, Q6.","src":"extra-reworded"},{"d":1,"t":"flash","q":"Name two potential problems associated with updating an operating system.\n____\n____","a":"Application/driver incompatibility, bugs or instability, performance issues, and possible data loss if not backed up.","e":"Expected answer:\nApplication/driver incompatibility, bugs or instability, performance issues, and possible data loss if not backed up.\n\nExtra file category 14 Introduction to Operating Systems, Q7.","src":"extra-reworded"},{"d":1,"q":"Backward compatibility means that a new application can still process data from older software.","o":["True","False"],"c":0,"e":"Correct answer: A. True\n\nSource note: Extra file category 14 Introduction to Operating Systems, Q8.","src":"extra-reworded"},{"d":1,"q":"A folder and a directory are the same thing.","o":["True","False"],"c":0,"e":"Correct answer: A. True\n\nSource note: Extra file category 14 Introduction to Operating Systems, Q9.","src":"extra-reworded"},{"d":1,"q":"A file’s name consists of a filename and a(n) ____.","o":["folder","path","extension","size"],"c":2,"e":"Correct answer: C. extension\n\nSource note: Extra file category 14 Introduction to Operating Systems, Q10.","src":"extra-reworded"},{"d":1,"t":"flash","q":"Describe how to show a file’s extension if it is not displayed in File Explorer. Choose one version of Windows (10 or 11).\n____\n____\n____\n____","a":"Windows 11: File Explorer > View > Show > File name extensions. Windows 10: File Explorer > View tab > check File name extensions.","e":"Expected answer:\nWindows 11: File Explorer > View > Show > File name extensions. Windows 10: File Explorer > View tab > check File name extensions.\n\nExtra file category 14 Introduction to Operating Systems, Q11.","src":"extra-reworded"},{"d":1,"t":"flash","q":"In the following path, which identify the subfolder(s).\nC:\\Users\\Cheryl\\NewFiles\\review.docx\n____","a":"Users, Cheryl, and NewFiles.","e":"Expected answer:\nUsers, Cheryl, and NewFiles.\n\nExtra file category 14 Introduction to Operating Systems, Q12.","src":"extra-reworded"},{"d":1,"q":"Deleted files stored on a hard drive can be recovered from the Recycle Bin.","o":["True","False"],"c":0,"e":"Correct answer: A. True\n\nSource note: Extra file category 14 Introduction to Operating Systems, Q13.","src":"extra-reworded"},{"d":1,"q":"What Windows option can access various icons or links that can configure the computer?","o":["Quick Launch","Control Panel","registry","Time Machine"],"c":1,"e":"Correct answer: B. Control Panel\n\nSource note: Extra file category 14 Introduction to Operating Systems, Q14.","src":"extra-reworded"},{"d":1,"q":"What is the maximum memory that can be recognized by a Windows 32-bit operating system?","o":["2 GB","4 GB","64 GB","16 GB","1 GB"],"c":1,"e":"Correct answer: B. 4 GB\n\nSource note: Extra file category 14 Introduction to Operating Systems, Q15.","src":"extra-reworded"},{"d":1,"q":"In the filename Opsys_Quiz 4.docx , what is the extension?","o":["Opsys_Quiz 4.docx","4","docx","Opsys"],"c":2,"e":"Correct answer: C. docx\n\nSource note: Extra file category 14 Introduction to Operating Systems, Q16.","src":"extra-reworded"},{"d":1,"t":"flash","q":"A user is working in Microsoft Word. She saves the document called Ltr1.docx to a folder called Homedocs . The Homedocs folder is a subfolder of the Work folder located on the D: hard drive volume. Write the complete path for the Ltr1.docx file.\n____","a":"D:\\Work\\Homedocs\\Ltr1.docx","e":"Expected answer:\nD:\\Work\\Homedocs\\Ltr1.docx\n\nExtra file category 14 Introduction to Operating Systems, Q17.","src":"extra-reworded"},{"d":1,"q":"File and folder compression can degrade computer performance.","o":["True","False"],"c":0,"e":"Correct answer: A. True\n\nSource note: Extra file category 14 Introduction to Operating Systems, Q18.","src":"extra-reworded"},{"d":1,"t":"flash","q":"Name three methods that can be used to recover an operating system.\n____\n____","a":"System Restore, Reset this PC, Startup Repair, recovery media, restore from backup/system image, or reinstall Windows.","e":"Expected answer:\nSystem Restore, Reset this PC, Startup Repair, recovery media, restore from backup/system image, or reinstall Windows.\n\nExtra file category 14 Introduction to Operating Systems, Q19.","src":"extra-reworded"},{"d":1,"q":"What is the name of a registry editor?","o":["regedit.exe","registry","edit","nano"],"c":0,"e":"Correct answer: A. regedit.exe\n\nSource note: Extra file category 14 Introduction to Operating Systems, Q20.","src":"extra-reworded"},{"d":1,"t":"flash","q":"Describe two methods commonly used to recover an operating system.\n____\n____\n____","a":"Example: System Restore returns Windows system files/settings to a restore point; Reset this PC reinstalls Windows while optionally keeping personal files.","e":"Expected answer:\nExample: System Restore returns Windows system files/settings to a restore point; Reset this PC reinstalls Windows while optionally keeping personal files.\n\nExtra file category 14 Introduction to Operating Systems, Q21.","src":"extra-reworded"},{"d":1,"t":"flash","q":"Name two methods that you think you will use to stay current in the IT field.\n____\n____","a":"Examples: vendor documentation, labs/practice, certifications, webinars/classes, mentors, and professional news sources.","e":"Expected answer:\nExamples: vendor documentation, labs/practice, certifications, webinars/classes, mentors, and professional news sources.\n\nExtra file category 14 Introduction to Operating Systems, Q22.","src":"extra-reworded"},{"d":1,"q":"What command is used to create a directory?","o":["md","cd","mad","dir"],"c":0,"e":"Correct answer: A. md\n\nSource note: Extra file category 15 Introduction to Scripting, Q1.","src":"extra-reworded"},{"d":1,"t":"flash","q":"What command is used to list the contents of a directory?\n____","a":"dir","e":"Expected answer:\ndir\n\nExtra file category 15 Introduction to Scripting, Q2.","src":"extra-reworded"},{"d":1,"q":"Consider the following directory structure from the F: drive root directory.\n2019_Term (directory)\nCompRepair (subdirectory)\nOpsys (subdirectory)\nCisco8 (subdirectory)\nVoIP (subdirectory)\nIf the prompt is C:\\2019_Term> , and you want to move into the VoIP subdirectory, what command do you type?","o":["cd C:\\VoIP","cd VoIP","cd C:\\","cd."],"c":1,"e":"Correct answer: B. cd VoIP\n\nSource note: Extra file category 15 Introduction to Scripting, Q3.","src":"extra-reworded"},{"d":1,"q":"The ____ and ____ file extensions are used with Windows executable files that are used to start applications.","o":[".app",".exe",".ps1",".js",".com"],"c":[4,1],"e":"Correct answers: B, E. B. .exe; E. .com\n\nSource note: Extra file category 15 Introduction to Scripting, Q4.","src":"extra-reworded"},{"d":1,"q":"What command would be used on a computer where a specific application has stopped?","o":["stop","quit","net stop","taskkill"],"c":3,"e":"Correct answer: D. taskkill\n\nSource note: Extra file category 15 Introduction to Scripting, Q5.","src":"extra-reworded"},{"d":1,"t":"flash","q":"Name one example of where you think a technician might see or use a batch file or a script file.\n____\n____","a":"Examples: login scripts, software installation scripts, backup scripts, mapping network drives, or automating maintenance.","e":"Expected answer:\nExamples: login scripts, software installation scripts, backup scripts, mapping network drives, or automating maintenance.\n\nExtra file category 15 Introduction to Scripting, Q6.","src":"extra-reworded"},{"d":1,"q":"A script is created as a ____ file.","o":["csv","text","HTML","Word"],"c":1,"e":"Correct answer: B. text\n\nSource note: Extra file category 15 Introduction to Scripting, Q7.","src":"extra-reworded"},{"d":1,"q":"A(n) ____ ____ tells a computer where to find a specific program.","o":["environment variable","scripting language","value variable","batch file"],"c":0,"e":"Correct answer: A. environment variable\n\nSource note: Extra file category 15 Introduction to Scripting, Q8.","src":"extra-reworded"},{"d":1,"q":"The two types of environment variables are ____ and ____.","o":["system","internal","user","external","test","experimental"],"c":[0,2],"e":"Correct answers: A, C. A. system; C. user\n\nSource note: Extra file category 15 Introduction to Scripting, Q9.","src":"extra-reworded"},{"d":1,"q":"The set of symbols and rules used to create instructions in a scripting language is its ____.","o":["value","variable name","syntax","keywords"],"c":2,"e":"Correct answer: C. syntax\n\nSource note: Extra file category 15 Introduction to Scripting, Q10.","src":"extra-reworded"},{"d":1,"q":"What command would a technician use to apply a change to the security policy?","o":["regedit","gpupdate","mstsc","bootrec"],"c":1,"e":"Correct answer: B. gpupdate\n\nSource note: Extra file category 15 Introduction to Scripting, Q11.","src":"extra-reworded"},{"d":1,"q":"The value of a variable is stored in the computer’s memory as a specific ____.","o":["ASCII code","data type","integer","string"],"c":1,"e":"Correct answer: B. data type\n\nSource note: Extra file category 15 Introduction to Scripting, Q12.","src":"extra-reworded"},{"d":1,"q":"____ are included in a script to explain what the script or a portion of the script does but are ignored by the computer when the script runs.","o":["Syntax lines","Commands","Variables","Comments"],"c":3,"e":"Correct answer: D. Comments\n\nSource note: Extra file category 15 Introduction to Scripting, Q13.","src":"extra-reworded"},{"d":1,"q":"Which type of file would have the following command as part of it?\nformat d: /fs:ntfs /v:Corp /p:2","o":[".py",".js",".bat",".vbs"],"c":2,"e":"Correct answer: C. .bat\n\nSource note: Extra file category 15 Introduction to Scripting, Q14.","src":"extra-reworded"},{"d":1,"q":"To compare two expressions in a selection structure, you use ____ operators.","o":["logic","relational","equals",">="],"c":1,"e":"Correct answer: B. relational\n\nSource note: Extra file category 15 Introduction to Scripting, Q15.","src":"extra-reworded"},{"d":1,"q":"The ____ operator returns false only if both sides of the expression are false.","o":["equals","NOT","AND","OR"],"c":3,"e":"Correct answer: D. OR\n\nSource note: Extra file category 15 Introduction to Scripting, Q16.","src":"extra-reworded"},{"d":1,"q":"A ____ structure contains a block of statements that is executed repeatedly.","o":["decision","sequence","selection","repetition"],"c":3,"e":"Correct answer: D. repetition\n\nSource note: Extra file category 15 Introduction to Scripting, Q17.","src":"extra-reworded"},{"d":1,"q":"Two types of loops are ____ and ____ loops.","o":["while","decision","else","continuous","for","one time"],"c":[4,0],"e":"Correct answers: A, E. A. while; E. for\n\nSource note: Extra file category 15 Introduction to Scripting, Q18.","src":"extra-reworded"},{"d":1,"q":"The scripting languages that were developed by Microsoft are ____ and ____.","o":["Basic","PowerShell","C","VBScript","Java"],"c":[1,3],"e":"Correct answers: B, D. B. PowerShell; D. VBScript\n\nSource note: Extra file category 15 Introduction to Scripting, Q19.","src":"extra-reworded"},{"d":1,"q":"A script that has the .sh extension is a ____ script and works on ____-based systems.","o":["python, Apple","batch, Microsoft","JavaScript, Windows","shell, Unix/Linux"],"c":3,"e":"Correct answer: D. shell, Unix/Linux\n\nSource note: Extra file category 15 Introduction to Scripting, Q20.","src":"extra-reworded"},{"d":1,"q":"The .py extension indicates that a script is written in the ____ language.","o":["PowerShell","JavaScript","Python","batch"],"c":2,"e":"Correct answer: C. Python\n\nSource note: Extra file category 15 Introduction to Scripting, Q21.","src":"extra-reworded"},{"d":1,"t":"flash","q":"What is the maximum amount of RAM that can be recognized by any version of 32-bit Windows?\n____","a":"4 GB","e":"Expected answer:\n4 GB\n\nExtra file category 16 Advanced Windows, Q1.","src":"extra-reworded"},{"d":1,"t":"flash","q":"A customer has an older 16-bit game as well as some 32- and 64-bit games. The customer is considering upgrading to 64-bit Windows 10. Will there be any issues with this? If so, what are they, and how might they be resolved?\n____\n____","a":"Yes. 64-bit Windows will not run 16-bit applications natively; 32-bit apps usually run. Use a VM, compatibility solution, emulator/DOSBox, or keep an older OS for the 16-bit game.","e":"Expected answer:\nYes. 64-bit Windows will not run 16-bit applications natively; 32-bit apps usually run. Use a VM, compatibility solution, emulator/DOSBox, or keep an older OS for the 16-bit game.\n\nExtra file category 16 Advanced Windows, Q2.","src":"extra-reworded"},{"d":1,"t":"flash","q":"Name three steps to be taken before installing Windows.\n____\n____\n____\n____\n____\n____","a":"Back up data, verify hardware/software compatibility, gather drivers/product keys, plan partitions/boot method, create recovery media, and ensure power/network access.","e":"Expected answer:\nBack up data, verify hardware/software compatibility, gather drivers/product keys, plan partitions/boot method, create recovery media, and ensure power/network access.\n\nExtra file category 16 Advanced Windows, Q3.","src":"extra-reworded"},{"d":1,"q":"Which tool can limit and control the number of applications used to boot a computer?","o":["regedit","taskmgr","diskpart","msconfig"],"c":3,"e":"Correct answer: D. msconfig\n\nSource note: Extra file category 16 Advanced Windows, Q4.","src":"extra-reworded"},{"d":1,"q":"Which Windows setting would be used to enable Windows PowerShell, Hyper-V, or Microsoft’s Print to PDF option?","o":["Performance Monitor","System Configuration","Task Manager","Turn Windows Features On or Off"],"c":3,"e":"Correct answer: D. Turn Windows Features On or Off\n\nSource note: Extra file category 16 Advanced Windows, Q5.","src":"extra-reworded"},{"d":1,"q":"Which performance tool would a technician use first to see if a computer has enough hardware resources when a particular application executes?","o":["Device Manager","Performance Monitor","Reliability Monitor","Task Manager"],"c":3,"e":"Correct answer: D. Task Manager\n\nSource note: Extra file category 16 Advanced Windows, Q6.","src":"extra-reworded"},{"d":1,"t":"flash","q":"How could you have both Windows 7 and Windows 10 operating systems installed on one computer?\n____","a":"Install them as a multiboot/dual-boot configuration on separate partitions or drives.","e":"Expected answer:\nInstall them as a multiboot/dual-boot configuration on separate partitions or drives.\n\nExtra file category 16 Advanced Windows, Q7.","src":"extra-reworded"},{"d":1,"q":"Existing restore points are deleted if Windows is reinstalled.","o":["True","False"],"c":0,"e":"Correct answer: A. True\n\nSource note: Extra file category 16 Advanced Windows, Q8.","src":"extra-reworded"},{"d":1,"q":"Device drivers are specific to a particular Windows operating system version.","o":["True","False"],"c":0,"e":"Correct answer: A. True\n\nSource note: Extra file category 16 Advanced Windows, Q9.","src":"extra-reworded"},{"d":1,"q":"Which System Configuration tab is used to configure a computer to boot in diagnostic startup mode?","o":["General","Services","Tools","Startup","Boot"],"c":0,"e":"Correct answer: A. General\n\nSource note: Extra file category 16 Advanced Windows, Q10.","src":"extra-reworded"},{"d":1,"q":"What user group is allowed to perform driver rollback. (Choose all that apply.)","o":["Guest","Backup Operators","Standard User","Administrator"],"c":3,"e":"Correct answer: D. Administrator\n\nSource note: Extra file category 16 Advanced Windows, Q11.","src":"extra-reworded"},{"d":1,"t":"flash","q":"What does the System Restore utility?\n____\n____","a":"It returns Windows system files, drivers, registry, and settings to a restore point without deleting personal files.","e":"Expected answer:\nIt returns Windows system files, drivers, registry, and settings to a restore point without deleting personal files.\n\nExtra file category 16 Advanced Windows, Q12.","src":"extra-reworded"},{"d":1,"q":"When Windows boots, nothing appears on the screen. If the display is powered on and attached, which Windows tool would be the best one to try first?","o":["Reset Your PC","System Restore","Command Prompt","Safe Mode"],"c":3,"e":"Correct answer: D. Safe Mode\n\nSource note: Extra file category 16 Advanced Windows, Q13.","src":"extra-reworded"},{"d":1,"t":"flash","q":"When would a technician use Event Viewer?\n____\n____","a":"Use Event Viewer to review Windows logs, errors, warnings, and events when troubleshooting hardware, software, security, or boot problems.","e":"Expected answer:\nUse Event Viewer to review Windows logs, errors, warnings, and events when troubleshooting hardware, software, security, or boot problems.\n\nExtra file category 16 Advanced Windows, Q14.","src":"extra-reworded"},{"d":1,"t":"flash","q":"Describe how Task Manager can monitor computer performance?\n____\n____","a":"Task Manager shows live CPU, memory, disk, network, and GPU usage, plus resource use by process.","e":"Expected answer:\nTask Manager shows live CPU, memory, disk, network, and GPU usage, plus resource use by process.\n\nExtra file category 16 Advanced Windows, Q15.","src":"extra-reworded"},{"d":1,"q":"Which disk management option would be used to create a flexible data storage option from a USB drive and an eSATA drive that is seen as one drive letter?","o":["RAID 1","RAID 0","Storage Spaces","RAID 5"],"c":2,"e":"Correct answer: C. Storage Spaces\n\nSource note: Extra file category 16 Advanced Windows, Q16.","src":"extra-reworded"},{"d":1,"q":"Where does Windows store passwords and login details for a particular user?","o":["Credential Manager","BIOS/UEFI","C:\\Windows\\System32\\Configuration","Storage Spaces"],"c":0,"e":"Correct answer: A. Credential Manager\n\nSource note: Extra file category 16 Advanced Windows, Q17.","src":"extra-reworded"},{"d":1,"q":"Which type of Windows installation setup is used for a corporate environment?","o":["workgroup","homegroup","peer-to-peer","domain"],"c":3,"e":"Correct answer: D. domain\n\nSource note: Extra file category 16 Advanced Windows, Q18.","src":"extra-reworded"},{"d":1,"q":"Which type of Windows boot process is used in conjunction with the PXE BIOS/UEFI option?","o":["in-place upgrade","recovery","multiboot","network"],"c":3,"e":"Correct answer: D. network\n\nSource note: Extra file category 16 Advanced Windows, Q19.","src":"extra-reworded"},{"d":1,"t":"flash","q":"Name three things a student can do to avoid burnout in school.\n____\n____","a":"Take breaks, sleep enough, plan study time realistically, exercise, ask for help, and avoid overcommitting.","e":"Expected answer:\nTake breaks, sleep enough, plan study time realistically, exercise, ask for help, and avoid overcommitting.\n\nExtra file category 16 Advanced Windows, Q20.","src":"extra-reworded"},{"d":1,"q":"What are the four main parts of the macOS graphical user interface? (Choose four.)","o":["desktop","Spotlight","Finder","menu bar","Dock","Time Machine","Console"],"c":[0,2,4,3],"e":"Correct answers: A, C, D, E. A. desktop; C. Finder; D. menu bar; E. Dock\n\nSource note: Extra file category 17 macOS and Linux Operating Systems, Q1.","src":"extra-reworded"},{"d":1,"q":"Ubuntu 24.04 uses the GNOME user interface.","o":["True","False"],"c":0,"e":"Correct answer: A. True\n\nSource note: Extra file category 17 macOS and Linux Operating Systems, Q2.","src":"extra-reworded"},{"d":1,"t":"flash","q":"In what ways could you quickly launch an application in macOS?\n____","a":"Use the Dock, Launchpad, Spotlight search, Finder > Applications, or Siri.","e":"Expected answer:\nUse the Dock, Launchpad, Spotlight search, Finder > Applications, or Siri.\n\nExtra file category 17 macOS and Linux Operating Systems, Q3.","src":"extra-reworded"},{"d":1,"t":"flash","q":"Which type of account do you need to create in order to purchase software through the Apple App Store?\n____","a":"Apple ID.","e":"Expected answer:\nApple ID.\n\nExtra file category 17 macOS and Linux Operating Systems, Q4.","src":"extra-reworded"},{"d":1,"t":"flash","q":"Write out the steps you would take to create a file with the Terminal application in macOS or Linux.\n____","a":"Open Terminal, change to the target directory with cd, create the file with touch filename or echo text > filename, then verify with ls.","e":"Expected answer:\nOpen Terminal, change to the target directory with cd, create the file with touch filename or echo text > filename, then verify with ls.\n\nExtra file category 17 macOS and Linux Operating Systems, Q5.","src":"extra-reworded"},{"d":1,"t":"flash","q":"What dd command would you use to copy the contents of a partition named /dev/drive1 to another partition, called /dev/backup ?\n____","a":"sudo dd if=/dev/drive1 of=/dev/backup","e":"Expected answer:\nsudo dd if=/dev/drive1 of=/dev/backup\n\nExtra file category 17 macOS and Linux Operating Systems, Q6.","src":"extra-reworded"},{"d":1,"q":"Which command is commonly used to search for the word “mouse” inside text output or file contents?","o":["grep","apt","sudo","rd"],"c":0,"e":"Correct answer: A. grep","src":"extra-reworded"},{"d":1,"q":"The ____ command lists the contents of the current directory.","o":["sudo","ls","apt","grep"],"c":1,"e":"Correct answer: B. ls\n\nSource note: Extra file category 17 macOS and Linux Operating Systems, Q8.","src":"extra-reworded"},{"d":1,"q":"Which macOS tool is used to display and modify the main system configuration items?","o":["System Settings","Launchpad","Safari","Activity Monitor"],"c":0,"e":"Correct answer: A. System Settings\n\nSource note: Extra file category 17 macOS and Linux Operating Systems, Q9.","src":"extra-reworded"},{"d":1,"t":"flash","q":"How would you create a file from the command-line interface?\n____","a":"Use touch filename, or open an editor such as nano filename and save the file.","e":"Expected answer:\nUse touch filename, or open an editor such as nano filename and save the file.\n\nExtra file category 17 macOS and Linux Operating Systems, Q10.","src":"extra-reworded"},{"d":1,"t":"flash","q":"What steps would you take to install a new package named lynx using the command-line interface in Ubuntu?\n____\n____\n____\n____","a":"Open Terminal, run sudo apt update, then sudo apt install lynx, enter the password, and confirm the installation.","e":"Expected answer:\nOpen Terminal, run sudo apt update, then sudo apt install lynx, enter the password, and confirm the installation.\n\nExtra file category 17 macOS and Linux Operating Systems, Q11.","src":"extra-reworded"},{"d":1,"t":"flash","q":"If an application is not starting properly on macOS, what steps could you take to resolve this?\n____","a":"Force quit the app, restart it, reboot the Mac, update or reinstall the app, and check Activity Monitor/logs.","e":"Expected answer:\nForce quit the app, restart it, reboot the Mac, update or reinstall the app, and check Activity Monitor/logs.\n\nExtra file category 17 macOS and Linux Operating Systems, Q12.","src":"extra-reworded"},{"d":1,"q":"If a Mac is running slowly, what utility could you use to identify the cause of the slowdown?","o":["dash","Mission Control","Launchpad","Activity Monitor"],"c":3,"e":"Correct answer: D. Activity Monitor\n\nSource note: Extra file category 17 macOS and Linux Operating Systems, Q13.","src":"extra-reworded"},{"d":1,"t":"flash","q":"What is the difference between passwd and pwd ?\n____","a":"passwd changes a user password; pwd prints the current working directory.","e":"Expected answer:\npasswd changes a user password; pwd prints the current working directory.\n\nExtra file category 17 macOS and Linux Operating Systems, Q14.","src":"extra-reworded"},{"d":1,"t":"flash","q":"How large should a Time Machine backup drive be?\n____","a":"At least as large as the data/internal drive being backed up, preferably about two times the size for version history.","e":"Expected answer:\nAt least as large as the data/internal drive being backed up, preferably about two times the size for version history.\n\nExtra file category 17 macOS and Linux Operating Systems, Q15.","src":"extra-reworded"},{"d":1,"t":"flash","q":"If you wanted to use chmod to give read, write, and execute permissions to a file’s owner, what command would you use?\n____","a":"chmod u+rwx filename","e":"Expected answer:\nchmod u+rwx filename\n\nExtra file category 17 macOS and Linux Operating Systems, Q16.","src":"extra-reworded"},{"d":1,"q":"Which command grants temporary superuser permissions?","o":["root","less","ls","app-get","sudo"],"c":4,"e":"Correct answer: E. sudo\n\nSource note: Extra file category 17 macOS and Linux Operating Systems, Q17.","src":"extra-reworded"},{"d":1,"q":"The locate command searches the Linux file system.","o":["True","False"],"c":0,"e":"Correct answer: A. True\n\nSource note: Extra file category 17 macOS and Linux Operating Systems, Q18.","src":"extra-reworded"},{"d":1,"t":"flash","q":"How would you find out more information about a Linux command?\n____","a":"Use man command, command --help, or info command.","e":"Expected answer:\nUse man command, command --help, or info command.\n\nExtra file category 17 macOS and Linux Operating Systems, Q19.","src":"extra-reworded"},{"d":2,"q":"Match each security policy component with the appropriate definition from the following list.\n____ Physical access\n____ Acceptable use\n____ Remote access\n____ Password\nChoices:\nA. The specific web browser that is allowed to be installed\nB. Defines whether you can send the code used to access an account (such as shared network storage) via email\nC. The type of security required for a remote VPN connection\nD. The time, day, and year someone entered a network server room","o":["Physical access = C\nAcceptable use = B\nRemote access = D\nPassword = A","Physical access = D\nAcceptable use = B\nRemote access = A\nPassword = C","Physical access = B\nAcceptable use = D\nRemote access = C\nPassword = A","Physical access = D\nAcceptable use = A\nRemote access = C\nPassword = B"],"c":3,"e":"Correct mapping:\nPhysical access = D\nAcceptable use = A\nRemote access = C\nPassword = B\n\nSource note: Extra file category 18 Computer and Network Security, Q1.","src":"extra-reworded"},{"d":2,"t":"flash","q":"Describe multifactor authentication.\n____\n____","a":"MFA requires two or more factor types, such as something you know, something you have, and something you are.","e":"Expected answer:\nMFA requires two or more factor types, such as something you know, something you have, and something you are.\n\nExtra file category 18 Computer and Network Security, Q2.","src":"extra-reworded"},{"d":2,"q":"In what situation would an access control vestibule be used?","o":["When a SAN is being used","When the access server is unavailable or busy with other requests","When multiple people share the same area and each screen can be seen by one of the other people","For physical security"],"c":3,"e":"Correct answer: D. For physical security\n\nSource note: Extra file category 18 Computer and Network Security, Q3.","src":"extra-reworded"},{"d":2,"q":"Which wireless security feature would be most likely to be used in a small company where the staff are the only individuals using the wireless network and a couple of the laptops are older ones?","o":["WPA2","VPN","WPA3","IDS"],"c":0,"e":"Correct answer: A. WPA2\n\nSource note: Extra file category 18 Computer and Network Security, Q4.","src":"extra-reworded"},{"d":2,"t":"flash","q":"List five recommendations for protecting the operating system.\n____\n____\n____\n____\n____\n____\n____\n____\n____","a":"Keep the OS patched, use anti-malware and firewall, use least privilege, strong passwords/MFA, encryption, backups, screen locks, and disable unused services.","e":"Expected answer:\nKeep the OS patched, use anti-malware and firewall, use least privilege, strong passwords/MFA, encryption, backups, screen locks, and disable unused services.\n\nExtra file category 18 Computer and Network Security, Q5.","src":"extra-reworded"},{"d":2,"q":"What is BitLocker?","o":["A method used to secure passwords for websites, users, and files using TPM","A utility that encrypts an entire disk volume, including operating system files, user files, and page files","A wireless security setting","Online secure storage"],"c":1,"e":"Correct answer: B. A utility that encrypts an entire disk volume, including operating system files, user files, and page files\n\nSource note: Extra file category 18 Computer and Network Security, Q6.","src":"extra-reworded"},{"d":2,"q":"A new file is created and stored in an encrypted folder. The file must be manually encrypted because it was added after the folder was encrypted.","o":["True","False"],"c":1,"e":"Correct answer: B. False\n\nSource note: Extra file category 18 Computer and Network Security, Q7.","src":"extra-reworded"},{"d":2,"t":"flash","q":"Describe the security rights for a subfolder when the parent folder is shared.\n____","a":"A subfolder normally inherits permissions from the parent shared folder unless inheritance is changed; effective access depends on both share and NTFS permissions.","e":"Expected answer:\nA subfolder normally inherits permissions from the parent shared folder unless inheritance is changed; effective access depends on both share and NTFS permissions.\n\nExtra file category 18 Computer and Network Security, Q8.","src":"extra-reworded"},{"d":2,"t":"flash","q":"Name three password guidelines you would recommend that a company use.\n____\n____\n____\n____\n____","a":"Use long unique passwords/passphrases, avoid reuse/sharing, require complexity where appropriate, use MFA/password managers, and change passwords when compromised.","e":"Expected answer:\nUse long unique passwords/passphrases, avoid reuse/sharing, require complexity where appropriate, use MFA/password managers, and change passwords when compromised.\n\nExtra file category 18 Computer and Network Security, Q9.","src":"extra-reworded"},{"d":2,"q":"Where are domain user passwords stored?","o":["network server","registry","the cloud","local database"],"c":0,"e":"Correct answer: A. network server\n\nSource note: Extra file category 18 Computer and Network Security, Q10.","src":"extra-reworded"},{"d":2,"q":"A network administrator in a large corporation goes to a popular network vendor site to research security settings, but a message appears, saying that this particular site cannot be accessed and is blocked. What security measure most likely caused this message?","o":["Port security","Content filtering","Magnetometer","BitLocker"],"c":1,"e":"Correct answer: B. Content filtering\n\nSource note: Extra file category 18 Computer and Network Security, Q11.","src":"extra-reworded"},{"d":2,"t":"flash","q":"Describe the difference between a local security policy and a domain policy.\n____\n____\n____","a":"A local security policy applies to one computer; a domain policy is centrally managed through the domain/Group Policy and can apply to many users/computers.","e":"Expected answer:\nA local security policy applies to one computer; a domain policy is centrally managed through the domain/Group Policy and can apply to many users/computers.\n\nExtra file category 18 Computer and Network Security, Q12.","src":"extra-reworded"},{"d":2,"q":"What is needed to configure a computer for a proxy server? (Choose two.)","o":["port number on the proxy server","administrator name on the proxy server","IP address of the proxy server","MAC address of the proxy server","IP address of the local computer","MAC address of the local computer","administrator password on the local computer"],"c":[2,0],"e":"Correct answers: A, C. A. port number on the proxy server; C. IP address of the proxy server\n\nSource note: Extra file category 18 Computer and Network Security, Q13.","src":"extra-reworded"},{"d":2,"t":"flash","q":"What does a screened subnet (DMZ)?\n____\n____\n____","a":"A screened subnet/DMZ exposes public-facing services while isolating them from the internal LAN with firewall rules.","e":"Expected answer:\nA screened subnet/DMZ exposes public-facing services while isolating them from the internal LAN with firewall rules.\n\nExtra file category 18 Computer and Network Security, Q14.","src":"extra-reworded"},{"d":2,"q":"A virtual machine used in a small company should have anti-malware installed.","o":["True","False"],"c":0,"e":"Correct answer: A. True\n\nSource note: Extra file category 18 Computer and Network Security, Q15.","src":"extra-reworded"},{"d":2,"q":"Which phishing term describes an attempt to get information or something from corporate executives?","o":["scareware","vishing","smishing","spear phishing","whaling"],"c":4,"e":"Correct answer: E. whaling\n\nSource note: Extra file category 18 Computer and Network Security, Q16.","src":"extra-reworded"},{"d":2,"q":"No one can ping a specific Windows computer. What administrative tool can be used to change this default behavior?","o":["File Explorer > Internet options","Windows Firewall","Windows Defender","Local Security Policy"],"c":1,"e":"Correct answer: B. Windows Firewall\n\nSource note: Extra file category 18 Computer and Network Security, Q17.","src":"extra-reworded"},{"d":2,"q":"Which type of unsolicited internet message records the URLs visited and keystrokes used?","o":["spyware","virus","spam","grayware"],"c":0,"e":"Correct answer: A. spyware\n\nSource note: Extra file category 18 Computer and Network Security, Q18.","src":"extra-reworded"},{"d":2,"q":"An unofficial email sent from your bank asks you to click a link to verify your account information. Which type of social engineering is this?","o":["VPN","phishing","spyware","grayware"],"c":1,"e":"Correct answer: B. phishing\n\nSource note: Extra file category 18 Computer and Network Security, Q19.","src":"extra-reworded"},{"d":2,"q":"Match the incident on the left with an action on the right. Use each answer once. ____ virus\n____ child exploitation\n____ software piracy\n____ phishing\nChoices:\nA. BSA\nB. police department\nC. CERT\nD. FBI Internet Crime Complaint Center","o":["virus = A\nchild exploitation = D\nsoftware piracy = B\nphishing = C","virus = C\nchild exploitation = B\nsoftware piracy = A\nphishing = D","virus = B\nchild exploitation = D\nsoftware piracy = C\nphishing = A","virus = C\nchild exploitation = A\nsoftware piracy = D\nphishing = B"],"c":1,"e":"Correct mapping:\nvirus = C\nchild exploitation = B\nsoftware piracy = A\nphishing = D\n\nSource note: Extra file category 18 Computer and Network Security, Q20.","src":"extra-reworded"},{"d":4,"q":"You are working in an area that has multiple cubicles with multiple PCs. You see smoke coming from the laser printer in the area where you are working. You pull the fire alarm, tell everyone to leave (and they do), and grab the fire extinguisher. Now what do you do?","o":["Push the lever to engage or activate the pump inside the extinguisher.","Aim the nozzle at the printer.","Squeeze the handle and slowly move the nozzle back and forth.","Pull out the fire extinguisher pin."],"c":3,"e":"Correct answer: D. Pull out the fire extinguisher pin.\n\nSource note: Extra file category 19 Operational Procedures, Q1.","src":"extra-reworded"},{"d":4,"q":"A bank has an IT policy which states that no changes may be made to any system that deals with customer data during the last week of the month because customer statements are being produced. Which change management term does this describe?","o":["security policy","SOW","change freeze","emergency change"],"c":2,"e":"Correct answer: C. change freeze\n\nSource note: Extra file category 19 Operational Procedures, Q2.","src":"extra-reworded"},{"d":4,"q":"On which device would a PC technician most likely see a grounding wire?","o":["air vent","patch panel","laser printer","wiring rack"],"c":3,"e":"Correct answer: D. wiring rack\n\nSource note: Extra file category 19 Operational Procedures, Q3.","src":"extra-reworded"},{"d":4,"q":"A company is implementing new payroll software. The project manager has outlined the scope of the project, responsibilities, due dates, and quality assurance checkpoints. What is missing from this plan?","o":["network topology diagrams","backup testing","backout plan","end-user acceptance"],"c":2,"e":"Correct answer: C. backout plan\n\nSource note: Extra file category 19 Operational Procedures, Q4.","src":"extra-reworded"},{"d":4,"q":"A computer technician’s repair kit should always include which of the following?","o":["Surge suppressor, laptop enclosure case, and resealable antistatic bags","Safety glasses/goggles, gloves, and dust mask/air filtration mask","Pen, paper, and ID badge","Soap, toothbrush, and toothpaste"],"c":2,"e":"Correct answer: C. Pen, paper, and ID badge\n\nSource note: Extra file category 19 Operational Procedures, Q5.","src":"extra-reworded"},{"d":4,"q":"Which UL rating and surge suppressor class would be best when ordering new surge strips for a small business? (Choose two.)","o":["UL 497","UL 1283","UL 1449","Class B","Class A","Class C"],"c":[2,4],"e":"Correct answers: C, E. C. UL 1449; E. Class A\n\nSource note: Extra file category 19 Operational Procedures, Q6.","src":"extra-reworded"},{"d":4,"q":"Which part of the change management cycle would include an evaluation of whether a particular IT change is worth implementing?","o":["Plan purpose","Plan scope","Risk analysis","Backup plan"],"c":2,"e":"Correct answer: C. Risk analysis\n\nSource note: Extra file category 19 Operational Procedures, Q7.","src":"extra-reworded"},{"d":4,"q":"What is a safety risk related to old or damaged batteries?","o":["They can contain lead.","They can leak acid.","They can contain water.","All sizes are interchangeable."],"c":1,"e":"Correct answer: B. They can leak acid.\n\nSource note: Extra file category 19 Operational Procedures, Q8.","src":"extra-reworded"},{"d":4,"q":"Equipment grounding means which of the following?","o":["The technician wears a tether device.","Someone could receive a shock or be electrocuted from simply touching the case.","The components in a computer are all the same voltage potential.","The equipment is tethered to a desk."],"c":2,"e":"Correct answer: C. The components in a computer are all the same voltage potential.\n\nSource note: Extra file category 19 Operational Procedures, Q9.","src":"extra-reworded"},{"d":4,"q":"Which method is best for cleaning up scattered laser toner particles?","o":["Use a vacuum cleaner equipped with a HEPA filter.","Use moist paper towels to wipe up particles.","Use your shirt sleeve to make them disappear.","Use a hair dryer to blow away the residue."],"c":0,"e":"Correct answer: A. Use a vacuum cleaner equipped with a HEPA filter.\n\nSource note: Extra file category 19 Operational Procedures, Q10.","src":"extra-reworded"},{"d":4,"q":"In what situations would it be most appropriate for an IT technician to wear business casual attire instead of wearing business formal attire? (Choose two.)","o":["When representing the company at a local business event","When attending a virtual meeting of the change management board regarding an upcoming project","When presenting the latest departmental statistics on downtime and escalations to the VP of business affairs","When going to a business to repair a PC","When meeting with the chief information officer (CIO) and some board members regarding an idea they had for saving money in the department for the company."],"c":[3,1],"e":"Correct answers: B, D. B. When attending a virtual meeting of the change management board regarding an upcoming project; D. When going to a business to repair a PC\n\nSource note: Extra file category 19 Operational Procedures, Q11.","src":"extra-reworded"},{"d":4,"q":"What is the best way to dispose of mobile devices, PCs, monitors, toner, and batteries?","o":["Deposit them in a local municipality-approved receptacle.","Call 911.","Dump them in landfills.","Burn them in bonfires."],"c":0,"e":"Correct answer: A. Deposit them in a local municipality-approved receptacle.\n\nSource note: Extra file category 19 Operational Procedures, Q12.","src":"extra-reworded"},{"d":4,"q":"In the event of an electrical fire, which types of fire extinguishers would be best? (Choose two.)","o":["Type B fire extinguisher","Type C fire extinguisher","Type A fire extinguisher","Type A-B-C fire extinguisher","Type D fire extinguisher"],"c":[1,3],"e":"Correct answers: B, D. B. Type C fire extinguisher; D. Type A-B-C fire extinguisher\n\nSource note: Extra file category 19 Operational Procedures, Q13.","src":"extra-reworded"},{"d":4,"q":"A device that protects electronic equipment from an increase in power but not a decrease or an outage is a ____.","o":["UPS","CRT","battery backup","surge suppressor"],"c":3,"e":"Correct answer: D. surge suppressor\n\nSource note: Extra file category 19 Operational Procedures, Q14.","src":"extra-reworded"},{"d":4,"q":"When encountering a difficult or confrontational customer, the best thing to do initially is which of the following?","o":["Reschedule the appointment.","Call a supervisor.","Suggest taking a short break.","Step back and take a few deep breaths before responding."],"c":3,"e":"Correct answer: D. Step back and take a few deep breaths before responding.\n\nSource note: Extra file category 19 Operational Procedures, Q15.","src":"extra-reworded"},{"d":4,"q":"Federal, state, and local governments do not interact with one another concerning toxic waste issues.","o":["True","False"],"c":1,"e":"Correct answer: B. False\n\nSource note: Extra file category 19 Operational Procedures, Q16.","src":"extra-reworded"},{"d":4,"q":"Which safety measure would be helpful in a network wiring closet that is filled with particulate matter (PM) and that is being cleaned for the first time in years as the cabling is reorganized?","o":["HEPA vacuum","air filtration mask","UL 1449 device","compressed air"],"c":1,"e":"Correct answer: B. air filtration mask\n\nSource note: Extra file category 19 Operational Procedures, Q17.","src":"extra-reworded"},{"d":4,"q":"Laser toner cartridges ____.","o":["can be donated to charities","can be refilled many times","must be disposed of in an approved regulated receptacle","are easily recycled anywhere"],"c":2,"e":"Correct answer: C. must be disposed of in an approved regulated receptacle\n\nSource note: Extra file category 19 Operational Procedures, Q18.","src":"extra-reworded"},{"d":4,"q":"A user has requested help downloading and installing software on the corporate laptop. Which of the following IT documentation types would a technician use in this case?","o":["acceptable use policy","article","security policy","inventory management","network topology diagram"],"c":0,"e":"Correct answer: A. acceptable use policy\n\nSource note: Extra file category 19 Operational Procedures, Q19.","src":"extra-reworded"},{"d":4,"q":"Which items would be used as part of inventory management? (Choose two.)","o":["AUP","incident documentation","asset tag","flatbed scanner","barcode"],"c":[2,4],"e":"Correct answers: C, E. C. asset tag; E. barcode\n\nSource note: Extra file category 19 Operational Procedures, Q20.","src":"extra-reworded"}];
const EXTRA_QUESTIONS1C = [{"d":1,"obj":"1.1","q":"A user's laptop touchpad no longer clicks evenly and the bottom case has started to bulge. What is the most likely cause?","o":["A failing CMOS battery","A swollen battery","A loose hinge","A cracked digitizer"],"c":1,"e":"A bulging case and a touchpad that won't sit flat are classic signs of a swollen lithium battery. Stop using it, don't puncture it, and replace it."},{"d":1,"obj":"1.1","q":"After replacing a laptop's display assembly, the user reports very weak Wi-Fi. What did the technician most likely overlook?","o":["Updating the GPU driver","Reconnecting the antenna leads routed through the hinge","Enabling airplane mode","Reseating the RAM"],"c":1,"e":"Wi-Fi/Bluetooth antennas usually run up through the display hinges to the top of the bezel. If the tiny leads aren't reconnected to the wireless card, signal is weak or dead."},{"d":1,"obj":"1.1","q":"A customer asks to add more RAM to a thin ultrabook, but the service manual lists no replaceable memory. Why is the upgrade likely impossible?","o":["The RAM is soldered to the board","The battery is glued down","The OS is 32-bit","The SSD is encrypted"],"c":0,"e":"Many thin laptops solder RAM (and sometimes storage) directly to the board to save space, so memory can't be upgraded. Always check the specific model first."},{"d":1,"obj":"1.1","q":"What should a technician do first before opening a laptop to replace an internal part?","o":["Run a virus scan","Power off and disconnect or remove the battery","Update the BIOS","Defragment the drive"],"c":1,"e":"Removing or disconnecting the battery before working inside prevents short circuits and accidental power-on damage."},{"d":1,"obj":"1.2","q":"Which connector is reversible and can carry data, power, and video over a single cable?","o":["microUSB","USB-C","USB-A","Lightning"],"c":1,"e":"USB-C is reversible and a single port can carry data, power, and video, which is why it has replaced microUSB on most new devices."},{"d":1,"obj":"1.2","q":"At their desk a user wants their laptop to gain wired Ethernet, several USB ports, and two external monitors through one connection. Which accessory is the best fit?","o":["Port replicator","Docking station","USB flash drive","KVM switch"],"c":1,"e":"A docking station expands a laptop's capabilities, often adding power, multiple video outputs, extra USB, and wired Ethernet through one connector."},{"d":1,"obj":"1.2","q":"How does a port replicator generally differ from a full docking station?","o":["It mainly duplicates existing ports, often over USB, without adding major capabilities","It always adds a dedicated GPU","It only works with Apple devices","It provides cellular connectivity"],"c":0,"e":"A port replicator mostly replicates the ports the laptop already has (frequently over a single USB connection) and is simpler and more portable than a docking station."},{"d":1,"obj":"1.2","q":"Which short-range wireless technology works only at a few centimeters and is used for tap-to-pay?","o":["Bluetooth","NFC","Wi-Fi","Infrared"],"c":1,"e":"NFC works at a few centimeters by design; the tiny range makes tap-to-pay and quick pairing more secure."},{"d":1,"obj":"1.3","q":"Which component identifies a phone to its cellular carrier and can be either a removable card or a built-in chip?","o":["TPM","SIM/eSIM","NIC","APN profile"],"c":1,"e":"A SIM holds subscriber info that ties a device to a carrier and number; an eSIM is the same idea built into the device, activated by software."},{"d":1,"obj":"1.3","q":"A user cannot pair a Bluetooth speaker to their phone. Which step is most commonly missed?","o":["Installing a driver","Making the device discoverable / enabling pairing mode","Assigning a static IP","Disabling Wi-Fi"],"c":1,"e":"Pairing requires enabling Bluetooth and putting a device into discoverable/pairing mode; skipping that step is the usual reason pairing fails."},{"d":1,"obj":"1.3","q":"A company needs to push email configuration to staff phones and remotely wipe a lost device. Which solution provides this?","o":["VPN","MDM","NAT","RDP"],"c":1,"e":"Mobile Device Management (MDM) enforces policy, pushes corporate apps and settings, and can remotely lock or wipe lost devices."},{"d":1,"obj":"1.3","q":"A user keeps exceeding their cellular data plan because of large automatic backups. Which setting best addresses this?","o":["Disable GPS","Restrict backups and sync to Wi-Fi only","Turn off Bluetooth","Leave airplane mode on permanently"],"c":1,"e":"Limiting large syncs and backups to Wi-Fi prevents them from consuming the cellular data cap."},{"d":2,"obj":"2.1","q":"Which port does HTTPS use?","o":["80","143","443","3389"],"c":2,"e":"HTTPS (HTTP encrypted with TLS) uses TCP port 443; plain HTTP uses 80."},{"d":2,"obj":"2.1","q":"Which secure protocol on port 22 is the standard replacement for Telnet for remote command-line access?","o":["RDP","SSH","FTP","SNMP"],"c":1,"e":"SSH provides an encrypted remote command line on port 22; Telnet (port 23) is plain text and insecure."},{"d":2,"obj":"2.1","q":"Which email protocol synchronizes messages across devices and leaves mail on the server, using port 143?","o":["POP3","SMTP","IMAP","LDAP"],"c":2,"e":"IMAP (143) syncs mail across devices and keeps it on the server; POP3 (110) typically downloads and removes it."},{"d":2,"obj":"2.1","q":"Which transport protocol is connectionless and preferred for VoIP and live video, where speed matters more than guaranteed delivery?","o":["TCP","UDP","ICMP","ARP"],"c":1,"e":"UDP is connectionless and fast with no re-sending, making it ideal for real-time voice and video; TCP is reliable but slower."},{"d":2,"obj":"2.1","q":"Which port number is used by Microsoft Remote Desktop (RDP)?","o":["22","389","445","3389"],"c":3,"e":"RDP uses TCP 3389 to control a Windows machine's graphical desktop remotely."},{"d":2,"obj":"2.2","q":"On the 2.4 GHz band, which three channels are non-overlapping?","o":["1, 5, 9","1, 6, 11","2, 7, 12","3, 6, 9"],"c":1,"e":"Channels 1, 6, and 11 are the standard non-overlapping choices on the crowded 2.4 GHz band."},{"d":2,"obj":"2.2","q":"Which Wi-Fi band offers the longest range and best wall penetration but the slowest, most congested performance?","o":["2.4 GHz","5 GHz","6 GHz","60 GHz"],"c":0,"e":"Lower frequency means longer range and better wall penetration but slower speeds; 2.4 GHz is also the most crowded band."},{"d":2,"obj":"2.2","q":"Which 802.11 standard (Wi-Fi 6E) adds use of the 6 GHz band?","o":["802.11n","802.11ac","802.11ax","802.11g"],"c":2,"e":"802.11ax (Wi-Fi 6/6E) is the newest standard and adds access to the 6 GHz band in its 6E form."},{"d":2,"obj":"2.2","q":"Which wireless encryption standard is currently the strongest choice?","o":["WEP","WPA","WPA2","WPA3"],"c":3,"e":"WPA3 is the current strongest standard; WPA2 (AES) is still acceptable, while WPA and WEP are weak or broken."},{"d":2,"obj":"2.3","q":"Users can reach websites by IP address but not by name. Which server role is most likely failing?","o":["DHCP","DNS","NTP","Proxy"],"c":1,"e":"If IP works but names don't resolve, DNS (name-to-IP resolution) is the likely problem."},{"d":2,"obj":"2.3","q":"Which service automatically provides clients an IP address, subnet mask, default gateway, and DNS server?","o":["DNS","DHCP","LDAP","SMTP"],"c":1,"e":"DHCP automatically assigns IP configuration; if it fails, clients fall back to a 169.254 APIPA address."},{"d":2,"obj":"2.3","q":"Which appliance distributes incoming traffic across several servers so none is overwhelmed?","o":["Proxy server","Load balancer","Spam gateway","Syslog server"],"c":1,"e":"A load balancer spreads requests across multiple servers to improve capacity and availability."},{"d":2,"obj":"2.3","q":"Which all-in-one security appliance combines firewall, antivirus, and intrusion prevention?","o":["UTM","NAS","NTP","ONT"],"c":0,"e":"Unified Threat Management (UTM) bundles multiple security functions into one device."},{"d":2,"obj":"2.4","q":"Which DNS record maps a hostname to an IPv4 address?","o":["AAAA","CNAME","A","MX"],"c":2,"e":"An A record maps a name to an IPv4 address; AAAA maps to IPv6, CNAME is an alias, and MX points to a mail server."},{"d":2,"obj":"2.4","q":"Which DNS record identifies the mail server responsible for a domain?","o":["A","MX","TXT","PTR"],"c":1,"e":"The MX (mail exchanger) record specifies which server receives a domain's email."},{"d":2,"obj":"2.4","q":"What does a DHCP reservation do?","o":["Blocks an address from being used","Permanently ties a specific IP to a device's MAC address","Shortens the lease time","Hides the SSID"],"c":1,"e":"A reservation maps a fixed IP to a particular MAC so that device (for example, a printer) always gets the same address."},{"d":2,"obj":"2.4","q":"Which technology logically separates one physical switch into isolated networks for security and reduced congestion?","o":["VPN","VLAN","NAT","DMZ"],"c":1,"e":"A VLAN splits a switch into separate logical networks, isolating groups like accounting and guests on shared hardware."},{"d":2,"obj":"2.4","q":"Which email-authentication method digitally signs messages to prove they were not altered in transit?","o":["SPF","DKIM","DMARC","CNAME"],"c":1,"e":"DKIM signs messages so receivers can verify integrity; SPF lists authorized senders and DMARC sets policy when checks fail."},{"d":2,"obj":"2.5","q":"Which device forwards traffic between different networks using IP addresses?","o":["Switch","Router","Hub","Access point"],"c":1,"e":"A router operates at Layer 3 and forwards traffic between networks using IP addresses."},{"d":2,"obj":"2.5","q":"Which device forwards frames within a single LAN using MAC addresses and learns which device is on each port?","o":["Router","Switch","Modem","Firewall"],"c":1,"e":"A switch operates at Layer 2, forwarding frames by MAC address and learning the port for each device."},{"d":2,"obj":"2.5","q":"How does a ceiling-mounted wireless access point with no nearby outlet most likely receive power?","o":["Solar panel","Power over Ethernet (PoE)","Internal battery","USB cable"],"c":1,"e":"PoE delivers power and data over the same Ethernet cable, from a PoE switch or an inline injector."},{"d":2,"obj":"2.5","q":"Which device converts the light signal from a fiber connection into an electrical signal a router can use?","o":["Cable modem","ONT","Patch panel","NIC"],"c":1,"e":"An optical network terminal (ONT) converts fiber light into an electrical signal for the customer's equipment."},{"d":2,"obj":"2.5","q":"What distinguishes a managed switch from an unmanaged switch?","o":["It is always wireless","It can be configured for features like VLANs and monitoring","It cannot learn MAC addresses","It only works with fiber"],"c":1,"e":"Managed switches can be configured (VLANs, monitoring, and so on); unmanaged switches simply work out of the box."},{"d":2,"obj":"2.6","q":"A client set to obtain an address automatically shows 169.254.10.5. What does this indicate?","o":["A static IP is set correctly","The client could not reach a DHCP server (APIPA)","DNS is misconfigured","The gateway is using IPv6"],"c":1,"e":"A 169.254.x.x APIPA address means the client failed to reach a DHCP server."},{"d":2,"obj":"2.6","q":"A new SOHO router still uses its factory admin password. What is the most important hardening step?","o":["Hide the SSID","Change the default administrator credentials","Lower the transmit power","Disable the guest network"],"c":1,"e":"Default credentials are widely published, so changing them is the top priority."},{"d":2,"obj":"2.6","q":"Which feature lets visitors use the internet without reaching the internal LAN?","o":["Port forwarding","Guest network","DMZ","UPnP"],"c":1,"e":"A guest network isolates visitor devices from internal resources while still providing internet access."},{"d":2,"obj":"2.6","q":"A subnet mask of 255.255.255.0 means which part of the address identifies the network?","o":["Only the last octet","The first three octets","All four octets","None of it"],"c":1,"e":"With 255.255.255.0, the first three octets are the network and the last octet identifies the host."},{"d":2,"obj":"2.6","q":"A network printer must always keep the same address. Which approach is appropriate?","o":["Leave it on dynamic DHCP","Assign a static IP or a DHCP reservation","Use an APIPA address","Disable DHCP for the whole network"],"c":1,"e":"A static IP or a DHCP reservation ensures the printer's address never changes."},{"d":2,"obj":"2.8","q":"Which tool attaches an RJ45 connector onto the end of a network cable?","o":["Punchdown tool","Crimper","Cable tester","Toner probe"],"c":1,"e":"A crimper attaches RJ45 connectors to cable ends."},{"d":2,"obj":"2.8","q":"Which tool helps locate one specific cable within a large bundle by the sound it produces?","o":["Loopback plug","Tone generator and probe","Multimeter","Crimper"],"c":1,"e":"A tone generator and probe (toner probe, or 'fox and hound') identifies a specific cable by sound."},{"d":2,"obj":"2.8","q":"Which tool seats individual wires into a patch panel or keystone jack?","o":["Crimper","Punchdown tool","Cable stripper","Wi-Fi analyzer"],"c":1,"e":"A punchdown tool pushes and trims wires into the IDC contacts of a patch panel or jack."},{"d":2,"obj":"2.8","q":"Which tool confirms that a finished cable is wired correctly from end to end?","o":["Cable tester","Loopback plug","Toner probe","Multimeter"],"c":0,"e":"A cable tester verifies correct pinout and continuity across a finished cable."},{"d":2,"obj":"2.8","q":"Which tool loops a port's output back to its input to test whether the port itself works?","o":["Network tap","Loopback plug","Punchdown tool","Crimper"],"c":1,"e":"A loopback plug feeds a port's output back into its input to test the port itself."},{"d":3,"obj":"3.1","q":"Which display technology has each pixel produce its own light, giving true blacks but risking burn-in?","o":["IPS LCD","TN LCD","OLED","Mini-LED"],"c":2,"e":"OLED pixels make their own light and can switch fully off for true black, but static images can cause burn-in."},{"d":3,"obj":"3.1","q":"Which LCD panel type offers the best color accuracy and viewing angles?","o":["TN","IPS","VA","CCFL"],"c":1,"e":"IPS panels have the best color accuracy and viewing angles, favored for design work."},{"d":3,"obj":"3.1","q":"What does a display's refresh rate measure?","o":["Pixels per inch","How many times per second the image redraws","The range of colors shown","Brightness in nits"],"c":1,"e":"Refresh rate (in Hz) is how many times per second the image redraws; 120/144 Hz looks smoother than 60 Hz."},{"d":3,"obj":"3.1","q":"On an older CCFL-backlit LCD, which component converts DC to the high-voltage AC the backlight needs and often causes dim or flickering screens when it fails?","o":["Digitizer","Inverter","Backlight diffuser","Polarizer"],"c":1,"e":"The inverter supplied high-voltage AC to a CCFL backlight; its failure caused dim or flickering displays. Modern LED backlights don't use one."},{"d":3,"obj":"3.2","q":"Which connector is used to terminate a twisted-pair Ethernet cable?","o":["RJ11","RJ45","F-type","BNC"],"c":1,"e":"RJ45 is the 8-pin connector for Ethernet; RJ11 is for phone lines."},{"d":3,"obj":"3.2","q":"A USB port with a blue plastic insert most likely indicates which standard?","o":["USB 2.0","USB 3.0 (SuperSpeed)","Charging only","Thunderbolt"],"c":1,"e":"A blue insert is the common visual cue for USB 3.0 (SuperSpeed); USB 2.0 ports are usually black."},{"d":3,"obj":"3.2","q":"Which fiber-optic type is best suited for very long-distance, carrier-grade runs?","o":["Multimode","Single-mode","Plenum","Coaxial"],"c":1,"e":"Single-mode fiber carries light very long distances; multimode is cheaper for shorter in-building runs."},{"d":3,"obj":"3.2","q":"Which cabling is required in air-handling spaces above drop ceilings because of its fire-resistant jacket?","o":["Direct burial","Plenum-rated","Riser-rated","Shielded twisted pair"],"c":1,"e":"Plenum-rated cable has a fire-safe jacket required in air-circulation ceiling and floor spaces."},{"d":3,"obj":"3.2","q":"Among VGA, DVI, HDMI, and DisplayPort, which carries an analog signal only?","o":["VGA","DVI","HDMI","DisplayPort"],"c":0,"e":"VGA is the oldest, analog 15-pin video connector; the others are digital."},{"d":3,"obj":"3.5","q":"Which motherboard form factor is the largest?","o":["Mini-ITX","microATX","ATX","Nano-ITX"],"c":2,"e":"From largest to smallest: ATX, microATX, then Mini-ITX."},{"d":3,"obj":"3.5","q":"A CPU will not physically fit a motherboard. Which characteristic must match between them?","o":["RAM type","CPU socket","PSU wattage","Case size"],"c":1,"e":"The CPU socket must match the processor; Intel and AMD use different sockets that also change between generations."},{"d":3,"obj":"3.5","q":"Which slot is used to install a modern dedicated graphics card?","o":["PCIe x1","PCIe x16","M.2","SATA"],"c":1,"e":"Graphics cards use a PCIe x16 slot for the bandwidth they require."},{"d":3,"obj":"3.5","q":"Which BIOS/UEFI setting must be enabled to run virtual machines efficiently?","o":["Secure Boot","Virtualization support (VT-x / AMD-V)","Fast Boot","Clearing the TPM"],"c":1,"e":"Hardware virtualization (Intel VT-x / AMD-V) must be enabled in firmware for good VM performance."},{"d":3,"obj":"3.5","q":"What is applied between the CPU and heat sink to improve heat transfer?","o":["Dielectric grease","Thermal paste","Epoxy","Soldering flux"],"c":1,"e":"A thin, even layer of thermal paste fills the microscopic gap between CPU and heat sink for good thermal contact."},{"d":3,"obj":"3.6","q":"What does a power supply unit (PSU) do?","o":["Stores user data","Converts AC wall power into DC voltages","Cools the CPU","Manages the boot order"],"c":1,"e":"The PSU converts the wall's AC into the low-voltage DC the computer's components use."},{"d":3,"obj":"3.6","q":"Which PSU output rail is the primary one feeding the CPU, GPU, drives, and fans?","o":["+3.3V","+5V","+12V","-12V"],"c":2,"e":"The +12V rail is the main one powering the CPU, GPU, drives, and fans."},{"d":3,"obj":"3.6","q":"Which connector is the PSU's main motherboard power connector?","o":["4-pin Molex","24-pin (20+4)","6-pin PCIe","SATA power"],"c":1,"e":"The 24-pin (a 20-pin plus a detachable 4-pin) is the main motherboard power connector."},{"d":3,"obj":"3.6","q":"When selecting a PSU, which spec must exceed the system's total power draw with headroom?","o":["Efficiency rating","Wattage","Cable length","Number of rails"],"c":1,"e":"Total wattage must exceed the system's draw with headroom; the GPU is usually the largest consumer."},{"d":3,"obj":"3.6","q":"Why should a technician never open a power supply, even when it is unplugged?","o":["It voids the motherboard warranty","Internal capacitors can hold a dangerous charge","It releases toxic gas","It resets the BIOS"],"c":1,"e":"PSU capacitors can retain a hazardous charge even after being unplugged, so the unit is replaced, not opened."},{"d":3,"obj":"3.8","q":"Which maintenance tasks are appropriate for a laser printer? (Choose two.)","o":["Replace the ribbon","Replace toner and apply the maintenance kit","Replace heat-sensitive paper","Calibrate and clean the printer"],"c":[1,3],"e":"Laser printer maintenance includes replacing toner, applying the maintenance kit, calibrating, and cleaning. Ribbons and heat-sensitive paper belong to impact and thermal printers."},{"d":3,"obj":"3.8","q":"An inkjet prints with missing lines even though the cartridge is full. What should the technician try first?","o":["Replace the fuser","Run the printhead cleaning utility","Replace the drum","Reinstall the OS"],"c":1,"e":"Clogged inkjet nozzles cause missing lines; running the printhead/nozzle cleaning utility is the first step."},{"d":3,"obj":"3.8","q":"Which maintenance task is specific to a thermal printer?","o":["Replace the toner cartridge","Replace the special heat-sensitive paper and clean the heating element","Replace the ribbon","Replace the fuser"],"c":1,"e":"Thermal printers use heat on special paper; maintenance means replacing that paper and cleaning the heating element."},{"d":3,"obj":"3.8","q":"Which consumable is replaced as part of routine impact (dot-matrix) printer maintenance?","o":["Toner cartridge","Inked ribbon","Fuser","Imaging drum"],"c":1,"e":"Impact printers strike an inked ribbon against the paper; the ribbon is a routine replacement item."},{"d":4,"obj":"4.1","q":"A virtual machine is best described as which of the following?","o":["A guest OS running within a host, managed by a hypervisor","A second physical CPU","A type of cloud storage","A backup file format"],"c":0,"e":"A VM is a guest operating system running within a host, with the hypervisor managing it and the shared hardware."},{"d":4,"obj":"4.1","q":"Which hypervisor type runs directly on the hardware with no underlying host OS?","o":["Type 1 (bare-metal)","Type 2 (hosted)","Type 3","Containerized"],"c":0,"e":"Type 1 (bare-metal) hypervisors run directly on hardware and are used in data centers; Type 2 runs as an app on a host OS."},{"d":4,"obj":"4.1","q":"How do containers differ from full virtual machines?","o":["They each include a complete OS","They share the host's OS kernel and are lighter weight","They require a Type 1 hypervisor","They cannot run applications"],"c":1,"e":"Containers share the host kernel instead of bundling a full OS, so they start fast and use far fewer resources than VMs."},{"d":4,"obj":"4.1","q":"Which virtualization feature lets you save a VM's exact state so you can roll back after a bad change?","o":["Snapshot","Disk wipe","Live migration","Thin provisioning"],"c":0,"e":"A snapshot captures a VM's state; if a change goes wrong you can roll back to it in seconds."},{"d":5,"obj":"5.1","q":"A desktop's clock keeps losing time and BIOS settings reset between boots. Which component is the likely cause?","o":["Power supply","CMOS battery","RAM","CPU fan"],"c":1,"e":"A weak or dead CMOS coin-cell battery causes the clock to drift and settings to reset; replace it."},{"d":5,"obj":"5.1","q":"A PC powers on, emits POST beep codes, and shows no video. What should the technician reseat first?","o":["The SATA cable","The RAM","The CMOS battery","The front-panel connector"],"c":1,"e":"Beep codes with no video commonly point to memory; reseating (or testing) RAM is a sensible first step."},{"d":5,"obj":"5.1","q":"A technician finds bulging, leaking capacitors on a motherboard. What is the correct action?","o":["Reflash the BIOS","Replace the motherboard","Add more RAM","Clean it with compressed air"],"c":1,"e":"Swollen or leaking capacitors indicate failing hardware; the board (or affected component) should be replaced."},{"d":5,"obj":"5.1","q":"A computer randomly shuts itself off after running under heavy load for a while. What is the most likely cause?","o":["A corrupt OS","Overheating","A bad monitor","A DNS error"],"c":1,"e":"A system that powers off under load is often overheating and shutting down to protect itself; check fans, paste, and airflow (a failing PSU is also possible)."},{"d":5,"obj":"5.2","q":"A mechanical hard drive begins making clicking and grinding noises. What should the technician do?","o":["Defragment the drive","Back up the data immediately because the drive is failing","Reformat the drive","Update the BIOS"],"c":1,"e":"Clicking and grinding signal imminent mechanical HDD failure; back up data right away."},{"d":5,"obj":"5.2","q":"A drive reports a S.M.A.R.T. failure but still works. What is the best action?","o":["Ignore it until it stops working","Replace the drive now","Run a disk defrag","Disable S.M.A.R.T."],"c":1,"e":"A S.M.A.R.T. failure predicts imminent failure; replace the drive even if it currently functions."},{"d":5,"obj":"5.2","q":"A RAID array sounds an alarm and a member disk shows a fault LED. What should the technician do?","o":["Delete the array","Identify and replace the failed disk so the array can rebuild","Convert the array to RAID 0","Reinstall the OS"],"c":1,"e":"Replace the failed member so the controller can rebuild the array; check controller and drive status LEDs."},{"d":5,"obj":"5.2","q":"At startup a system reports 'bootable device not found.' Which is NOT a likely cause?","o":["Incorrect boot order","A failed or undetected drive","Corrupt boot files","A clogged printer fuser"],"c":3,"e":"A printer fuser has nothing to do with booting. Boot order, an undetected or failed drive, or corrupt boot files are the real culprits."},{"d":5,"obj":"5.3","q":"A projector shuts off by itself after several minutes of use. What is the most likely cause?","o":["Wrong DNS server","Overheating from a clogged filter or poor airflow","A dead CMOS battery","A bad keyboard"],"c":1,"e":"Projectors shut down to protect the bulb when overheating; clean the filters and ensure airflow."},{"d":5,"obj":"5.3","q":"A monitor shows a few individual points that are permanently off or stuck on. What does this describe?","o":["Burn-in","Dead pixels","Ghosting","Backlight bleed"],"c":1,"e":"Individual pixels stuck off or on are dead pixels, a panel defect."},{"d":5,"obj":"5.3","q":"A display shows no image at all. Which should the technician check first?","o":["The DNS settings","The input source selection and the video cable","The page file size","The print spooler"],"c":1,"e":"Start with the simplest causes: the selected input source and a loose or bad video cable (and the bulb on a projector)."},{"d":5,"obj":"5.3","q":"An OLED display in a lobby shows a faint permanent ghost of a logo that is always on screen. What is this?","o":["Dead pixels","Burn-in","Dim backlight","Distortion"],"c":1,"e":"A persistent static image on OLED or plasma can cause burn-in, a faint permanent ghost."},{"d":5,"obj":"5.5","q":"A user can ping external IP addresses but cannot reach any website by name. What is the most likely problem?","o":["A bad NIC","DNS resolution failure","A failed power supply","A duplex mismatch"],"c":1,"e":"If IP works but names don't, DNS resolution is the likely issue."},{"d":5,"obj":"5.5","q":"A workstation set to DHCP shows a 169.254.x.x address and limited connectivity. What does this indicate?","o":["A static IP conflict","The device couldn't reach a DHCP server (APIPA)","A DNS misconfiguration","A normal IPv6 address"],"c":1,"e":"A 169.254 APIPA address means the client failed to reach a DHCP server."},{"d":5,"obj":"5.5","q":"During VoIP calls users report choppy audio caused by inconsistent packet timing. What is this symptom called?","o":["Latency","Jitter","Attenuation","Crosstalk"],"c":1,"e":"Jitter is inconsistent packet timing that degrades real-time voice and video; it is a QoS/congestion issue."},{"d":5,"obj":"5.5","q":"A switch port repeatedly goes up and down, disrupting a connection. What is this called and what should you check?","o":["Port flapping; check the cable, NIC, or switch port","APIPA; renew DHCP","Broadcast storm; reboot the router","DNS poisoning; flush the cache"],"c":0,"e":"A link repeatedly cycling up and down is port flapping, usually caused by a bad cable, NIC, or switch port."},{"d":5,"obj":"5.6","q":"A laser printer's output shows repeated ghost images of a previous part of the page. Which components are most likely involved?","o":["Pickup rollers","The imaging drum or fuser","The paper tray","The network cable"],"c":1,"e":"Ghosting or double images on a laser printer typically point to a failing drum or fuser."},{"d":5,"obj":"5.6","q":"Pages from a laser printer smear and the toner rubs off easily. Which part is at fault?","o":["The fuser","The pickup roller","The toner hopper","The duplexer"],"c":0,"e":"If toner isn't bonded to the page, the fuser (which applies heat and pressure) is failing."},{"d":5,"obj":"5.6","q":"Multiple print jobs are stuck in a frozen Windows print queue. What is the best fix?","o":["Reinstall Windows","Restart the Print Spooler service","Replace the printer","Change the IP address"],"c":1,"e":"Restarting the Print Spooler service clears a stuck queue."},{"d":5,"obj":"5.6","q":"A printer produces garbled, nonsensical output. What is the most likely cause?","o":["Low toner","A wrong or corrupt printer driver","A paper jam","A dead CMOS battery"],"c":1,"e":"Garbled output usually indicates the wrong or a corrupt printer driver."}];

function saveLesson(d, idx){ const p=prog(); p.lessons[d]=p.lessons[d]||[]; if(!p.lessons[d].includes(idx)) p.lessons[d].push(idx); store.write(allProg); }

const app=document.getElementById('app');
let quiz=null;
function go(view,arg){ window.scrollTo(0,0); ({home:viewHome,lesson:viewLesson,setup:viewSetup,quiz:viewQuiz,results:viewResults,pbqs:viewPBQList,pbq:viewPBQ}[view])(arg); }
function el(html){ app.innerHTML='<div class="view">'+html+'</div>'; }
function esc(s){ return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function fmt(s){ return esc(s).replace(/\n/g,'<br>'); }
function isFlash(q){ return q && (q.t==='flash' || !q.o); }
function qByDomain(d){ return P().questions.map((q,i)=>({q,i})).filter(o=>o.q.d===d); }
function mcByDomain(d){ return qByDomain(d).filter(o=>!isFlash(o.q)); }
function mcIds(){ return P().questions.map((q,i)=>({q,i})).filter(o=>!isFlash(o.q)).map(o=>o.i); }

function qCountTotal(){ return PHASES[1].questions.length + PHASES[2].questions.length; }
function objectiveLabel(q){
  if(q.obj) return q.obj;
  const s=(q.q+' '+q.e).toLowerCase();
  if(phase===1){
    if(q.d===1){ if(/battery|screen|display|trackpad|camera|microphone|sim|esim|bluetooth|nfc|tether|hotspot/.test(s)) return '1.x'; return '1.0'; }
    if(q.d===2){ if(/port|protocol|tcp|udp|smtp|dns|dhcp|ssh|telnet|http|https|imap|pop|rdp|smb/.test(s)) return '2.1'; if(/wi-fi|wifi|wireless|802\.11|ssid|wpa|channel/.test(s)) return '2.3'; if(/router|switch|firewall|access point|patch panel|poe|modem|ont|nas/.test(s)) return '2.2'; return '2.x'; }
    if(q.d===3){ if(/ram|cpu|motherboard|bios|uefi|storage|raid|ssd|hdd|printer|display|cable|connector/.test(s)) return '3.x'; return '3.0'; }
    if(q.d===4) return '4.x';
    if(q.d===5) return '5.x';
  } else {
    if(q.d===1){ if(/windows|linux|macos|command|disk|event|device|task|file system|install|upgrade/.test(s)) return '1.x'; return '1.0'; }
    if(q.d===2){ if(/malware|phishing|firewall|password|bitlocker|permission|vpn|mfa|wpa|social/.test(s)) return '2.x'; return '2.0'; }
    if(q.d===3) return '3.x';
    if(q.d===4) return '4.x';
  }
  return q.d+'.0';
}
function examTarget(){ return Math.min(EXAM_TARGET, mcIds().length); }
function buildExamIds(){
  const Q=P().questions, target=examTarget();
  let allocations=P().domains.map(d=>({d:d.n, want:Math.round(target*d.pct/100)}));
  let diff=target-allocations.reduce((a,x)=>a+x.want,0);
  allocations.sort((a,b)=>b.want-a.want);
  for(let i=0; diff!==0 && allocations.length; i=(i+1)%allocations.length){ allocations[i].want += diff>0?1:-1; diff += diff>0?-1:1; }
  const used=new Set(); let ids=[];
  allocations.forEach(a=>{ const pool=shuffle(mcByDomain(a.d).map(o=>o.i)); pool.slice(0,a.want).forEach(id=>{ids.push(id); used.add(id);}); });
  if(ids.length<target){ shuffle(mcIds().filter(i=>!used.has(i))).slice(0,target-ids.length).forEach(id=>ids.push(id)); }
  return shuffle(ids.slice(0,target));
}
function weakIds(){
  const p=prog(), Q=P().questions;
  let ids=[...p.wrong];
  P().domains.forEach(d=>{
    const best=p.best[d.n];
    if(!best || (best.score/best.total)<0.75){ ids=ids.concat(qByDomain(d.n).map(o=>o.i).slice(0,12)); }
  });
  ids=[...new Set(ids)].filter(id=>Q[id]);
  return shuffle(ids).slice(0, Math.min(30, ids.length || Q.length));
}
function startExam(){
  const ids=buildExamIds();
  quiz={ phase, mode:'exam', domain:'exam', ids, order:buildOrder(ids), cur:0, score:0, answered:false, missed:[], started:Date.now(), duration:EXAM_SECONDS*1000, picks:{} };
  go('quiz');
}
function startWeak(){
  const ids=weakIds();
  quiz={ phase, mode:'weak', domain:'weak', ids, order:buildOrder(ids), cur:0, score:0, answered:false, missed:[], picks:{} };
  go('quiz');
}
let timerHandle=null;
function stopTimer(){ if(timerHandle){ clearInterval(timerHandle); timerHandle=null; } }
function updateTimer(){
  const t=document.getElementById('timer');
  if(!t || !quiz || quiz.mode!=='exam') return;
  const remaining=Math.max(0, Math.ceil((quiz.started+quiz.duration-Date.now())/1000));
  const m=String(Math.floor(remaining/60)).padStart(2,'0'), s=String(remaining%60).padStart(2,'0');
  t.textContent=m+':'+s;
  t.classList.toggle('low', remaining<=300);
  if(remaining<=0){ stopTimer(); finishQuiz(); }
}
function startTimer(){ stopTimer(); updateTimer(); timerHandle=setInterval(updateTimer,1000); }

}
