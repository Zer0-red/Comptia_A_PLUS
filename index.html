<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bench — CompTIA A+ Core 1 Study</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
/* ============ THEME TOKENS ============ */
:root{
  --d1:#2dd4bf; --d2:#60a5fa; --d3:#fbbf24; --d4:#a78bfa; --d5:#fb7185;
  --d1-dim:#2dd4bf30; --d2-dim:#60a5fa30; --d3-dim:#fbbf2430; --d4-dim:#a78bfa30; --d5-dim:#fb718530;
  --led:#4ade80; --led-glow:#4ade8088;
  --wrong:#f87171;
  --display:'Space Grotesk',system-ui,sans-serif;
  --body:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
html[data-theme="dark"]{
  --bg:#0d1117; --bg2:#0a0d12; --panel:#161b22; --panel2:#1b222c;
  --border:#2a313d; --border2:#363f4d;
  --text:#e6edf3; --muted:#8b97a7; --faint:#5d6776;
  --shadow:0 10px 30px -12px #00000088;
  --grid:#ffffff06;
}
html[data-theme="light"]{
  --bg:#eef1f5; --bg2:#e4e9ef; --panel:#ffffff; --panel2:#f6f8fb;
  --border:#d6dde6; --border2:#c2ccd8;
  --text:#16202e; --muted:#5a6675; --faint:#8b97a7;
  --shadow:0 10px 28px -14px #1a2a4022;
  --grid:#0a1a3008;
  --led:#16a34a; --led-glow:#16a34a55;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--body); background:var(--bg); color:var(--text);
  -webkit-font-smoothing:antialiased; line-height:1.55;
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:48px 48px;
  min-height:100vh;
  transition:background-color .25s,color .25s;
}
/* ============ HEADER ============ */
header{
  position:sticky; top:0; z-index:40;
  display:flex; align-items:center; gap:14px;
  padding:14px clamp(16px,4vw,40px);
  background:color-mix(in srgb,var(--bg) 88%,transparent);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
}
.brand{display:flex;align-items:center;gap:11px;cursor:pointer;user-select:none}
.logo{
  width:34px;height:34px;border-radius:9px;flex:none;position:relative;
  background:linear-gradient(135deg,var(--d5),var(--d4) 45%,var(--d2));
  display:grid;place-items:center;
}
.logo::after{content:"";width:11px;height:11px;border-radius:50%;background:var(--led);box-shadow:0 0 10px var(--led-glow)}
.brand h1{font-family:var(--display);font-size:18px;font-weight:700;margin:0;letter-spacing:-.01em}
.brand .sub{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-top:-2px}
.spacer{flex:1}
.hbtn{
  font-family:var(--mono);font-size:12px;font-weight:500;
  background:var(--panel);border:1px solid var(--border);color:var(--text);
  padding:8px 13px;border-radius:9px;cursor:pointer;display:flex;align-items:center;gap:7px;
  transition:border-color .15s,transform .1s;
}
.hbtn:hover{border-color:var(--border2)}
.hbtn:active{transform:translateY(1px)}
.hbtn.ghost{background:transparent}
.phaseswitch{display:flex;gap:3px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:3px}
.phaseswitch button{font-family:var(--mono);font-size:12px;font-weight:500;border:none;background:transparent;color:var(--muted);
  padding:6px 12px;border-radius:7px;cursor:pointer;transition:.14s;white-space:nowrap}
.phaseswitch button:hover{color:var(--text)}
.phaseswitch button.on{background:var(--led);color:#06210f}
html[data-theme="light"] .phaseswitch button.on{color:#fff}
/* ============ LAYOUT ============ */
main{max-width:1040px;margin:0 auto;padding:clamp(20px,4vw,40px) clamp(16px,4vw,40px) 80px}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.view{animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
/* ============ HOME / DASHBOARD ============ */
.hero{margin:6px 0 30px}
.hero h2{font-family:var(--display);font-size:clamp(28px,5vw,42px);line-height:1.05;margin:8px 0 10px;letter-spacing:-.02em}
.hero p{color:var(--muted);max-width:60ch;margin:0;font-size:15px}
.stat-strip{
  display:flex;flex-wrap:wrap;gap:10px 26px;margin-top:22px;padding:16px 18px;
  background:var(--panel);border:1px solid var(--border);border-radius:14px;
}
.stat{display:flex;flex-direction:column;gap:1px}
.stat .num{font-family:var(--display);font-size:22px;font-weight:700}
.stat .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.stat .num.led{color:var(--led)}
.section-h{display:flex;align-items:baseline;gap:12px;margin:36px 0 16px}
.section-h h3{font-family:var(--display);font-size:18px;margin:0}
.section-h .line{flex:1;height:1px;background:var(--border)}
/* domain cards */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px}
.card{
  position:relative;background:var(--panel);border:1px solid var(--border);
  border-radius:16px;padding:20px;cursor:pointer;overflow:hidden;
  transition:transform .14s,border-color .14s,box-shadow .14s;
}
.card:hover{transform:translateY(-3px);border-color:var(--dc);box-shadow:var(--shadow)}
.card .bar{position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--dc)}
.card .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.dnum{font-family:var(--mono);font-weight:700;font-size:13px;color:var(--dc);
  border:1px solid var(--dc);border-radius:7px;padding:3px 8px;letter-spacing:.04em}
.pct{font-family:var(--mono);font-size:12px;color:var(--muted)}
.card h4{font-family:var(--display);font-size:18px;margin:0 0 8px;letter-spacing:-.01em}
.card .desc{font-size:13.5px;color:var(--muted);margin:0 0 16px;min-height:60px}
.led-strip{display:flex;gap:5px;align-items:center;margin-top:2px}
.led-dot{width:9px;height:9px;border-radius:50%;background:var(--border2)}
.led-dot.on{background:var(--led);box-shadow:0 0 7px var(--led-glow)}
.card .meta{display:flex;justify-content:space-between;align-items:center;margin-top:14px;
  font-family:var(--mono);font-size:11px;color:var(--muted)}
/* ============ LESSON VIEW ============ */
.back{font-family:var(--mono);font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;
  display:inline-flex;align-items:center;gap:7px;padding:6px 0;margin-bottom:10px}
.back:hover{color:var(--text)}
.lesson-head{display:flex;align-items:center;gap:14px;margin-bottom:8px}
.lesson-head .dnum{font-size:15px;padding:5px 11px}
.lesson-head h2{font-family:var(--display);font-size:clamp(22px,4vw,32px);margin:0;letter-spacing:-.02em}
.toc{display:flex;flex-wrap:wrap;gap:8px;margin:18px 0 26px}
.toc button{font-family:var(--mono);font-size:12px;background:var(--panel);border:1px solid var(--border);
  color:var(--muted);padding:7px 12px;border-radius:8px;cursor:pointer;transition:.14s}
.toc button:hover{color:var(--text);border-color:var(--dc)}
.lesson-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;
  padding:26px clamp(20px,3vw,34px);margin-bottom:18px;scroll-margin-top:80px}
.lesson-card > h3{font-family:var(--display);font-size:20px;margin:0 0 14px;display:flex;align-items:center;gap:11px;letter-spacing:-.01em}
.lesson-card > h3::before{content:"";width:9px;height:9px;border-radius:2px;background:var(--dc);box-shadow:0 0 8px var(--dc)}
.lesson-card p{font-size:15px;margin:0 0 14px}
.lesson-card ul,.lesson-card ol{font-size:15px;margin:0 0 14px;padding-left:22px}
.lesson-card li{margin-bottom:7px}
.lesson-card b{color:var(--text);font-weight:600}
.kw{color:var(--dc);font-weight:600}
.mono{font-family:var(--mono);font-size:.88em;background:var(--panel2);border:1px solid var(--border);
  padding:1px 6px;border-radius:5px;white-space:nowrap}
table.ports{width:100%;border-collapse:collapse;margin:6px 0 16px;font-size:14px}
table.ports td{border-bottom:1px solid var(--border);padding:8px 10px;vertical-align:top}
table.ports td:first-child{width:30%;font-family:var(--mono);color:var(--dc);font-weight:500;white-space:nowrap}
.lesson-foot{display:flex;justify-content:space-between;gap:12px;margin-top:24px;flex-wrap:wrap}
/* ============ BUTTONS ============ */
.btn{font-family:var(--display);font-weight:600;font-size:15px;border-radius:11px;cursor:pointer;
  padding:13px 22px;border:1px solid var(--border);background:var(--panel);color:var(--text);
  transition:transform .1s,border-color .14s,background .14s}
.btn:hover{border-color:var(--border2)}
.btn:active{transform:translateY(1px)}
.btn.primary{background:var(--led);color:#06210f;border-color:transparent}
html[data-theme="light"] .btn.primary{color:#fff}
.btn.primary:hover{filter:brightness(1.06)}
.btn.dc{border-color:var(--dc);color:var(--dc)}
/* ============ QUIZ SETUP ============ */
.setup-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:11px;margin:16px 0 8px}
.opt{font-family:var(--body);text-align:left;background:var(--panel);border:1px solid var(--border);
  border-radius:12px;padding:14px 16px;cursor:pointer;transition:.14s;color:var(--text)}
.opt:hover{border-color:var(--border2)}
.opt.sel{border-color:var(--led);background:color-mix(in srgb,var(--led) 9%,var(--panel))}
.opt .ot{font-family:var(--display);font-weight:600;font-size:15px;display:block}
.opt .os{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:3px}
.opt.sel .os{color:var(--text)}
.lenrow{display:flex;gap:9px;flex-wrap:wrap;margin-top:8px}
.chip{font-family:var(--mono);font-size:13px;background:var(--panel);border:1px solid var(--border);
  border-radius:9px;padding:9px 16px;cursor:pointer;transition:.14s;color:var(--text)}
.chip:hover{border-color:var(--border2)}
.chip.sel{border-color:var(--led);background:color-mix(in srgb,var(--led) 9%,var(--panel))}
/* ============ QUIZ RUN ============ */
.qbar{display:flex;align-items:center;gap:14px;margin-bottom:22px}
.progress{flex:1;height:7px;background:var(--panel);border:1px solid var(--border);border-radius:99px;overflow:hidden}
.progress > i{display:block;height:100%;background:var(--led);box-shadow:0 0 8px var(--led-glow);transition:width .35s}
.qcount{font-family:var(--mono);font-size:12px;color:var(--muted);white-space:nowrap}
.qscore{font-family:var(--mono);font-size:12px;white-space:nowrap}
.qscore b{color:var(--led)}
.qtag{display:inline-block;font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--dc);
  border:1px solid var(--dc);border-radius:7px;padding:3px 9px;margin-bottom:14px}
.question{font-family:var(--display);font-size:clamp(19px,3vw,24px);line-height:1.3;margin:0 0 22px;letter-spacing:-.01em}
.answers{display:flex;flex-direction:column;gap:11px}
.ans{display:flex;align-items:flex-start;gap:13px;text-align:left;background:var(--panel);
  border:1px solid var(--border);border-radius:13px;padding:15px 17px;cursor:pointer;
  font-size:15.5px;color:var(--text);transition:border-color .14s,background .14s;font-family:var(--body)}
.ans:hover:not(:disabled){border-color:var(--border2)}
.ans .key{font-family:var(--mono);font-weight:700;font-size:13px;width:24px;height:24px;flex:none;
  display:grid;place-items:center;border-radius:7px;border:1px solid var(--border2);color:var(--muted)}
.ans.correct{border-color:var(--led);background:color-mix(in srgb,var(--led) 12%,var(--panel))}
.ans.correct .key{background:var(--led);color:#06210f;border-color:transparent}
.ans.wrong{border-color:var(--wrong);background:color-mix(in srgb,var(--wrong) 12%,var(--panel))}
.ans.wrong .key{background:var(--wrong);color:#2a0606;border-color:transparent}
.ans:disabled{cursor:default}
.explain{margin-top:18px;background:var(--panel2);border:1px solid var(--border);border-left:3px solid var(--dc);
  border-radius:12px;padding:16px 18px;font-size:14.5px;animation:fade .3s}
.explain .et{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--dc);margin-bottom:6px}
.qfoot{display:flex;justify-content:flex-end;margin-top:22px}
/* ============ RESULTS ============ */
.result-hero{text-align:center;padding:30px 0 10px}
.ring{width:160px;height:160px;margin:0 auto 18px}
.result-hero h2{font-family:var(--display);font-size:30px;margin:0 0 6px}
.result-hero p{color:var(--muted);margin:0}
.verdict{font-family:var(--mono);font-size:13px;letter-spacing:.06em;margin-top:8px;display:inline-block;
  padding:5px 13px;border-radius:8px;border:1px solid currentColor}
.pass{color:var(--led)} .fail{color:var(--wrong)}
.result-actions{display:flex;gap:12px;justify-content:center;margin:26px 0;flex-wrap:wrap}
.breakdown{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:6px 4px;margin-top:10px}
.brow{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border)}
.brow:last-child{border-bottom:none}
.brow .bd{width:3px;height:26px;border-radius:2px;background:var(--dc)}
.brow .bn{font-family:var(--mono);font-size:12px;color:var(--muted);width:30px}
.brow .btitle{flex:1;font-size:14px}
.brow .bsc{font-family:var(--mono);font-size:13px}
footer{text-align:center;padding:30px 16px;color:var(--faint);font-family:var(--mono);font-size:11px;border-top:1px solid var(--border);margin-top:40px}
footer a{color:var(--muted);text-decoration:none}
@media(max-width:560px){
  .brand .sub{display:none}
  .hbtn span.t{display:none}
}
</style>
</head>

<header>
  <div class="brand" onclick="go('home')">
    <div class="logo"></div>

<script>const DOMAINS1 = [
  { n:1, title:"Mobile Devices", pct:13, color:"teal",
    blurb:"Laptops, tablets, and phones: hardware you can replace, the cables and accessories that connect them, and getting them onto a network." },
  { n:2, title:"Networking", pct:23, color:"blue",
    blurb:"Ports and protocols, wireless standards, the hardware that moves packets, and how to wire up a small office or home." },
  { n:3, title:"Hardware", pct:25, color:"amber",
    blurb:"The biggest domain: displays, cables, RAM, storage, motherboards, CPUs, power, and printers. Know the parts and how they fit." },
  { n:4, title:"Virtualization & Cloud", pct:11, color:"violet",
    blurb:"Why run a machine inside a machine, the two hypervisor types, containers, and the cloud service and deployment models." },
  { n:5, title:"Hardware & Network Troubleshooting", pct:28, color:"rose",
    blurb:"The largest exam slice. Read the symptom, name the likely cause: dead boards, bad drives, ugly displays, flaky networks, and jammed printers." },
];

const LESSONS1 = {
1:[
 {t:"Replaceable laptop & mobile hardware", h:`
  <p>A desktop is built to be opened — parts snap into standard slots. A laptop is the opposite: everything is packed into the thinnest possible space, so repairs mean careful disassembly and parts that are often <b>proprietary</b> to that exact model. Your first job on any mobile repair is to find out whether a part is even replaceable before you promise a fix.</p>

  <h4>Battery</h4>
  <p>Almost all modern devices use <span class="kw">lithium-ion (Li-ion)</span> or <span class="kw">lithium-polymer (Li-Po)</span> batteries. They hold a lot of energy in a small space, which is great — but it also means a damaged one is dangerous. When the internal chemistry breaks down, the cell can puff up: that is a <span class="kw">swollen battery</span>. A swollen battery is past saving and is a fire risk. The rule is simple and absolute: <b>stop using it, do not press on it, never puncture it, and replace it.</b> A swollen battery often pushes the trackpad up or bows the case — that physical clue alone tells you what is wrong.</p>

  <h4>Storage and memory</h4>
  <p>Older laptops used a <span class="kw">2.5-inch SATA</span> drive and <span class="kw">SODIMM</span> memory sticks you could swap in minutes. Newer, thinner machines often <b>solder</b> the RAM and storage directly to the board to save space — which means "add more RAM" may not be possible at all. Always check the specific model. Where storage is replaceable, it is usually an <span class="kw">M.2</span> SSD now instead of a 2.5-inch drive.</p>

  <h4>Wireless cards, antennas, and small parts</h4>
  <p>The <span class="kw">wireless (Wi-Fi/Bluetooth) card</span> is frequently a small M.2 module you can replace. The trickier part is the <span class="kw">antennas</span>: the thin wires usually run up through the display hinges to the top of the screen bezel for the best signal. When you reassemble, those tiny connectors must click back onto the card or Wi-Fi will be weak or dead. The same disassembly exposes the <span class="kw">webcam/camera</span> and <span class="kw">microphone</span> — easy to forget to reconnect.</p>

  <h4>Privacy and security components</h4>
  <p>These let a person prove who they are physically. <span class="kw">Biometrics</span> means a fingerprint reader or facial recognition. A <span class="kw">near-field scanner</span> reads a chip or tag held close to the device (used for badges and tap-to-pay). When you replace a palm rest or power button, you are often replacing the fingerprint sensor that is built into it.</p>

  <p class="kw" style="font-weight:600">Exam reflex: physical bulge or a trackpad that won't click flat → suspect a swollen battery. Weak Wi-Fi right after a screen repair → an antenna lead wasn't reconnected.</p>`},

 {t:"Accessories & connection methods", h:`
  <p>This lesson is about everything you plug into or pair with a mobile device, and the differences the exam likes to test.</p>

  <h4>Wired connection methods</h4>
  <table class="ports">
   <tr><td class="mono">USB-C</td><td>The modern standard. The connector is <b>reversible</b> (no wrong way up) and a single USB-C port can carry <b>data, power, and video</b> at once. Because of that flexibility it has replaced microUSB on most new devices.</td></tr>
   <tr><td class="mono">microUSB / miniUSB</td><td>Older, smaller USB connectors. MiniUSB is the older/larger of the two; microUSB came next and was the standard before USB-C.</td></tr>
   <tr><td class="mono">Lightning</td><td>Apple's own connector used on older iPhones and many iPads. Reversible like USB-C but proprietary to Apple.</td></tr>
   <tr><td class="mono">USB-A</td><td>The familiar rectangular plug on the host (computer/charger) end.</td></tr>
  </table>

  <h4>Wireless connection methods</h4>
  <p><span class="kw">Bluetooth</span> is short-range wireless (a few meters) for peripherals: earbuds, keyboards, mice, speakers, car audio. <span class="kw">NFC (near-field communication)</span> works only at a few centimeters — you literally tap. That tiny range is the point: it makes tap-to-pay and quick pairing secure, because an attacker can't read it from across the room.</p>
  <p><span class="kw">Tethering</span> and <span class="kw">hotspot</span> both share a phone's cellular internet with other devices. People use the words loosely, but tethering usually implies a USB or Bluetooth link to one device, while a mobile hotspot creates a small Wi-Fi network several devices can join.</p>

  <h4>Accessories</h4>
  <p>A <span class="kw">stylus</span> is a pen for drawing/precise input; <span class="kw">headsets</span> add audio plus a mic; <span class="kw">speakers</span> and an external <span class="kw">webcam</span> upgrade sound and video.</p>

  <h4>Docking station vs. port replicator</h4>
  <p>Both turn a laptop into a desktop workstation, and the exam wants you to know the difference:</p>
  <ul>
   <li>A <span class="kw">docking station</span> is the fuller solution. It often connects through a proprietary connector and can add power, extra video outputs, more USB ports, wired Ethernet, even drive bays — effectively expanding the laptop's capabilities.</li>
   <li>A <span class="kw">port replicator</span> is simpler. As the name says, it mostly just <b>replicates the ports</b> the laptop already has, frequently over a single USB connection. Less powerful, more portable.</li>
  </ul>

  <h4>Pointing devices</h4>
  <p>A <span class="kw">trackpad</span> is the touch surface below the keyboard. A <span class="kw">drawing pad</span> is a larger external surface for artists. A <span class="kw">track point</span> (or "pointing stick") is the little eraser-head nub in the middle of some keyboards that moves the cursor without lifting your hands off the keys.</p>`},

 {t:"Cellular, SIM/eSIM & getting online", h:`
  <h4>The cellular generations</h4>
  <p>You toggle a device's mobile data on or off, and you should know roughly what each "G" means:</p>
  <ul>
   <li><span class="kw">3G</span> — old, slow (think basic web and email).</li>
   <li><span class="kw">4G / LTE</span> — the long-standing standard for fast mobile data, good enough for video.</li>
   <li><span class="kw">5G</span> — newest, much faster with lower latency, but its highest speeds need to be close to a tower.</li>
  </ul>

  <h4>SIM vs. eSIM</h4>
  <p>A <span class="kw">SIM (Subscriber Identity Module)</span> is the small card that identifies the device to the carrier — it holds the subscriber info that ties the phone to a phone number and plan. An <span class="kw">eSIM</span> is the same idea built into the device as a chip, so there's no physical card to swap; you activate a plan by software. eSIM makes it easy to carry multiple carrier profiles or switch carriers without a new card.</p>

  <h4>Bluetooth pairing — know the order</h4>
  <p>If a pairing question appears, the steps run in this sequence, and a failure usually means you skipped one:</p>
  <ol>
   <li>Enable Bluetooth on the device.</li>
   <li>Enable pairing / make it discoverable.</li>
   <li>Find the other device in the list.</li>
   <li>Enter the PIN code if prompted (often 0000 or shown on screen).</li>
   <li>Test connectivity (play audio, move the mouse) to confirm it works.</li>
  </ol>

  <h4>Location services</h4>
  <p><span class="kw">GPS</span> uses satellites to fix your position and works best outdoors with a clear sky view. Indoors or in a city, the phone falls back on <span class="kw">cellular and Wi-Fi location services</span> — estimating position from nearby cell towers and known Wi-Fi networks. Combining them ("assisted GPS") is what makes a map lock onto you quickly.</p>

  <h4>MDM — managing devices at scale</h4>
  <p><span class="kw">Mobile Device Management (MDM)</span> is how a company controls a fleet of phones and tablets from one console. Two ownership models:</p>
  <ul>
   <li><span class="kw">Corporate</span> — the company owns the device and can lock it down hard.</li>
   <li><span class="kw">BYOD (bring your own device)</span> — the employee owns it, so policy is lighter and usually separates work data from personal data.</li>
  </ul>
  <p>MDM enforces <b>policy</b> (passcodes, encryption), pushes <b>corporate apps</b>, and can remotely lock or <b>wipe</b> a lost device. It also configures <b>synchronization</b> of mail, calendar, and contacts to cloud storage. Watch <span class="kw">data caps</span>: syncing large amounts over cellular instead of Wi-Fi can blow through a data plan.</p>`},
],

 {t:"Ports & protocols (the must-memorize set)", h:`
  <p>A <b>protocol</b> is an agreed language two computers use to talk; a <b>port</b> is a numbered doorway on a device that a particular protocol uses, so one machine can run many services at once. Memorizing these number-to-protocol pairs is unavoidable on this exam, and they appear constantly in real troubleshooting.</p>
  <table class="ports">
   <tr><td class="mono">20 / 21</td><td><b>FTP</b> — transfers files. Port 21 controls the session, 20 moves the data. Unencrypted.</td></tr>
   <tr><td class="mono">22</td><td><b>SSH</b> — secure, encrypted remote command line. Also underlies secure file transfer (SFTP/SCP). The secure replacement for Telnet.</td></tr>
   <tr><td class="mono">23</td><td><b>Telnet</b> — remote command line in <b>plain text</b>. Insecure; avoid. Knowing 22 vs 23 (secure vs not) is a classic question.</td></tr>
   <tr><td class="mono">25</td><td><b>SMTP</b> — <b>sends</b> email between servers.</td></tr>
   <tr><td class="mono">53</td><td><b>DNS</b> — resolves names (google.com) to IP addresses. Quietly essential to almost everything.</td></tr>
   <tr><td class="mono">67 / 68</td><td><b>DHCP</b> — automatically hands clients an IP address and settings.</td></tr>
   <tr><td class="mono">80</td><td><b>HTTP</b> — web pages, <b>unencrypted</b>.</td></tr>
   <tr><td class="mono">110</td><td><b>POP3</b> — <b>downloads</b> email to one device and typically removes it from the server.</td></tr>
   <tr><td class="mono">143</td><td><b>IMAP</b> — <b>syncs</b> email across devices, leaving it on the server. POP3 vs IMAP (download-and-remove vs sync) is a favorite comparison.</td></tr>
   <tr><td class="mono">137-139</td><td><b>NetBIOS/NetBT</b> — older Windows name service and file sharing.</td></tr>
   <tr><td class="mono">389</td><td><b>LDAP</b> — directory services; how systems look up users/computers (Active Directory uses it).</td></tr>
   <tr><td class="mono">443</td><td><b>HTTPS</b> — web, <b>encrypted</b> with TLS. The padlock. HTTP=80 vs HTTPS=443 must be automatic.</td></tr>
   <tr><td class="mono">445</td><td><b>SMB/CIFS</b> — Windows file and printer sharing over a network.</td></tr>
   <tr><td class="mono">3389</td><td><b>RDP</b> — Microsoft Remote Desktop; control a Windows machine's full graphical desktop remotely.</td></tr>
  </table>
  <p><b>Notice the secure/insecure pairs</b> — the exam loves them: FTP→SFTP/FTPS, Telnet(23)→SSH(22), HTTP(80)→HTTPS(443). When a question asks for the "secure" option, pick the encrypted one.</p>

  <h4>TCP vs. UDP — the two delivery styles</h4>
  <p>Both carry data, but they trade reliability for speed:</p>
  <ul>
   <li><span class="kw">TCP</span> is <b>connection-oriented and reliable</b>. It performs a <b>three-way handshake</b> (SYN → SYN-ACK → ACK) to set up the conversation, numbers the pieces, and re-sends anything lost. Use it when every byte must arrive: web pages, email, file transfers. Think of it as a phone call where you confirm the other person heard you.</li>
   <li><span class="kw">UDP</span> is <b>connectionless and fast</b> with no guarantee and no re-sending. Use it when speed beats perfection and a dropped piece doesn't matter: live video/voice (VoIP), online games, DNS lookups. Think of it as shouting across a room — quick, but you don't wait for a reply.</li>
  </ul>`},

 {t:"Wireless networking technologies", h:`
  <h4>Frequency bands — the core trade-off</h4>
  <p>Wi-Fi runs on radio bands, and the rule is <b>lower frequency = longer range but slower; higher frequency = faster but shorter range</b>:</p>
  <ul>
   <li><span class="kw">2.4 GHz</span> — reaches farther and punches through walls better, but it is slower and very crowded (microwaves, Bluetooth, neighbors all share it).</li>
   <li><span class="kw">5 GHz</span> — much faster, less crowded, but shorter range and weaker through walls.</li>
   <li><span class="kw">6 GHz</span> (Wi-Fi 6E) — newest, lots of clean space and channels, shortest range.</li>
  </ul>

  <h4>Channels and interference</h4>
  <p>Each band is divided into <span class="kw">channels</span>. On the crowded 2.4 GHz band most channels overlap, so the three "non-overlapping" choices are <b>channels 1, 6, and 11</b>. If a neighbor's network sits on the same channel as yours, both slow down — a <b>Wi-Fi analyzer</b> shows which channels are busy so you can move to a clear one. Channel <b>width</b> also matters: wider channels are faster but overlap more easily. Legal channels/power differ by country (<b>regulations</b>).</p>

  <h4>802.11 standards</h4>
  <table class="ports">
   <tr><td class="mono">802.11b/g</td><td>old, 2.4 GHz, slow</td></tr>
   <tr><td class="mono">802.11n (Wi-Fi 4)</td><td>2.4 & 5 GHz, much faster, introduced MIMO (multiple antennas)</td></tr>
   <tr><td class="mono">802.11ac (Wi-Fi 5)</td><td>5 GHz, fast mainstream standard for years</td></tr>
   <tr><td class="mono">802.11ax (Wi-Fi 6/6E)</td><td>newest, efficient in crowded areas, adds 6 GHz</td></tr>
  </table>

  <h4>Other short-range wireless</h4>
  <p><span class="kw">Bluetooth</span> = peripherals at a few meters. <span class="kw">NFC</span> = tap at a few centimeters (payments, pairing). <span class="kw">RFID</span> = a reader energizes a tag to read it — used for badges, inventory, toll tags, pet chips. NFC is actually a special short-range form of RFID.</p>

  <h4>Wireless security</h4>
  <p>The <span class="kw">SSID</span> is the network's broadcast name. Hiding it stops casual discovery but is not real security. Encryption, strongest to weakest: <span class="kw">WPA3</span> (current best) → <span class="kw">WPA2</span> with AES (still fine) → WPA/TKIP (weak) → WEP (broken, never use). When a scenario says "old/weak wireless security," the fix is almost always move to WPA2 or WPA3. A <span class="kw">guest network</span> keeps visitors off your internal LAN.</p>`},

 {t:"Ethernet frames & the network models", h:`
  <p>Practice tests often dip below the bulleted objectives into how data is actually packaged and moved. Here is the foundation so those questions stop surprising you.</p>

  <h4>The Ethernet frame</h4>
  <p>On a local network, data travels inside an <span class="kw">Ethernet frame</span> — an envelope wrapped around your data. Reading it front to back:</p>
  <ul>
   <li><span class="kw">Preamble</span> — sync bits that say "a frame is starting."</li>
   <li><span class="kw">Destination MAC</span> then <span class="kw">Source MAC</span> — the hardware addresses of the receiving and sending network cards.</li>
   <li><b>Type/Length</b> — what kind of data is inside.</li>
   <li><span class="kw">Payload</span> — the actual data being carried.</li>
   <li><span class="kw">FCS — Frame Check Sequence</span> — sits at the very <b>end</b>.</li>
  </ul>
  <p>The FCS is a <span class="kw">CRC (cyclic redundancy check)</span>: the sender calculates a number from the frame's contents and tacks it on; the receiver recalculates it. If the two don't match, the frame got corrupted in transit and is silently dropped. So when a question asks "what is at the <b>end</b> of an Ethernet frame?" the answer is the <b>FCS</b>, and it exists for <b>error detection</b>.</p>

  <h4>OSI and TCP/IP models</h4>
  <p>These are conceptual maps that break networking into layers so problems can be isolated to one layer.</p>
  <ul>
   <li><span class="kw">OSI model</span> — 7 layers: <b>P</b>hysical, <b>D</b>ata Link, <b>N</b>etwork, <b>T</b>ransport, <b>S</b>ession, <b>P</b>resentation, <b>A</b>pplication. Memory aid: "<i>Please Do Not Throw Sausage Pizza Away</i>."</li>
   <li><span class="kw">TCP/IP model</span> — a simpler 4-layer model used in the real world.</li>
  </ul>
  <p><b>Layer tells that matter for troubleshooting:</b> cables and signals = Layer 1 (Physical); MAC addresses, switches, and frames = <b>Layer 2 (Data Link)</b>; IP addresses and routers = <b>Layer 3 (Network)</b>; TCP/UDP ports = <b>Layer 4 (Transport)</b>. "A switch operates at Layer 2, a router at Layer 3" is a guaranteed-style fact.</p>`},

 {t:"Services provided by networked hosts", h:`
  <p>Servers are just computers dedicated to a job. Know what each role <i>does</i>, because scenarios describe the symptom and expect you to name the responsible service.</p>
  <table class="ports">
   <tr><td class="mono">DNS</td><td>Resolves names to IP addresses. If DNS is down, you can reach sites by IP but not by name.</td></tr>
   <tr><td class="mono">DHCP</td><td>Automatically hands clients an IP, subnet mask, gateway, and DNS server. If it fails, clients get a 169.254 APIPA address.</td></tr>
   <tr><td class="mono">Fileshare</td><td>Central storage many users access.</td></tr>
   <tr><td class="mono">Print server</td><td>Manages shared printers and their queues.</td></tr>
   <tr><td class="mono">Mail server</td><td>Sends/receives email (SMTP/IMAP/POP).</td></tr>
   <tr><td class="mono">Syslog</td><td>Collects logs from many devices in one place for review.</td></tr>
   <tr><td class="mono">Web server</td><td>Hosts websites/apps (HTTP/HTTPS).</td></tr>
   <tr><td class="mono">AAA</td><td>Authentication, Authorization, and Accounting — verifies who you are, what you may do, and logs it.</td></tr>
   <tr><td class="mono">Database server</td><td>Stores structured data apps query.</td></tr>
   <tr><td class="mono">NTP</td><td>Network Time Protocol — keeps clocks in sync, which matters for logs, security certificates, and authentication.</td></tr>
  </table>

  <h4>Internet appliances (security/traffic boxes)</h4>
  <ul>
   <li><span class="kw">Spam gateway</span> — filters junk and malicious email before it reaches inboxes.</li>
   <li><span class="kw">UTM (Unified Threat Management)</span> — an all-in-one security box combining firewall, antivirus, intrusion prevention, and more.</li>
   <li><span class="kw">Load balancer</span> — spreads incoming traffic across several servers so none is overwhelmed.</li>
   <li><span class="kw">Proxy server</span> — sits between users and the internet to filter, cache, or hide internal addresses.</li>
  </ul>

  <h4>Legacy, embedded, and IoT</h4>
  <p><span class="kw">Embedded/legacy systems</span> are special-purpose computers built into equipment. <span class="kw">SCADA</span> controls industrial machinery (power plants, factories) and is often old and fragile, so it needs isolation. <span class="kw">IoT</span> devices are everyday "smart" things — thermostats, cameras, doorbells — that are convenient but frequently weak on security.</p>`},

 {t:"Network configuration concepts", h:`
  <h4>DNS records</h4>
  <p>DNS isn't just name-to-IP; it stores several record types:</p>
  <table class="ports">
   <tr><td class="mono">A</td><td>name → IPv4 address</td></tr>
   <tr><td class="mono">AAAA</td><td>name → IPv6 address</td></tr>
   <tr><td class="mono">CNAME</td><td>an alias pointing one name at another name</td></tr>
   <tr><td class="mono">MX</td><td>mail exchanger — which server receives a domain's email</td></tr>
   <tr><td class="mono">TXT</td><td>free-form text, used heavily for email anti-spoofing</td></tr>
  </table>
  <p>Three TXT-based email protections worth recognizing: <span class="kw">SPF</span> (lists who may send mail for a domain), <span class="kw">DKIM</span> (signs messages to prove they weren't altered), and <span class="kw">DMARC</span> (tells receivers what to do when SPF/DKIM fail). Together they fight forged/spam email.</p>

  <h4>DHCP terms</h4>
  <p>When a device joins, DHCP runs a quick <b>DORA</b> exchange (Discover, Offer, Request, Acknowledge) to assign an address. Know the vocabulary:</p>
  <ul>
   <li><span class="kw">Scope</span> — the pool of addresses the server can give out.</li>
   <li><span class="kw">Lease</span> — how long a client keeps its address before renewing.</li>
   <li><span class="kw">Reservation</span> — a specific IP permanently tied to one device's MAC (so a printer always gets the same address).</li>
   <li><span class="kw">Exclusion</span> — addresses inside the scope the server is told <b>not</b> to hand out (e.g., reserved for servers).</li>
  </ul>

  <h4>VLAN and VPN</h4>
  <p>A <span class="kw">VLAN (virtual LAN)</span> logically splits one physical switch into separate networks — so accounting and guests can share hardware but stay isolated, improving security and reducing congestion. A <span class="kw">VPN (virtual private network)</span> builds an encrypted tunnel across the public internet, letting a remote worker act as if they're safely inside the office network.</p>`},

 {t:"Networking hardware devices", h:`
  <p>Know what each box does and how it differs from its neighbors — confusing a switch with a router is a classic trap.</p>
  <table class="ports">
   <tr><td class="mono">Router</td><td>Connects <b>different</b> networks and forwards traffic between them using <b>IP addresses</b> (Layer 3). Your home router also usually does DHCP, NAT, and firewalling.</td></tr>
   <tr><td class="mono">Switch</td><td>Connects devices <b>within</b> one network and forwards frames using <b>MAC addresses</b> (Layer 2). It learns which device is on which port. <b>Managed</b> switches can be configured (VLANs, monitoring); <b>unmanaged</b> ones just work out of the box.</td></tr>
   <tr><td class="mono">Access point</td><td>Adds Wi-Fi to a wired network — the bridge between wireless clients and the cabled LAN.</td></tr>
   <tr><td class="mono">Patch panel</td><td>A passive board where cable runs from the building terminate, then short patch cables connect them to a switch. Keeps wiring tidy.</td></tr>
   <tr><td class="mono">Firewall</td><td>Filters traffic by rules to block unwanted/malicious connections.</td></tr>
  </table>

  <h4>Power over Ethernet (PoE)</h4>
  <p><span class="kw">PoE</span> sends <b>electrical power and data over the same Ethernet cable</b>, so a wireless access point or IP camera on a ceiling needs no separate power outlet. It comes from a <span class="kw">PoE switch</span> or, when your switch can't do it, an inline <span class="kw">injector</span> that adds power to the line. Different <b>PoE standards</b> deliver different wattage.</p>

  <h4>Reaching the ISP</h4>
  <p>A <span class="kw">cable modem</span> connects over coax (cable TV lines); <span class="kw">DSL</span> runs over phone lines; and an <span class="kw">ONT (optical network terminal)</span> is the box that converts fiber light into an electrical signal your router can use. A <span class="kw">NAS (network-attached storage)</span> is a dedicated file-sharing box on the LAN.</p>

  <h4>NIC and MAC address</h4>
  <p>A <span class="kw">NIC (network interface card)</span> is the network adapter. Every NIC has a permanent, factory-burned <span class="kw">MAC address</span> — a 48-bit number written as six hex pairs like <span class="mono">00:1A:2B:3C:4D:5E</span>. The first half identifies the manufacturer. MAC is the hardware address; IP is the logical, changeable address.</p>`},

 {t:"SOHO networks & IP addressing", h:`
  <p>Every device on a network needs an <b>IP address</b> (its number), a <b>subnet mask</b> (which part of that number is the network vs. the host), and a <b>default gateway</b> (the router's address — the way out to other networks).</p>

  <h4>IPv4: public vs. private</h4>
  <p>IPv4 addresses are four numbers 0–255, like <span class="mono">192.168.1.50</span>. Some ranges are <span class="kw">private</span> — reserved for internal networks and never routed on the internet:</p>
  <table class="ports">
   <tr><td class="mono">10.0.0.0 – 10.255.255.255</td><td>large private range</td></tr>
   <tr><td class="mono">172.16.0.0 – 172.31.255.255</td><td>medium private range</td></tr>
   <tr><td class="mono">192.168.0.0 – 192.168.255.255</td><td>small private range (typical home)</td></tr>
  </table>
  <p>Everything else is <span class="kw">public</span>. Your router uses <b>NAT</b> to let many private devices share one public address.</p>

  <h4>The subnet mask, simply</h4>
  <p>A mask like <span class="mono">255.255.255.0</span> means "the first three numbers are the network, the last number identifies the host." So <span class="mono">192.168.1.x</span> devices are all on the same network and can talk directly; to reach a different network they go through the gateway.</p>

  <h4>Static vs. dynamic, and APIPA</h4>
  <ul>
   <li><span class="kw">Dynamic</span> — DHCP assigns the address automatically (the normal case).</li>
   <li><span class="kw">Static</span> — you set it by hand, used for servers/printers that must never change.</li>
   <li><span class="kw">APIPA</span> — if a device is set to DHCP but <b>can't reach a DHCP server</b>, it self-assigns a <span class="mono">169.254.x.x</span> address. Seeing 169.254 is a giant flashing sign that DHCP failed.</li>
  </ul>

  <h4>IPv6</h4>
  <p>The world is running out of IPv4 addresses, so <span class="kw">IPv6</span> uses much longer 128-bit addresses (hex, like <span class="mono">2001:db8::1</span>) — effectively unlimited. It's gradually replacing IPv4.</p>`},

 {t:"Connection types, network types & tools", h:`
  <h4>Internet connection types</h4>
  <table class="ports">
   <tr><td class="mono">Fiber</td><td>Light through glass — the fastest and lowest latency.</td></tr>
   <tr><td class="mono">Cable</td><td>Over coax TV lines — fast, very common, shared with neighbors.</td></tr>
   <tr><td class="mono">DSL</td><td>Over phone lines — slower; speed drops with distance from the provider.</td></tr>
   <tr><td class="mono">Cellular</td><td>4G/5G mobile data — wireless, mobile, can have data caps.</td></tr>
   <tr><td class="mono">Satellite</td><td>Reaches remote areas, but the long trip to orbit causes <b>high latency</b>. Weather can interfere.</td></tr>
   <tr><td class="mono">WISP</td><td>Wireless ISP — beams internet by radio to rural areas without wired infrastructure.</td></tr>
  </table>

  <h4>Network types by size</h4>
  <ul>
   <li><span class="kw">PAN</span> — Personal Area Network: your immediate space (Bluetooth earbuds).</li>
   <li><span class="kw">LAN</span> — Local Area Network: a home, office, or building.</li>
   <li><span class="kw">WLAN</span> — a wireless LAN (Wi-Fi).</li>
   <li><span class="kw">MAN</span> — Metropolitan Area Network: across a city.</li>
   <li><span class="kw">WAN</span> — Wide Area Network: long distances; the internet is the biggest WAN.</li>
   <li><span class="kw">SAN</span> — Storage Area Network: a high-speed network dedicated to storage.</li>
  </ul>

  <h4>Networking tools and what each is for</h4>
  <table class="ports">
   <tr><td class="mono">Crimper</td><td>Attaches an RJ45 connector onto the end of a network cable.</td></tr>
   <tr><td class="mono">Cable stripper</td><td>Removes the outer jacket without nicking the wires inside.</td></tr>
   <tr><td class="mono">Punchdown tool</td><td>Seats individual wires into a patch panel or keystone jack.</td></tr>
   <tr><td class="mono">Cable tester</td><td>Confirms a finished cable is wired correctly end to end.</td></tr>
   <tr><td class="mono">Toner probe</td><td>The "tone generator and probe" — find one specific cable in a bundle by the sound it makes.</td></tr>
   <tr><td class="mono">Loopback plug</td><td>Loops a port's output back to its input to test whether the port itself works.</td></tr>
   <tr><td class="mono">Wi-Fi analyzer</td><td>Shows wireless networks, signal strength, and channel congestion.</td></tr>
   <tr><td class="mono">Network tap</td><td>Inserts into a link to copy traffic for monitoring/analysis.</td></tr>
  </table>`},
],
3:[
 {t:"Display components & attributes", h:`
  <h4>How the panel types differ</h4>
  <p>A flat-panel display is a grid of millions of tiny dots (pixels). The technology behind how those dots make light is what you compare:</p>
  <ul>
   <li><span class="kw">LCD (liquid crystal display)</span> — crystals twist to block or pass light from a <b>backlight</b> behind them. LCDs themselves come in three flavors:
     <ul>
       <li><span class="kw">IPS</span> — best color accuracy and viewing angles. Great for design work; a bit pricier.</li>
       <li><span class="kw">TN</span> — cheapest and fastest (high refresh for gaming), but washed-out colors and bad angles.</li>
       <li><span class="kw">VA</span> — a middle ground with deep contrast (good blacks), angles between IPS and TN.</li>
     </ul>
   </li>
   <li><span class="kw">OLED</span> — every pixel makes its own light, so it can switch fully off for <b>true black</b> and incredible contrast. No backlight needed. Downside: static images left on screen too long can cause <b>burn-in</b>.</li>
   <li><span class="kw">Mini-LED</span> — an LCD with a vastly improved backlight (thousands of tiny zones) for better contrast, approaching OLED without the burn-in risk.</li>
  </ul>

  <h4>Touch and the inverter</h4>
  <p>A <span class="kw">touch screen/digitizer</span> is the layer that turns your finger's touch into input coordinates. On older CCFL-backlit LCDs, an <span class="kw">inverter</span> converted DC power to the high-voltage AC the backlight needed — a common failure point that caused dim or flickering screens. Modern LED backlights don't use one.</p>

  <h4>Attributes that define quality</h4>
  <table class="ports">
   <tr><td class="mono">Resolution</td><td>Pixel count, e.g. 1920×1080. More pixels = sharper image.</td></tr>
   <tr><td class="mono">Pixel density</td><td>Pixels per inch — the same resolution looks sharper on a smaller screen.</td></tr>
   <tr><td class="mono">Refresh rate</td><td>How many times per second the image redraws, in Hz. 60 Hz is standard; 120/144 Hz looks smoother (gaming).</td></tr>
   <tr><td class="mono">Color gamut</td><td>The range of colors the display can show — wider is better for photo/video work.</td></tr>
  </table>`},

 {t:"Cables & connectors", h:`
  <h4>Network copper cable</h4>
  <p>Twisted-pair Ethernet cable comes in <span class="kw">categories</span> rated for speed: Cat5e (1 Gbps), Cat6 (up to 10 Gbps short runs), Cat6a (10 Gbps longer). The eight wires are arranged by the <span class="kw">T568A or T568B</span> wiring standard — pick one and stay consistent on both ends for a normal cable. Variants: <span class="kw">UTP</span> (unshielded — common, cheap), <span class="kw">STP</span> (shielded — resists electrical interference in noisy areas), <span class="kw">plenum-rated</span> (special fire-safe jacket required in air-circulation ceiling spaces), and <span class="kw">direct burial</span> (hardened for underground).</p>

  <h4>Coax and fiber</h4>
  <p><span class="kw">Coaxial</span> carries cable internet/TV (F-type connector). <span class="kw">Fiber</span> sends data as light through glass — immune to electrical interference and good over long distances. <span class="kw">Single-mode</span> fiber goes very far (carrier/long-haul); <span class="kw">multimode</span> is cheaper for shorter runs inside buildings.</p>

  <h4>Peripheral cables and their speeds</h4>
  <table class="ports">
   <tr><td class="mono">USB 2.0</td><td>~480 Mbps. Often black ports.</td></tr>
   <tr><td class="mono">USB 3.0</td><td>"SuperSpeed," ~5 Gbps. Often <b>blue</b> ports — a quick visual tell.</td></tr>
   <tr><td class="mono">USB-C</td><td>The reversible connector; can carry data, power, and video.</td></tr>
   <tr><td class="mono">Thunderbolt</td><td>Very high bandwidth; TB3/TB4 use the USB-C connector and allow daisy-chaining devices.</td></tr>
   <tr><td class="mono">Serial / DB9</td><td>Legacy RS-232; still used for console cables into switches/routers.</td></tr>
  </table>

  <h4>Video cables</h4>
  <table class="ports">
   <tr><td class="mono">HDMI</td><td>Most common video+audio; consumer standard.</td></tr>
   <tr><td class="mono">DisplayPort</td><td>Video+audio favored on PCs; great for high refresh/multi-monitor.</td></tr>
   <tr><td class="mono">DVI</td><td>Older digital video, no audio.</td></tr>
   <tr><td class="mono">VGA</td><td>Oldest, <b>analog</b>, blue 15-pin. Legacy only.</td></tr>
   <tr><td class="mono">USB-C</td><td>Can output video via DisplayPort "alt mode."</td></tr>
  </table>

  <h4>Drive and other connectors</h4>
  <p><span class="kw">SATA</span> connects internal drives; <span class="kw">eSATA</span> is its external version. Other connectors to recognize: <span class="kw">RJ45</span> (Ethernet), <span class="kw">RJ11</span> (phone/DSL), <span class="kw">SC/LC/ST</span> (fiber), <span class="kw">Molex</span> (legacy 4-pin power), <span class="kw">Lightning</span> (Apple), and <span class="kw">DB9</span> (serial). An <span class="kw">adapter</span> bridges two different connector types (e.g., USB-C to HDMI).</p>`},

 {t:"RAM characteristics", h:`
  <h4>What RAM is</h4>
  <p><span class="kw">RAM (random-access memory)</span> is the computer's fast, temporary workspace. Programs and the files you're actively using live here because it's far faster than storage — but it's <b>volatile</b>: power off and it's wiped. More RAM lets you run more at once without the system slowing down by swapping to disk.</p>

  <h4>Form factor</h4>
  <p><span class="kw">DIMM</span> is the full-size stick for desktops. <span class="kw">SODIMM</span> is the shorter stick for laptops and small-form-factor PCs. They are not interchangeable.</p>

  <h4>DDR generations</h4>
  <p><span class="kw">DDR (Double Data Rate)</span> memory has gone through generations — DDR3, DDR4, DDR5 — each faster and more efficient. They are <b>not backward compatible</b>: the notch on the stick is in a different position so DDR4 physically won't fit a DDR5 slot. Always match the generation the motherboard supports.</p>

  <h4>ECC vs. non-ECC</h4>
  <p><span class="kw">ECC (error-correcting code)</span> RAM can detect and fix small memory errors on the fly. Servers and critical systems use it; ordinary desktops use cheaper non-ECC. The board and CPU must support ECC for it to work.</p>

  <h4>Channels — why you buy RAM in pairs</h4>
  <p>Memory <span class="kw">channels</span> are parallel lanes between RAM and the CPU. Installing two matched sticks enables <b>dual-channel</b> mode, roughly doubling memory bandwidth versus a single stick. That's why kits come in matched pairs and why the manual tells you which color-coded slots to use — putting both sticks in the right slots is what unlocks the speed.</p>`},

 {t:"Storage devices", h:`
  <h4>HDD vs. SSD</h4>
  <p>A <span class="kw">hard disk drive (HDD)</span> stores data magnetically on spinning platters read by a moving head. Speed is tied to <b>spindle speed</b> (5400 RPM laptop drives are slower; 7200 RPM desktop drives faster). Because it has moving parts, it's slower and can fail mechanically (the dreaded click). Sizes: <span class="kw">3.5-inch</span> (desktop) and <span class="kw">2.5-inch</span> (laptop).</p>
  <p>A <span class="kw">solid-state drive (SSD)</span> uses flash memory chips — no moving parts, so it's far faster, silent, and more durable. This is the single biggest upgrade you can give an old computer.</p>

  <h4>SSD interfaces — how it connects</h4>
  <table class="ports">
   <tr><td class="mono">SATA</td><td>Older interface; an SSD here is fast but limited by SATA's ceiling (~550 MB/s).</td></tr>
   <tr><td class="mono">NVMe (over PCIe)</td><td>The fast modern path — connects through PCIe lanes for several times SATA's speed. Usually an M.2 stick.</td></tr>
   <tr><td class="mono">SAS</td><td>Enterprise/server interface, reliable and fast.</td></tr>
  </table>
  <p><b>Form factors:</b> <span class="kw">M.2</span> is the gum-stick that plugs flat into the board (can be SATA <i>or</i> NVMe — check which); <span class="kw">mSATA</span> is an older small form factor.</p>

  <h4>RAID — combining drives</h4>
  <p><span class="kw">RAID</span> joins multiple drives for speed, redundancy, or both:</p>
  <table class="ports">
   <tr><td class="mono">RAID 0</td><td><b>Striping.</b> Splits data across drives for speed. <b>No redundancy</b> — one drive dies, all data is lost. Needs 2+ drives.</td></tr>
   <tr><td class="mono">RAID 1</td><td><b>Mirroring.</b> Writes the same data to two drives. Survives one drive failure. Needs 2 drives.</td></tr>
   <tr><td class="mono">RAID 5</td><td>Striping with <b>parity</b> spread across drives — speed plus survives one failure. Needs 3+ drives.</td></tr>
   <tr><td class="mono">RAID 6</td><td>Like 5 but <b>double parity</b> — survives two simultaneous failures. Needs 4+.</td></tr>
   <tr><td class="mono">RAID 10</td><td>A mirror of stripes (1+0) — fast <b>and</b> redundant. Needs 4+.</td></tr>
  </table>
  <p>Remember: <b>RAID is not a backup</b> — it protects against hardware failure, not deletion or ransomware.</p>

  <h4>Removable and optical</h4>
  <p><span class="kw">Flash drives</span> and <span class="kw">memory cards</span> (SD/microSD) are portable flash storage. <span class="kw">Optical drives</span> read CDs/DVDs/Blu-ray and are now rare.</p>`},

 {t:"Motherboards, CPUs & expansion", h:`
  <h4>Motherboard form factors</h4>
  <p>The board's size sets how much fits and which case it needs, biggest to smallest: <span class="kw">ATX</span> &gt; <span class="kw">microATX</span> &gt; <span class="kw">Mini-ITX</span>. Bigger boards have more slots; smaller ones suit compact builds.</p>

  <h4>Slots and connectors</h4>
  <p><span class="kw">PCIe</span> slots hold expansion cards (graphics, etc.) and come in sizes by lane count — x16 (graphics), x1 (small cards). <span class="kw">M.2</span> slots hold NVMe SSDs. There are also SATA ports for drives, power connectors, and front-panel <span class="kw">headers</span> for the case's buttons and USB ports.</p>

  <h4>CPU compatibility — the socket</h4>
  <p>The <span class="kw">CPU socket</span> must match the processor. <b>Intel</b> and <b>AMD</b> use different sockets, and even within one brand sockets change between generations. A CPU simply won't fit the wrong socket. Intel often uses <b>LGA</b> (pins on the board) and AMD historically <b>PGA</b> (pins on the chip).</p>

  <h4>BIOS/UEFI firmware</h4>
  <p>The <span class="kw">BIOS/UEFI</span> is firmware on the board that starts the hardware before the OS loads (it runs the POST self-test). In its setup screen you can change:</p>
  <ul>
   <li><b>Boot order</b> — which drive/device to boot from.</li>
   <li><span class="kw">Secure Boot</span> — only allows trusted, signed boot software (anti-malware).</li>
   <li><span class="kw">TPM</span> — a chip that securely stores encryption keys; required for BitLocker and Windows 11.</li>
   <li>USB permissions, fan/temperature monitoring, and BIOS/boot passwords.</li>
  </ul>
  <p>For encryption, a <span class="kw">TPM</span> is built into the system, while an <span class="kw">HSM (hardware security module)</span> is a dedicated device for managing keys at larger scale. <b>Virtualization support</b> (Intel VT-x / AMD-V) must be enabled here to run VMs well.</p>

  <h4>CPU architecture</h4>
  <p><span class="kw">x86/x64</span> chips (Intel/AMD) power most desktops and laptops; <span class="kw">ARM</span> chips are power-efficient and dominate phones, tablets, and newer thin laptops. A CPU has multiple <b>cores</b> (independent workers) and often <b>hyperthreading/SMT</b>, which lets each core handle two threads — more parallel work.</p>

  <h4>Expansion cards and cooling</h4>
  <p>Add capability with cards: <span class="kw">video (GPU)</span>, <span class="kw">sound</span>, <span class="kw">capture</span> (record video input), and <span class="kw">NIC</span> (networking). Heat is the enemy: <span class="kw">fans</span> move air, a <span class="kw">heat sink</span> pulls heat off the CPU, <span class="kw">thermal paste</span> fills the microscopic gap between CPU and heat sink for good contact, and <span class="kw">liquid cooling</span> handles high-end heat loads.</p>`},

 {t:"Power supplies", h:`
  <p>The <span class="kw">power supply unit (PSU)</span> converts the wall's AC into the low-voltage DC the computer's parts need. Getting it right matters for stability and safety.</p>

  <h4>Input voltage</h4>
  <p>Wall power differs by region: <span class="mono">110–120 VAC</span> in North America vs. <span class="mono">220–240 VAC</span> in much of the world. Some PSUs have a red voltage switch — set wrong, you damage the unit. Many modern PSUs auto-sense.</p>

  <h4>Output rails</h4>
  <p>The PSU outputs several DC voltages, each feeding different parts: <span class="mono">+12V</span> (the big one — CPU, GPU, drives, fans), <span class="mono">+5V</span> and <span class="mono">+3.3V</span> (board logic, older devices). A failing rail causes instability or no boot.</p>

  <h4>Connectors</h4>
  <p>The main board connector is the <span class="kw">20+4 pin</span> (a 24-pin made of a 20-pin plus a detachable 4-pin for compatibility). The CPU gets a separate 4/8-pin (EPS) connector, the GPU gets 6/8-pin PCIe connectors, and drives use SATA power.</p>

  <h4>Choosing a PSU</h4>
  <ul>
   <li><span class="kw">Wattage</span> — must exceed the system's total draw, with headroom. The GPU is usually the largest consumer.</li>
   <li><span class="kw">Energy efficiency</span> — "80 Plus" ratings (Bronze/Gold/Platinum) mean less wasted power and heat.</li>
   <li><span class="kw">Modular</span> — detachable cables, so you only install the ones you need (cleaner airflow).</li>
   <li><span class="kw">Redundant</span> — servers use two PSUs so the system keeps running if one fails.</li>
  </ul>
  <p><b>Safety:</b> never open a PSU — its internal capacitors can hold a dangerous charge even when unplugged.</p>`},

 {t:"Tech tools & safe handling", h:`
  <p>The fundamentals the video courses drill early — the gear you carry and the habits that keep both the hardware and you safe.</p>

  <h4>Standard toolkit</h4>
  <p>Screwdrivers (Phillips, flathead, and <b>Torx</b> for many laptops/Apple gear), a parts tray to keep tiny screws organized, a <span class="kw">spudger/pry tool</span> for popping plastic clips without cracking them, tweezers, and a flashlight.</p>

  <h4>Diagnostic tools</h4>
  <table class="ports">
   <tr><td class="mono">Multimeter</td><td>Measures voltage and continuity — confirm an outlet's voltage or check whether a cable/fuse is broken.</td></tr>
   <tr><td class="mono">Power supply tester</td><td>Quickly checks whether a PSU's rails output correct voltages.</td></tr>
   <tr><td class="mono">POST card</td><td>Plugs into the board and shows a code pinpointing where boot fails.</td></tr>
   <tr><td class="mono">SATA-to-USB adapter</td><td>Connect a bare drive externally to read or recover it.</td></tr>
  </table>

  <h4>Protecting the hardware (ESD)</h4>
  <p><span class="kw">Electrostatic discharge (ESD)</span> is the silent killer of components: a static shock far too small for you to feel can still destroy a chip. Defend against it with an <span class="kw">ESD wrist strap</span> clipped to ground and an anti-static mat. Counter-intuitively, <b>low humidity increases static</b>, so dry rooms are riskier. Always <b>unplug</b> before working inside.</p>

  <h4>Personal safety</h4>
  <p><b>Never open a power supply or a CRT monitor</b> — both store dangerous high-voltage charge even unplugged. Apply a thin, even layer of <span class="kw">thermal paste</span> between CPU and heat sink (too much insulates instead of conducting). Deeper safety, power protection, and disposal rules are in Phase 2 → Operational Procedures.</p>`},

 {t:"Printers & multifunction devices", h:`
  <h4>Laser printers — the big one</h4>
  <p>Laser printers are the trivia favorite, so learn the <b>imaging process in order</b> and the parts. A laser "draws" the page with static electricity, then bakes toner onto the paper:</p>
  <ol>
   <li><b>Processing</b> — the printer builds the image of the page in memory.</li>
   <li><b>Charging</b> — a uniform negative charge is applied to the drum.</li>
   <li><b>Exposing</b> — a laser writes the image by discharging spots on the drum.</li>
   <li><b>Developing</b> — toner sticks to the charged image areas on the drum.</li>
   <li><b>Transferring</b> — the toner image moves from drum to paper.</li>
   <li><b>Fusing</b> — the <span class="kw">fuser</span> applies heat and pressure to melt the toner permanently into the paper (that's why pages come out warm).</li>
   <li><b>Cleaning</b> — leftover toner is wiped from the drum for the next page.</li>
  </ol>
  <p><b>Key parts:</b> toner cartridge, imaging <span class="kw">drum</span>, <span class="kw">fuser</span>, transfer roller, pickup roller, separation pad. <b>Maintenance:</b> replace toner, apply the maintenance kit, calibrate, and clean.</p>

  <h4>Other printer types</h4>
  <ul>
   <li><span class="kw">Inkjet</span> — sprays liquid ink. Maintenance: clean/unclog printheads, replace cartridges, calibrate, clear jams.</li>
   <li><span class="kw">Thermal</span> — uses heat on special heat-sensitive paper (receipts). Maintenance: replace the special paper, clean the heating element.</li>
   <li><span class="kw">Impact</span> — a printhead strikes a ribbon against paper, like a typewriter. The only type that can print <b>multipart (carbon-copy) forms</b>. Maintenance: replace ribbon, printhead, paper.</li>
   <li><span class="kw">3D printers</span> — build objects in layers, commonly melting plastic filament (FDM) or curing liquid resin.</li>
  </ul>

  <h4>Deploying and configuring</h4>
  <p>Unbox and place sensibly, install the correct driver — <span class="kw">PCL</span> vs <span class="kw">PostScript</span> page languages — and update firmware. Connect by USB, Ethernet, or wireless. Share via a <b>printer share</b> or a dedicated <b>print server</b>. Configure duplex (double-sided), orientation, tray settings, and quality. Security options: user authentication, badging, audit logs, and <b>secured prints</b> (the job holds until you enter a PIN at the printer). Scan-to-email/SMB/cloud and an <span class="kw">ADF (automatic document feeder)</span> vs flatbed round out a multifunction device.</p>`},
],
4:[
 {t:"Virtualization concepts", h:`
  <h4>The core idea</h4>
  <p><span class="kw">Virtualization</span> lets one physical computer run several independent "computers" in software, called <span class="kw">virtual machines (VMs)</span>. Each VM has its own virtual CPU, RAM, disk, and network — all carved out of the host's real resources — and believes it's a complete computer. This squeezes far more use out of one powerful machine.</p>

  <h4>Why you'd virtualize</h4>
  <ul>
   <li><span class="kw">Sandbox</span> — a safe, isolated box to open suspicious files or test risky changes; if it breaks or gets infected, you delete it and the host is untouched.</li>
   <li><span class="kw">Test/development</span> — try software on many OS versions without buying many computers.</li>
   <li><span class="kw">Application virtualization</span> — run <b>legacy</b> software that needs an old OS, or <b>cross-platform</b> apps (a Windows VM on a Mac).</li>
  </ul>
  <p>A huge practical perk is the <span class="kw">snapshot</span>: a saved freeze-frame of a VM's exact state. Make a change, and if it goes wrong, roll back to the snapshot in seconds. (This is the perfect way to practice the troubleshooting and OS skills in this course safely.)</p>

  <h4>Hypervisors — the two types</h4>
  <p>The <span class="kw">hypervisor</span> is the software layer that creates and runs VMs:</p>
  <ul>
   <li><span class="kw">Type 1 (bare-metal)</span> — runs <b>directly on the hardware</b>, with no host OS underneath. Fast and efficient; this is what data centers use (VMware ESXi, Microsoft Hyper-V, Proxmox).</li>
   <li><span class="kw">Type 2 (hosted)</span> — runs as an <b>application on top of a normal OS</b> (VirtualBox or VMware Workstation on your Windows laptop). Easier to set up; lower performance. This is what you'll use to practice.</li>
  </ul>

  <h4>Containers vs. VMs</h4>
  <p><span class="kw">Containers</span> (e.g., Docker) are lighter than VMs because they <b>share the host's OS kernel</b> instead of each carrying a full operating system. A VM virtualizes a whole computer; a container just packages an app and what it needs. Containers start in seconds and use far fewer resources, which is why developers love them.</p>

  <h4>Requirements and VDI</h4>
  <p>VMs still need real <b>security</b> (isolation), <b>network</b> (virtual switches), and <b>storage</b> resources allotted to them — over-commit and everything slows down. <span class="kw">VDI (Virtual Desktop Infrastructure)</span> applies this to user desktops: the desktops run on central servers, and users connect to them from thin clients or laptops, so all the computing and data stays in the data center.</p>`},

 {t:"Cloud computing concepts", h:`
  <h4>What "the cloud" really means</h4>
  <p>Cloud computing is renting someone else's computing over the internet instead of owning the hardware. You pay for what you use and let the provider handle the physical machines.</p>

  <h4>Service models — the pizza analogy</h4>
  <p>The three models differ by <b>how much the provider manages vs. you</b>:</p>
  <ul>
   <li><span class="kw">IaaS (Infrastructure as a Service)</span> — they give you raw virtual machines, storage, and networking; you install and manage the OS and everything above it. <i>Most control, most work.</i> (Like buying ingredients and making the pizza at home.)</li>
   <li><span class="kw">PaaS (Platform as a Service)</span> — they manage the OS and platform; you just deploy your application. <i>Good for developers.</i> (Like a take-and-bake — the platform's ready, you add your app.)</li>
   <li><span class="kw">SaaS (Software as a Service)</span> — fully finished software you just log in and use; they manage everything. <i>Least control, least work.</i> Gmail, Microsoft 365, Dropbox. (Pizza delivered — you just eat.)</li>
  </ul>

  <h4>Deployment models — who can use it</h4>
  <ul>
   <li><span class="kw">Public cloud</span> — shared infrastructure run by a provider (AWS, Azure) for anyone.</li>
   <li><span class="kw">Private cloud</span> — dedicated to one organization, for control and compliance.</li>
   <li><span class="kw">Hybrid cloud</span> — a mix, letting workloads move between private and public.</li>
   <li><span class="kw">Community cloud</span> — shared by several organizations with common needs (e.g., government agencies).</li>
  </ul>

  <h4>Cloud characteristics</h4>
  <table class="ports">
   <tr><td class="mono">Elasticity</td><td>Scale resources up or down on demand — handle a traffic spike, then shrink back.</td></tr>
   <tr><td class="mono">Metered usage</td><td>Pay only for what you consume. Watch <b>ingress/egress</b> — moving data out is often charged.</td></tr>
   <tr><td class="mono">Shared vs dedicated</td><td>Shared (multitenant) is cheaper; dedicated resources cost more but isolate you.</td></tr>
   <tr><td class="mono">High availability</td><td>Built-in redundancy keeps services running through failures.</td></tr>
   <tr><td class="mono">File synchronization</td><td>Files stay in sync across devices automatically (like cloud drives).</td></tr>
   <tr><td class="mono">Multitenancy</td><td>Many customers safely share the same physical infrastructure.</td></tr>
  </table>`},
],

5:[
 {t:"First-step logic & quick tells", h:`
  <p>Many exam questions ask for the <b>first</b> step or the <b>most likely</b> cause. The winning instinct is always the same: check the simplest, cheapest, least-invasive thing before you start swapping parts or reinstalling. Burn these reflexes in:</p>
  <ul>
   <li><b>No power at all</b> → the obvious chain first: wall outlet, the power cable, the PSU's own switch (and voltage setting), then the case's front-panel power button connector.</li>
   <li><b>No network</b> → check the physical link and link light <b>before</b> touching IP settings.</li>
   <li><b><span class="mono">169.254.x.x</span> address</b> → the device couldn't reach a DHCP server. DHCP problem.</li>
   <li><b>Can ping an IP but not a website name</b> → name resolution is broken. DNS problem.</li>
   <li><b>No link light on the NIC/switch</b> → cable, port, NIC, or the switch itself.</li>
   <li><b>Weak Wi-Fi</b> → distance, interference, wrong band, a congested channel, or an overloaded access point.</li>
   <li><b>Beyond your skill or authority</b> → escalate. It's faster for the customer and the professional choice — never guess on production systems.</li>
  </ul>
  <p>And the golden habit before any risky change: <b>back up the data first.</b></p>`},

 {t:"The troubleshooting model (CompTIA's 6 steps)", h:`
  <p>This is the mental checklist to run on every problem. The methodology itself isn't a graded question on the 1201, but scenario questions are written around it — so learn the order and the <i>idea</i> behind each step, not just the words.</p>
  <ol>
   <li><b>Identify the problem.</b> Ask the user what changed, gather symptoms, check the obvious — and back up data before you touch anything.</li>
   <li><b>Establish a theory of probable cause</b> — <i>question the obvious first.</i> If you're unsure, research the knowledge base / internet.</li>
   <li><b>Test the theory</b> to confirm or rule out the cause. If the theory is wrong, form a new one (or escalate).</li>
   <li><b>Establish a plan of action</b> to resolve it, then implement the fix.</li>
   <li><b>Verify full functionality</b> and, if applicable, apply preventive measures so it doesn't come back.</li>
   <li><b>Document</b> findings, actions, and outcomes for the next tech.</li>
  </ol>
  <p>Two reflexes the exam rewards: <b>back up data before making changes</b>, and when a fix is beyond your skill or authority, <b>escalate</b> instead of guessing.</p>`},

 {t:"Motherboard, RAM, CPU & power symptoms", h:`
  <p>Match the symptom to the most likely culprit:</p>
  <table class="ports">
   <tr><td class="mono">POST beeps / crash screen / blank screen</td><td>POST found a problem before video started — commonly reseated/failed <b>RAM</b> or GPU, or a board fault. Reseat memory first.</td></tr>
   <tr><td class="mono">No power / random shutdowns</td><td>Suspect the <b>power supply</b> first, then <b>overheating</b> (a system shuts itself off to avoid damage).</td></tr>
   <tr><td class="mono">Burning smell / smoke</td><td>Power down immediately — a component (often the PSU) is failing.</td></tr>
   <tr><td class="mono">Capacitor swelling</td><td>Bulging/leaking capacitors on the board or PSU = failing hardware, replace it.</td></tr>
   <tr><td class="mono">Overheating / unusual noise</td><td>Failing or dust-clogged fan, dried thermal paste, or blocked airflow.</td></tr>
   <tr><td class="mono">Sluggish performance / app crashes</td><td>Overheating throttling the CPU, or bad RAM.</td></tr>
   <tr><td class="mono">Inaccurate system date/time</td><td>The <b>CMOS battery</b> (the coin cell) is dead — replace it.</td></tr>
  </table>`},

 {t:"Drive & RAID symptoms", h:`
  <table class="ports">
   <tr><td class="mono">Grinding / clicking noises</td><td>Mechanical <b>HDD</b> failure in progress — back up immediately, the drive is dying.</td></tr>
   <tr><td class="mono">Bootable device not found</td><td>The drive isn't detected, the boot order is wrong, or the OS/boot files are damaged.</td></tr>
   <tr><td class="mono">S.M.A.R.T. failure</td><td>The drive's own self-monitoring is predicting failure — replace it now, even if it still works.</td></tr>
   <tr><td class="mono">Extended read/write times / low IOPS</td><td>A failing drive, bad cable, or an overwhelmed disk.</td></tr>
   <tr><td class="mono">Data loss / corruption</td><td>Failing drive, bad sectors, or improper shutdowns.</td></tr>
   <tr><td class="mono">RAID failure / array missing / audible alarms</td><td>A member disk dropped out. Check the controller and the drive status LEDs; replace the failed disk so the array can rebuild.</td></tr>
   <tr><td class="mono">Missing drives in OS</td><td>Loose data/power cable, drive not initialized, or a failing drive.</td></tr>
  </table>`},

 {t:"Video, projector & display symptoms", h:`
  <table class="ports">
   <tr><td class="mono">No image at all</td><td>Wrong input source selected, a loose/bad video cable, or (projector) a burnt-out bulb.</td></tr>
   <tr><td class="mono">Fuzzy or distorted image</td><td>Bad cable, a resolution that doesn't match the panel, or a failing display.</td></tr>
   <tr><td class="mono">Wrong/incorrect colors</td><td>Cable issue (a bent pin can drop a color), miscalibration, or a failing panel.</td></tr>
   <tr><td class="mono">Dead pixels</td><td>Individual pixels stuck off/on — a panel defect.</td></tr>
   <tr><td class="mono">Burn-in</td><td>A faint permanent ghost of a static image (OLED/plasma) left on too long.</td></tr>
   <tr><td class="mono">Flickering / dim image</td><td>Backlight or (older screens) inverter problem, or a loose cable.</td></tr>
   <tr><td class="mono">Projector shuts off intermittently</td><td>Overheating — clean the filters and ensure airflow; it shuts down to protect the bulb.</td></tr>
  </table>`},

 {t:"Mobile device symptoms", h:`
  <table class="ports">
   <tr><td class="mono">Swollen battery</td><td>Stop using it, don't press or puncture it, replace it. Fire risk.</td></tr>
   <tr><td class="mono">Poor / no connectivity</td><td>Toggle airplane mode, re-join Wi-Fi, re-pair Bluetooth; check antennas after any repair.</td></tr>
   <tr><td class="mono">Overheating / improper charging</td><td>Bad battery, faulty cable/charger, or a damaged charging port.</td></tr>
   <tr><td class="mono">Physically damaged ports</td><td>Worn/bent charge port — needs repair or replacement.</td></tr>
   <tr><td class="mono">Digitizer issues / cursor drift</td><td>Touch is misreading — recalibrate, or replace the digitizer if hardware.</td></tr>
   <tr><td class="mono">Stylus not working</td><td>Battery/pairing, or an incompatible/failed stylus or digitizer.</td></tr>
   <tr><td class="mono">Liquid damage</td><td>Power off, don't charge, dry it out; corrosion may have caused lasting harm.</td></tr>
   <tr><td class="mono">Can't install apps / degraded performance</td><td>Storage full, OS out of date, or malware.</td></tr>
  </table>`},

 {t:"Network symptoms", h:`
  <table class="ports">
   <tr><td class="mono">Intermittent wireless</td><td>Distance, interference, or a congested channel — move the AP or change channel.</td></tr>
   <tr><td class="mono">Slow speeds / high latency</td><td>Congestion, a failing cable, or a duplex mismatch.</td></tr>
   <tr><td class="mono">Limited connectivity (169.254 / no gateway)</td><td>DHCP can't be reached — the device self-assigned an APIPA address.</td></tr>
   <tr><td class="mono">Jitter / poor VoIP quality</td><td>Inconsistent packet timing wrecks voice and video calls — a QoS/congestion issue.</td></tr>
   <tr><td class="mono">Port flapping</td><td>A link repeatedly going up and down — bad cable, NIC, or switch port.</td></tr>
   <tr><td class="mono">External interference</td><td>Other devices on the same frequency (2.4 GHz especially) degrading Wi-Fi.</td></tr>
   <tr><td class="mono">Authentication failures</td><td>Wrong password/credentials, an expired certificate, or a RADIUS issue.</td></tr>
   <tr><td class="mono">Intermittent internet connectivity</td><td>Could be the modem/ISP, a flaky cable, or an overloaded router.</td></tr>
  </table>`},

 {t:"Printer symptoms", h:`
  <table class="ports">
   <tr><td class="mono">Faded prints</td><td>Low toner/ink, or a low density setting.</td></tr>
   <tr><td class="mono">Lines / streaks down the page</td><td>Dirty or failing drum (laser) or clogged printhead (inkjet).</td></tr>
   <tr><td class="mono">Ghost / double images</td><td>Failing drum or fuser on a laser printer.</td></tr>
   <tr><td class="mono">Smearing / toner rubs off</td><td>Bad fuser — it isn't bonding toner to the page.</td></tr>
   <tr><td class="mono">Speckling on pages</td><td>Stray toner or a dirty/scratched drum.</td></tr>
   <tr><td class="mono">Paper jams / not feeding / multipage misfeed</td><td>Worn pickup rollers, wrong/damp paper, or the wrong paper path setting.</td></tr>
   <tr><td class="mono">Garbled print</td><td>Wrong or corrupt printer driver.</td></tr>
   <tr><td class="mono">Multiple jobs stuck / frozen queue</td><td>Restart the print spooler service to clear it.</td></tr>
   <tr><td class="mono">Finishing issues (staple/hole punch), tray not recognized</td><td>The finisher or tray hardware needs attention or the wrong tray is selected.</td></tr>
  </table>`},
],
};

const QUESTIONS1 = [{"d":2,"q":"Which item is NOT likely to be found in a technician's toolkit?","o":["Thumb drive","Nut driver","Voltage tester","EMP"],"c":3,"e":"Electromagnetic pulse (EMP) is not a tool, it is a cause of problems. All of the other choices are common tools used by technicians."},{"d":2,"q":"A tech might use this tool to check power supplied by a wall socket:","o":["RFI meter","ESD meter","Voltmeter","Tweezers"],"c":2,"e":"A voltmeter can test wall power. Radio frequency interference (RFI) and electrostatic discharge (ESD) meters don't test wall power. Using tweezers to test for power can cause equipment damage, injury, or death."},{"d":5,"q":"What should a tech do when solving a problem is beyond their ability?","o":["Ask the customer for advice","Disassemble the system and rebuild it from scratch","Tell the customer that the problem can't be fixed","Escalate the issue"],"c":3,"e":"In order to solve the problem quickly, escalating the issue is often good for the customer and is an opportunity for the technician to learn. The other options are poor choices for a technician."},{"d":3,"q":"Which primary PC component is an output device?","o":["Microphone","Printer","Web camera","Keyboard"],"c":1,"e":"A printer is an output device. Microphones, keyboards, and web cameras input information to the computer, so they are input devices."},{"d":3,"q":"Which of the following is NOT a part of a PC?","o":["GPU","RAM","CPU","TPU"],"c":3,"e":"TPU is a made-up term. Graphics processing units (GPUs) send the display signal to the monitor, random access memory (RAM) sticks are where short-term memory is stored, and the central processing unit (CPU) is the \"brain\" of the computer."},{"d":3,"q":"Many cities have a makerspace where you can get hands-on with hardware at little to no cost.","o":["True","False"],"c":0,"e":"Makerspaces are facilities for making, learning, and exploring technology that use both high tech and no tech tools. Many cities have makerspaces lo
