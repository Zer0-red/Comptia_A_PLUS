hich option is affected by the power supply wattage rating?","o":["type of power supply connectors","number of adapters and internal storage devices","speed of the processor","number of power supply connectors"],"c":1,"e":"Correct answer: B. number of adapters and internal storage devices\n\nSource note: Extra file category 5 Disassembly and Power, Q13.","src":"extra-reworded"},{"d":5,"q":"Which option would help with computer heat?","o":["upgrading to a larger power supply form factor","unplugging unused power connectors","installing case fans","increasing the power supply wattage"],"c":2,"e":"Correct answer: C. installing case fans\n\nSource note: Extra file category 5 Disassembly and Power, Q14.","src":"extra-reworded"},{"d":3,"q":"Power supply disassembly is a common requirement of a PC technician.","o":["True","False"],"c":1,"e":"Correct answer: B. False\n\nSource note: Extra file category 5 Disassembly and Power, Q15.","src":"extra-reworded"},{"d":3,"t":"flash","q":"Consider the following email.\nFrom: Cheryl a. Schmidt\nTo: Network Engineering Technology Faculty\nSubj: [None]\nWe have little time to get the PMS done on the PCs and N/W gear. What software do you want?\nReword this email to illustrate good written communication skills.\n____\n____\n____\n____\n____\n____\n____\n____\n____\n____","a":"Example rewrite: “Subject: Preventive maintenance software request. Hello Network Engineering Technology Faculty, We have limited time to complete preventive maintenance on the PCs and network equipment. Please send me the software you want installed or updated by [date/time]. Thank you, Cheryl Schmidt.”","e":"Expected answer:\nExample rewrite: “Subject: Preventive maintenance software request. Hello Network Engineering Technology Faculty, We have limited time to complete preventive maintenance on the PCs and network equipment. Please send me the software you want installed or updated by [date/time]. Thank you, Cheryl Schmidt.”\n\nExtra file category 5 Disassembly and Power, Q16.","src":"extra-reworded"},{"d":3,"t":"flash","q":"Name three recommendations for good technical written communication.\n____\n____\n____\n____\n____","a":"Use a clear subject, avoid slang/unexplained acronyms, proofread, keep the tone professional, include needed details, and be concise.","e":"Expected answer:\nUse a clear subject, avoid slang/unexplained acronyms, proofread, keep the tone professional, include needed details, and be concise.\n\nExtra file category 5 Disassembly and Power, Q17.","src":"extra-reworded"},{"d":5,"q":"A computer is doing weird things, such as shutting down unexpectedly and hanging. You suspect a power problem. You check the power good (power OK) signal on the power supply’s main motherboard connector. The voltage reading shows that you have power (+2.5 volts). What are you going to do next?","o":["Check the voltage coming out of a Molex or SATA connector.","Replace the power supply.","Check the power supply cable for resistance.","Check the wall outlet voltage."],"c":1,"e":"Correct answer: B. Replace the power supply.\n\nSource note: Extra file category 5 Disassembly and Power, Q18.","src":"extra-reworded"},{"d":3,"q":"What does the I/O shield?","o":["It prevents dust and dirt from coming in through the front computer ports.","It protects the technician from shocks.","It prevents dust and dirt from coming into the power supply.","It provides grounding for motherboard ports."],"c":3,"e":"Correct answer: D. It provides grounding for motherboard ports.\n\nSource note: Extra file category 5 Disassembly and Power, Q19.","src":"extra-reworded"},{"d":3,"q":"Which two items would help a technician maintain personal safety while working on PCs and printers in an extremely dusty warehouse? (Choose two.)","o":["safety goggles","antistatic wrist strap","vacuum","air filter mask","toner vacuum"],"c":[0,3],"e":"Correct answers: A, D. A. safety goggles; D. air filter mask\n\nSource note: Extra file category 5 Disassembly and Power, Q20.","src":"extra-reworded"},{"d":3,"q":"Context note for following question(s):\nThe following specifications for motherboard RAM are used for Questions 1–5:\n- Four DDR4 SDRAM DIMM sockets arranged in two channels and supporting up to 128 GB (32 GB single DIMM capacity) of system memory\n- Support for DDR4 3200/2933/2667/2400/2133 MHz memory modules DIMMs\n- Support for ECC unbuffered DIMM 1Rx8/2Rx8 memory modules\n- Support for non-ECC unbuffered DIMM 1Rx8/2Rx8/1Rx16 memory modules\n- Support for extreme memory profile (XMP) memory modules\n- Support for up to 16 GB of system memory\nOf the given features, which would be applicable to this computer? (Choose all that apply.)","o":["single rank","non-ECC","dual rank","registered","ECC","288-pin DDR4 DIMM","unbuffered","288-pin DDR5 DIMM","204-pin SO-DIMM"],"c":[6,5,4,1,0,2],"e":"Correct answers: A, B, C, E, F, G. A. single rank; B. non-ECC; C. dual rank; E. ECC; F. 288-pin DDR4 DIMM; G. unbuffered\n\nSource note: Extra file category 6 Memory, Q1.","src":"extra-reworded"},{"d":3,"t":"flash","q":"Assume this computer has 4 GB of memory installed. Write all combinations of memory population when inserting RAM into the slots.\n____","a":"Examples: one 4 GB DIMM; two matched 2 GB DIMMs in the proper dual-channel slots; or four matched 1 GB DIMMs.","e":"Expected answer:\nExamples: one 4 GB DIMM; two matched 2 GB DIMMs in the proper dual-channel slots; or four matched 1 GB DIMMs.\n\nExtra file category 6 Memory, Q2.","src":"extra-reworded"},{"d":5,"q":"The technician who is recommending memory for this motherboard could recommend memory that does not perform error checking.","o":["True","False"],"c":0,"e":"Correct answer: A. True\n\nSource note: Extra file category 6 Memory, Q3.","src":"extra-reworded"},{"d":3,"t":"flash","q":"What does the statement “four DDR4 SDRAM DIMM sockets arranged in two channels” mean?\n____\n____","a":"The board has four DDR4 DIMM slots divided into two memory channels; matched modules should be installed in the correct paired slots for dual-channel operation.","e":"Expected answer:\nThe board has four DDR4 DIMM slots divided into two memory channels; matched modules should be installed in the correct paired slots for dual-channel operation.\n\nExtra file category 6 Memory, Q4.","src":"extra-reworded"},{"d":5,"t":"flash","q":"Would there be an issue if this motherboard contained 6 GB of RAM and the computer had 32-bit Windows 10 installed? If so, explain the issue.\n____\n____\nConsider the following memory advertisements for desktop memory used in Questions 6–11:\nChoices:\nA. 2 GB 240-pin SDRAM DDR3L 1600 (PC3L 12800) Desktop Memory\nB. 4 GB DDR3-1600 (PC3-12800) CL11 240-pin DIMM\nC. 4 GB ECC registered DDR3 SDRAM CAS latency 9\nD. 4 GB 240-pin DDR3 SDRAM 1333 (PC3 10600) CAS 9\nE. 8 GB (1x8 GB) 1333MHz PC3-10600 CL9 ECC registered dual-rank low power\nF. 8 GB (2x4 GB) DDR4 SDRAM 2133 (PC4 17000)\nG. 16 GB PC4L-2666\nH. 16 GB kit (2x8 GB) DDR4 2666 MHz PC4-21300 CL19 unbuffered non-ECC 1.2V UDIMM\nI. 16 GB 1Rx16 DDR4 UDIMM 3200MHz","a":"Yes. A 32-bit Windows OS can recognize only about 4 GB of RAM, so part of the 6 GB would be unusable.","e":"Expected answer:\nYes. A 32-bit Windows OS can recognize only about 4 GB of RAM, so part of the 6 GB would be unusable.\n\nExtra file category 6 Memory, Q5.","src":"extra-reworded"},{"d":3,"t":"flash","q":"In these advertisements, which DDR4 option(s) would hold the most data in a single memory module and be best suited for a desktop computer?\n____\n____\n____","a":"I","e":"Expected answer:\nI\n\nExtra file category 6 Memory, Q6.","src":"extra-reworded"},{"d":3,"t":"flash","q":"In option g, what does the L in DDR4L mean?\n____\n____","a":"Low voltage / low power.","e":"Expected answer:\nLow voltage / low power.\n\nExtra file category 6 Memory, Q7.","src":"extra-reworded"},{"d":3,"t":"flash","q":"A customer wants to dual-channel 8 GB of RAM on a desktop computer. Which memory module(s) would be best to buy, given the following documentation from the motherboard manual? (Memory module slots are in order from closest to the CPU: 1, 3, 2, and 4.)\n- Do not install ECC memory modules.\n- The memory configurations are as follows: A pair of matched modules in DIMM connectors 1 and 2 A pair of matched modules in DIMM connectors 1 and 2 and another pair in connectors 3 and 4\n- If you install mixed pairs, the memory modules function at the speed of the slowest memory module installed.\n____\n____","a":"F","e":"Expected answer:\nF\n\nExtra file category 6 Memory, Q8.","src":"extra-reworded"},{"d":3,"t":"flash","q":"Considering the answer given to Question 8, which motherboard DIMM connectors would be used?\n____","a":"DIMM connectors 1 and 2.","e":"Expected answer:\nDIMM connectors 1 and 2.\n\nExtra file category 6 Memory, Q9.","src":"extra-reworded"},{"d":3,"q":"Which type of memory feature will be needed if data accuracy is paramount for a new computer?","o":["ECC","buffered","XMP","registered"],"c":0,"e":"Correct answer: A. ECC\n\nSource note: Extra file category 6 Memory, Q10.","src":"extra-reworded"},{"d":3,"t":"flash","q":"When comparing options b and d and imagining that both modules cost the same, which one would be the better purchase? Explain your reasoning.\n____\n____","a":"B; it is DDR3-1600/PC3-12800, which is faster than DDR3-1333/PC3-10600 if both are compatible and cost the same.","e":"Expected answer:\nB; it is DDR3-1600/PC3-12800, which is faster than DDR3-1333/PC3-10600 if both are compatible and cost the same.\n\nExtra file category 6 Memory, Q11.","src":"extra-reworded"},{"d":3,"q":"Which method is most effective for preventing an ESD event when installing RAM?","o":["Placing the computer on an antistatic mat","Wearing rubber-soled shoes and using the buddy system by having another technician standing by","Wearing an antistatic wrist strap","Staying in contact with an unpainted metal part of the computer"],"c":2,"e":"Correct answer: C. Wearing an antistatic wrist strap\n\nSource note: Extra file category 6 Memory, Q12.","src":"extra-reworded"},{"d":3,"q":"Which option would be the first sign that a computer needs more RAM?","o":["The computer makes a ticking noise.","A POST error message appears.","A recommendation to use the Windows Memory Diagnostic Tool appears.","The computer is slow to respond."],"c":3,"e":"Correct answer: D. The computer is slow to respond.\n\nSource note: Extra file category 6 Memory, Q13.","src":"extra-reworded"},{"d":3,"q":"How can you tell the maximum amount of memory a motherboard can support?","o":["Use the Windows Task Manager > Performance tab.","Look at the memory options in BIOS/UEFI.","Look at the motherboard documentation.","Use the Windows Memory tool."],"c":2,"e":"Correct answer: C. Look at the motherboard documentation.\n\nSource note: Extra file category 6 Memory, Q14.","src":"extra-reworded"},{"d":3,"t":"flash","q":"What is one easy way to tell how much RAM is installed in a computer?\n____\n____","a":"Open Settings > System > About, System Information, or Task Manager > Performance > Memory.","e":"Expected answer:\nOpen Settings > System > About, System Information, or Task Manager > Performance > Memory.\n\nExtra file category 6 Memory, Q15.","src":"extra-reworded"},{"d":3,"q":"A DDR4 DIMM can fit in a DDR3 memory expansion slot.","o":["True","False"],"c":1,"e":"Correct answer: B. False\n\nSource note: Extra file category 6 Memory, Q16.","src":"extra-reworded"},{"d":5,"t":"flash","q":"You have just added two new memory modules to a computer, but now the system will not boot and is beeping multiple times. What will you check first?\n____\n____\n____","a":"Check that the modules are fully seated, compatible with the motherboard, installed in the correct slots, and then test one module at a time.","e":"Expected answer:\nCheck that the modules are fully seated, compatible with the motherboard, installed in the correct slots, and then test one module at a time.\n\nExtra file category 6 Memory, Q17.","src":"extra-reworded"},{"d":3,"t":"flash","q":"Give an example of how a technician might project confidence while working on a help desk.\n____\n____\n____","a":"Use a calm professional voice, explain the steps clearly, avoid guessing, and confirm what will happen next.","e":"Expected answer:\nUse a calm professional voice, explain the steps clearly, avoid guessing, and confirm what will happen next.\n\nExtra file category 6 Memory, Q18.","src":"extra-reworded"},{"d":3,"q":"A system already has two 3200 MHz memory modules installed, and a technician adds two more modules that operate at 4800 MHz. What will be the result of this action?","o":["All memory will operate at the 3200 MHz speed.","The memory will operate at the 4800 MHz speed.","The computer won’t boot.","The computer might freeze at times."],"c":0,"e":"Correct answer: A. All memory will operate at the 3200 MHz speed.\n\nSource note: Extra file category 6 Memory, Q19.","src":"extra-reworded"},{"d":3,"q":"A technician has received a complaint that a computer is not performing as well as it used to. Which Windows tool would the technician ask the user to open to quickly tell how much RAM is currently being used by the open applications?","o":["Task Manager","Device Manager","Performance Monitor","System Information tool"],"c":0,"e":"Correct answer: A. Task Manager\n\nSource note: Extra file category 6 Memory, Q20.","src":"extra-reworded"},{"d":3,"q":"Context note for following question(s):\nConsider the following internal hard drive specifications when answering Questions 1–7:\n- SATA 6 Gb/s transfer rate\n- 1 TB capacity\n- Minimizes noise to levels near the threshold of human hearing\n- 3.5-inch 7,200 RPM\n- 32 MB buffer size\nWhich SATA version is being used?","o":["1","Cannot be determined from the information given","2","3"],"c":3,"e":"Correct answer: D. 3\n\nSource note: Extra file category 7 Storage Devices, Q1.","src":"extra-reworded"},{"d":3,"q":"Which Windows file system should be placed on this drive if encryption will be used?","o":["exFAT","NTFS","FAT32","FAT"],"c":1,"e":"Correct answer: B. NTFS\n\nSource note: Extra file category 7 Storage Devices, Q2.","src":"extra-reworded"},{"d":3,"q":"Which drive preparation steps are required to be done if this drive is added as a new drive? (Choose all that apply.)","o":["RAID","high-level format","low-level format","partitioning","defragmentation","duplexing","virus checking","striping","error checking"],"c":[1,3],"e":"Correct answers: B, D. B. high-level format; D. partitioning\n\nSource note: Extra file category 7 Storage Devices, Q3.","src":"extra-reworded"},{"d":5,"t":"flash","q":"This drive is meant to be quiet. Name two noises that the drive could make that would indicate issues.\n____\n____\n____","a":"Clicking, grinding, screeching, or repeated spin-up/spin-down noises.","e":"Expected answer:\nClicking, grinding, screeching, or repeated spin-up/spin-down noises.\n\nExtra file category 7 Storage Devices, Q4.","src":"extra-reworded"},{"d":3,"q":"Is this drive internal or external? Explain your reasoning.\n____","o":["cannot be determined","internal","external"],"c":1,"e":"Correct answer: B. internal\n\nSource note: Extra file category 7 Storage Devices, Q5.","src":"extra-reworded"},{"d":3,"q":"What is this drive’s form factor?","o":["7,200 RPM","1 TB","6 Gb/s","32 MB","3.5-inch"],"c":4,"e":"Correct answer: E. 3.5-inch\n\nSource note: Extra file category 7 Storage Devices, Q6.","src":"extra-reworded"},{"d":3,"q":"How many other devices could be on the same cable that connects this device to the motherboard?","o":["1","2","0","cannot be determined","3"],"c":2,"e":"Correct answer: C. 0\n\nSource note: Extra file category 7 Storage Devices, Q7.","src":"extra-reworded"},{"d":3,"q":"If only two drives are available, which RAID levels can be used? (Choose all that apply.)","o":["10","5","0","1"],"c":[2,3],"e":"Correct answers: C, D. C. 0; D. 1\n\nSource note: Extra file category 7 Storage Devices, Q8.","src":"extra-reworded"},{"d":5,"q":"A technician has been called to help with a problem. A S.M.A.R.T. error appears, and the user reports that the system has been running slowly for several months. Which two tools or actions should the technician use immediately?","o":["diskpart","apply high-level formatting to the drive","chkdsk","convert","attach external drives and configure Storage Spaces","back up the data","partition the drive"],"c":[2,5],"e":"Correct answers: C, F. C. chkdsk; F. back up the data\n\nSource note: Extra file category 7 Storage Devices, Q9.","src":"extra-reworded"},{"d":3,"q":"What is the difference between spanning and striping?","o":["Spanning fills one drive before moving to the next drive, whereas striping alternates between the drives.","Spanning is done within RAID, and striping is done in Windows or through BIOS/UEFI.","Spanning is done in hardware, and striping is done in software.","Spanning is RAID 0, and striping is RAID 1.","Spanning takes two drives, and striping takes three drives."],"c":0,"e":"Correct answer: A. Spanning fills one drive before moving to the next drive, whereas striping alternates between the drives.\n\nSource note: Extra file category 7 Storage Devices, Q10.","src":"extra-reworded"},{"d":3,"q":"A tile and carpet warehouse uses several computers for the inventory process. The computers in the warehouse area have a higher hard drive failure rate than those in the office area. Which solution will help this company?","o":["Install additional CPU fans.","Install more powerful power supplies.","Replace the hard drives with SSDs.","Replace the drives with higher-RPM drives.","Place antistatic mats under the computers and on the floor where people stand or sit to use the computer."],"c":2,"e":"Correct answer: C. Replace the hard drives with SSDs.\n\nSource note: Extra file category 7 Storage Devices, Q11.","src":"extra-reworded"},{"d":3,"q":"Context note for following question(s):\nConsider the following internal hard drive specifications when answering Questions 1–7:\n- SATA 6 Gb/s transfer rate\n- 1 TB capacity\n- Minimizes noise to levels near the threshold of human hearing\n- 3.5-inch 7,200 RPM\n- 32 MB buffer size\nA user wants to add an SSD to a computer. Consider the following SSD specifications for the drive being purchased and the user’s motherboard documentation when answering Questions 12–16.\nSpecifications:\n- 1 TB capacity\n- PCIe 3.0 x4 interface\n- M.2 2280\nMotherboard documentation:\n- 1 x M.2_1 socket 3 with M key, type 2242/2260/2280/22110 storage devices support (SATA and PCIe 3.0 x4 mode)\n- 1 x M.2_2 socket 3 with M key type 2242/2260/2280/22110 storage devices support SATA and PCIe 4.0 x4 mode)\nIs this drive internal or external? How can you tell?","o":["external","internal"],"c":1,"e":"Correct answer: B. internal\n\nSource note: Extra file category 7 Storage Devices, Q12.","src":"extra-reworded"},{"d":3,"q":"Will the SSD be able to be installed in the computer based on the specifications given?","o":["No","Yes","Cannot be determined from the information provided"],"c":1,"e":"Correct answer: B. Yes\n\nSource note: Extra file category 7 Storage Devices, Q13.","src":"extra-reworded"},{"d":3,"t":"flash","q":"Considering the motherboard documentation, what do the numbers 2242/2260/2280/22110 mean?\n____","a":"They are M.2 physical sizes: 22 mm wide with lengths of 42, 60, 80, or 110 mm.","e":"Expected answer:\nThey are M.2 physical sizes: 22 mm wide with lengths of 42, 60, 80, or 110 mm.\n\nExtra file category 7 Storage Devices, Q14.","src":"extra-reworded"},{"d":3,"q":"What is a drawback of SSDs?","o":["MTBF","speed","installation time","maintenance requirements","reliability","cost"],"c":5,"e":"Correct answer: F. cost\n\nSource note: Extra file category 7 Storage Devices, Q15.","src":"extra-reworded"},{"d":3,"q":"Would the SSD work in the M.2_2 socket?","o":["Cannot be determined from the information given","Yes","No"],"c":1,"e":"Correct answer: B. Yes\n\nSource note: Extra file category 7 Storage Devices, Q16.","src":"extra-reworded"},{"d":3,"q":"Which tool do most Windows users use to check for lost clusters?","o":["Disk Defragmenter","Error Checking (Check/Check Now)","Disk Cleanup","diskpart"],"c":1,"e":"Correct answer: B. Error Checking (Check/Check Now)\n\nSource note: Extra file category 7 Storage Devices, Q17.","src":"extra-reworded"},{"d":5,"t":"flash","q":"How would a technician use the drive LED to troubleshoot a hard drive?\n____\n____","a":"Check whether the drive activity LED lights or stays off during boot/file access; no activity or constant activity can indicate a drive, cable, or controller problem.","e":"Expected answer:\nCheck whether the drive activity LED lights or stays off during boot/file access; no activity or constant activity can indicate a drive, cable, or controller problem.\n\nExtra file category 7 Storage Devices, Q18.","src":"extra-reworded"},{"d":5,"q":"If you have enough RAM installed, the hard drive will not be used as cache memory.","o":["True","False"],"c":1,"e":"Correct answer: B. False\n\nSource note: Extra file category 7 Storage Devices, Q19.","src":"extra-reworded"},{"d":3,"q":"You are speaking on the phone to a customer who is upset. The customer curses and starts yelling. What should you do?","o":["Speak to the customer using a calm, professional tone.","Ask the caller if you can put them on hold while they calm down.","Stay calm but raise your voice level a little to show the importance and professionalism of your technical response.","Hang up on the caller."],"c":0,"e":"Correct answer: A. Speak to the customer using a calm, professional tone.\n\nSource note: Extra file category 7 Storage Devices, Q20.","src":"extra-reworded"},{"d":3,"q":"Context note for following question(s):\nConsider the following optical drive specifications as you answer Questions 1–7:\n- SATA interface half-height internal BD-ROM\n- Maximum 4x BD-ROM/BD-RE SL and 4x BD-ROM/BD-R/BD-RE DL CAV reading\n- Maximum 8x DVD-ROM/+R/+RW/+RDL/-R/-RW/-RW DL CAV reading\n- Maximum 32x CD-ROM/R/RW CAV reading\n- Random access times: BD, 250 ms; DVD, 160 ms; CD, 150 ms\n- Buffer size 2 MB\n- System requirements for HD Blu-ray playback: 3.0 GHz, 1 GB+ of RAM, Windows 7 or higher, HDCP capable display, or TV for digital output.\nWhich SATA version is being used?","o":["1","Cannot be determined from the information given","3","2"],"c":1,"e":"Correct answer: B. Cannot be determined from the information given\n\nSource note: Extra file category 8 Video and Multimedia Devices, Q1.","src":"extra-reworded"},{"d":3,"t":"flash","q":"Can Blu-ray discs be created on this unit? How can you tell?\n____","a":"No. BD-ROM means Blu-ray read-only, and the specifications list reading speeds, not Blu-ray writing speeds.","e":"Expected answer:\nNo. BD-ROM means Blu-ray read-only, and the specifications list reading speeds, not Blu-ray writing speeds.\n\nExtra file category 8 Video and Multimedia Devices, Q2.","src":"extra-reworded"},{"d":3,"q":"Pretend you are adding this device to a computer. What is the maximum number of devices (if any) that can be on the same cable that connects this drive to the motherboard?","o":["2","1","Cannot be determined from the information given","None"],"c":3,"e":"Correct answer: D. None\n\nSource note: Extra file category 8 Video and Multimedia Devices, Q3.","src":"extra-reworded"},{"d":3,"t":"flash","q":"What would the computer have to have in order to install this device?\n____","a":"A SATA data port/cable, SATA power, an available drive bay, and hardware/display support for Blu-ray playback.","e":"Expected answer:\nA SATA data port/cable, SATA power, an available drive bay, and hardware/display support for Blu-ray playback.\n\nExtra file category 8 Video and Multimedia Devices, Q4.","src":"extra-reworded"},{"d":3,"t":"flash","q":"If the non-used SATA motherboard ports are disabled by default how would a technician enable them before installing this device?\n____","a":"Enable the SATA port/controller in BIOS/UEFI setup.","e":"Expected answer:\nEnable the SATA port/controller in BIOS/UEFI setup.\n\nExtra file category 8 Video and Multimedia Devices, Q5.","src":"extra-reworded"},{"d":3,"t":"flash","q":"Can a DVD±RW disc be read in this drive? How can you tell?\n____","a":"Yes. The specifications list DVD +RW and DVD -RW reading support.","e":"Expected answer:\nYes. The specifications list DVD +RW and DVD -RW reading support.\n\nExtra file category 8 Video and Multimedia Devices, Q6.","src":"extra-reworded"},{"d":3,"t":"flash","q":"What does BD-RE DL mean?\n____\n____","a":"Blu-ray Disc Rewritable Dual Layer.","e":"Expected answer:\nBlu-ray Disc Rewritable Dual Layer.\n\nExtra file category 8 Video and Multimedia Devices, Q7.","src":"extra-reworded"},{"d":5,"q":"A technician for a computer store is examining a computer that a client has just built and brought into the store. The AMD-based system will not output video even though the system has an HDMI port and a new HDMI cable attaches to a new display that works on another system and is powered. What is a likely problem?","o":["The monitor is bad.","The system RAM needs to be inserted properly.","The system needs a video adapter.","The cable is bad."],"c":2,"e":"Correct answer: C. The system needs a video adapter.\n\nSource note: Extra file category 8 Video and Multimedia Devices, Q8.","src":"extra-reworded"},{"d":3,"q":"Select the non-sound port.","o":["S/PDIF","RJ45","1/8-inch TRS","TOSLINK","RCA"],"c":1,"e":"Correct answer: B. RJ45\n\nSource note: Extra file category 8 Video and Multimedia Devices, Q9.","src":"extra-reworded"},{"d":3,"q":"Which optical media has the highest capacity?","o":["BD","DVD","CD"],"c":0,"e":"Correct answer: A. BD\n\nSource note: Extra file category 8 Video and Multimedia Devices, Q10.","src":"extra-reworded"},{"d":3,"q":"Which drive would have two lasers?","o":["A drive that can handle a 25 GB dual-layer disc","A drive that can handle a double-sided single-layer disc","A drive that can handle either a DVD or a Blu-ray disc","A drive that can handle an 8.5 GB single-sided dual-layer disc"],"c":2,"e":"Correct answer: C. A drive that can handle either a DVD or a Blu-ray disc\n\nSource note: Extra file category 8 Video and Multimedia Devices, Q11.","src":"extra-reworded"},{"d":3,"q":"A PCIe sound card is being installed. Which two steps are most likely going to be done by the technician? (Choose two.)","o":["Configure jumpers on the adapter.","Delete the integrated port drivers.","Install a driver.","Flash the BIOS/UEFI.","Disable the integrated ports in BIOS/UEFI.","Upgrade the power supply."],"c":[2,4],"e":"Correct answers: C, E. C. Install a driver.; E. Disable the integrated ports in BIOS/UEFI.\n\nSource note: Extra file category 8 Video and Multimedia Devices, Q12.","src":"extra-reworded"},{"d":5,"q":"Which utility is best used to troubleshoot sound issues?","o":["BIOS/UEFI diagnostics","Disk Management","Device Manager","DirectX"],"c":2,"e":"Correct answer: C. Device Manager\n\nSource note: Extra file category 8 Video and Multimedia Devices, Q13.","src":"extra-reworded"},{"d":5,"q":"A projector is not outputting sound. What are three likely issues? (Choose three.)","o":["projector volume setting","projector battery low","computer volume setting","projector fan","burnt-out bulb","faulty projector filter","mute button"],"c":[6,0,2],"e":"Correct answers: A, C, G. A. projector volume setting; C. computer volume setting; G. mute button\n\nSource note: Extra file category 8 Video and Multimedia Devices, Q14.","src":"extra-reworded"},{"d":5,"q":"A user has attempted a scanner installation to the computer’s front USB ports because all the back ports were taken. However, the scanner will not function. What should the technician try next?","o":["Add a version 2.0 or higher USB hub to a back USB port.","Reattach the USB cable that leads from the front panel to the motherboard.","Replace the scanner.","Replace the USB port."],"c":0,"e":"Correct answer: A. Add a version 2.0 or higher USB hub to a back USB port.\n\nSource note: Extra file category 8 Video and Multimedia Devices, Q15.","src":"extra-reworded"},{"d":3,"q":"A technician can clean a scanner using paper towels.","o":["True","False"],"c":1,"e":"Correct answer: B. False\n\nSource note: Extra file category 8 Video and Multimedia Devices, Q16.","src":"extra-reworded"},{"d":3,"q":"Part of the installation process for a tablet is to calibrate the camera.","o":["True","False"],"c":1,"e":"Correct answer: B. False\n\nSource note: Extra file category 8 Video and Multimedia Devices, Q17.","src":"extra-reworded"},{"d":5,"q":"A user has heard about dead pixels and has brought in a recently purchased display, suspecting that the display has this issue. What should the technician do?","o":["Test the display and explain that dead pixels are common and as long as there are not too many of them, they will not interfere with the output.","Replace the display.","Tell the user to update the video drive and the BIOS/UEFI version.","Connect the display to a computer and use the burn-in process to check the display for this problem."],"c":0,"e":"Correct answer: A. Test the display and explain that dead pixels are common and as long as there are not too many of them, they will not interfere with the output.\n\nSource note: Extra file category 8 Video and Multimedia Devices, Q18.","src":"extra-reworded"},{"d":5,"q":"An administrative assistant who commonly uses a specific meeting room complains that the projector is shutting down after five minutes each time it is used. What is a likely issue?","o":["filter","bulb","power supply","input source"],"c":0,"e":"Correct answer: A. filter\n\nSource note: Extra file category 8 Video and Multimedia Devices, Q19.","src":"extra-reworded"},{"d":3,"q":"Which scenario is one that best demonstrates a positive attitude?","o":["A technician eagerly helps reorganize a wiring closet for the company.","A technician returns a borrowed disc to a team member after having the disc more than six months.","A technician leaves documentation for a newly installed optical drive with the customer, even though the customer treated the technician poorly during the installation.","A technician smiles when an angry customer is taking out her computer problems on the technician."],"c":0,"e":"Correct answer: A. A technician eagerly helps reorganize a wiring closet for the company.\n\nSource note: Extra file category 8 Video and Multimedia Devices, Q20.","src":"extra-reworded"},{"d":3,"q":"Which method does a technician normally use to print a test page to prove that connectivity exists between a computer and a printer and to prove that the driver is working properly?","o":["Use Notepad and print.","Use at least two applications and print.","Use the Print Test Page button from the General tab of the Printer properties window.","Use a self-test button on the printer."],"c":2,"e":"Correct answer: C. Use the Print Test Page button from the General tab of the Printer properties window.\n\nSource note: Extra file category 9 Printers/Multifunction Devices, Q1.","src":"extra-reworded"},{"d":3,"q":"Which type of printer would a glass blower who sells art at trade shows most likely use to print receipts?","o":["inkjet","impact","laser","thermal"],"c":3,"e":"Correct answer: D. thermal\n\nSource note: Extra file category 9 Printers/Multifunction Devices, Q2.","src":"extra-reworded"},{"d":3,"q":"Which tool is used to restart the print spooler in Windows?","o":["DirectX","Device Manager","Services","System Information"],"c":2,"e":"Correct answer: C. Services\n\nSource note: Extra file category 9 Printers/Multifunction Devices, Q3.","src":"extra-reworded"},{"d":5,"q":"A Samsung laser printer is showing an error message on the screen that says that the paper is out, but the user shows you that there is plenty of paper in the bin. What should you do?","o":["Check the paper sensor for debris or dust.","Use the reset sensor to reset the printer paper counter.","Use the Print Test Page button in Windows to verify connectivity.","Turn the printer off and back on again."],"c":0,"e":"Correct answer: A. Check the paper sensor for debris or dust.\n\nSource note: Extra file category 9 Printers/Multifunction Devices, Q4.","src":"extra-reworded"},{"d":3,"q":"Which type of printer contains a fuser assembly?","o":["inkjet","laser","thermal","impact"],"c":1,"e":"Correct answer: B. laser\n\nSource note: Extra file category 9 Printers/Multifunction Devices, Q5.","src":"extra-reworded"},{"d":5,"q":"You are working on a printer that is missing an option in the printer menus that the manufacturer lists online. What upgrade is most likely needed?","o":["electronic control board","memory","firmware","storage space"],"c":2,"e":"Correct answer: C. firmware\n\nSource note: Extra file category 9 Printers/Multifunction Devices, Q6.","src":"extra-reworded"},{"d":3,"q":"For what do you use a printer-duplexing assembly?","o":["multiple paper trays","rasterization","two-sided printing","wired and wireless network connectivity"],"c":2,"e":"Correct answer: C. two-sided printing\n\nSource note: Extra file category 9 Printers/Multifunction Devices, Q7.","src":"extra-reworded"},{"d":5,"q":"Which component causes ghost images on laser printer output?","o":["paper sensor","fusing assembly","drum","pickup rollers","LED array/laser"],"c":2,"e":"Correct answer: C. drum\n\nSource note: Extra file category 9 Printers/Multifunction Devices, Q8.","src":"extra-reworded"},{"d":5,"q":"An inkjet printer printhead appears to be stuck, and the printer is making a grinding noise. Which part should the technician check first?","o":["printer mainboard","carriage and carriage belt","paper feeder","print cartridge"],"c":1,"e":"Correct answer: B. carriage and carriage belt\n\nSource note: Extra file category 9 Printers/Multifunction Devices, Q9.","src":"extra-reworded"},{"d":5,"q":"One of the technicians in your shop frequently swaps parts that do not fix the problem. The parts taken out of customer machines are taken to build private customer computers. This is an example of poor ____.","o":["troubleshooting skills","communication skills","relations","work ethics"],"c":3,"e":"Correct answer: D. work ethics\n\nSource note: Extra file category 9 Printers/Multifunction Devices, Q10.","src":"extra-reworded"},{"d":3,"q":"Which type of printer maintenance commonly requires resetting a maintenance counter?","o":["impact","laser","thermal","inkjet"],"c":1,"e":"Correct answer: B. laser\n\nSource note: Extra file category 9 Printers/Multifunction Devices, Q11.","src":"extra-reworded"},{"d":3,"q":"Which printer option allows multiple copies of a document to be printed in page 1, 2, 3 order instead of printing all the page 1s, then all the page 2s, and then all the page 3s?","o":["duplexing","fusing","conditioning","collating"],"c":3,"e":"Correct answer: D. collating\n\nSource note: Extra file category 9 Printers/Multifunction Devices, Q12.","src":"extra-reworded"},{"d":5,"q":"A networked printer is visible through the network, but no one can print to it. What is the first thing the technician should check?","o":["printer IP address","errors or indicators on the printer","cabling","print spooler setting"],"c":1,"e":"Correct answer: B. errors or indicators on the printer\n\nSource note: Extra file category 9 Printers/Multifunction Devices, Q13.","src":"extra-reworded"},{"d":5,"q":"A laser printer outputs streaks on the paper. What is the issue?","o":["laser","roller","ink cartridge","drum"],"c":3,"e":"Correct answer: D. drum\n\nSource note: Extra file category 9 Printers/Multifunction Devices, Q14.","src":"extra-reworded"},{"d":5,"t":"flash","q":"An inkjet printer’s output appears to have missing elements. What is the first thing a technician should try if the ink cartridge appears to be full?\n____","a":"Run the inkjet printer’s printhead/nozzle cleaning utility.","e":"Expected answer:\nRun the inkjet printer’s printhead/nozzle cleaning utility.\n\nExtra file category 9 Printers/Multifunction Devices, Q15.","src":"extra-reworded"},{"d":3,"q":"Which security options are relevant to printer control? (Choose all that apply.)","o":["antivirus","universal security slot","badging","bollards","user authentication"],"c":[4,2,1],"e":"Correct answers: B, C, E. B. universal security slot; C. badging; E. user authentication\n\nSource note: Extra file category 9 Printers/Multifunction Devices, Q16.","src":"extra-reworded"},{"d":3,"q":"What does the roller in an inkjet printer?","o":["It moves the carriage from one side to the other.","It controls the amount of ink allowed onto the paper.","It limits the amount of paper fed through the printer to one page.","It moves the paper through the paper path."],"c":3,"e":"Correct answer: D. It moves the paper through the paper path.\n\nSource note: Extra file category 9 Printers/Multifunction Devices, Q17.","src":"extra-reworded"},{"d":5,"q":"What happens if a heating element fails on a thermal printer?","o":["incorrect colors being printed","missing printed output","paper not feeding through","garbled output"],"c":1,"e":"Correct answer: B. missing printed output\n\nSource note: Extra file category 9 Printers/Multifunction Devices, Q18.","src":"extra-reworded"},{"d":3,"q":"How is laser printer calibration commonly performed?","o":["with calipers","through the Printer/Printer properties menu","with a multimeter","with a special tool that is part of the maintenance kit"],"c":1,"e":"Correct answer: B. through the Printer/Printer properties menu\n\nSource note: Extra file category 9 Printers/Multifunction Devices, Q19.","src":"extra-reworded"},{"d":3,"q":"The printed output prints about three-quarters down the page and then starts printing the rest on the next page. A technician has been contacted to help. On which option does the technician need to instruct the user?","o":["paper size","collating","finishing","orientation","duplexing"],"c":0,"e":"Correct answer: A. paper size\n\nSource note: Extra file category 9 Printers/Multifunction Devices, Q20.","src":"extra-reworded"},{"d":1,"t":"flash","q":"How can you control sending display output to an external monitor on a laptop?\n____","a":"Use the laptop’s display function key or Windows display settings/Windows+P to switch or duplicate/extend output.","e":"Expected answer:\nUse the laptop’s display function key or Windows display settings/Windows+P to switch or duplicate/extend output.\n\nExtra file category 10 Mobile Devices, Q1.","src":"extra-reworded"},{"d":1,"q":"Which type of mobile device would most likely have a digitizer?","o":["gaming laptop","work laptop","credit card reader","device that has a touch screen"],"c":3,"e":"Correct answer: D. device that has a touch screen\n\nSource note: Extra file category 10 Mobile Devices, Q2.","src":"extra-reworded"},{"d":1,"q":"Which operating system is used with an Apple iPad?","o":["Android","Chrome","iOS","iPadOS"],"c":3,"e":"Correct answer: D. iPadOS\n\nSource note: Extra file category 10 Mobile Devices, Q4.","src":"extra-reworded"},{"d":1,"t":"flash","q":"Name three recommendations for saving power on a laptop.\n____\n____\n____\nConsider the following memory advertisements for laptop memory used in Question 6.\nChoices:\nA. 16 GB (2x8GB) 204-pin DDR3 SODIMM DDR3L 1600 (PC3L 12800) 1.35 V unbuffered\nB. 4 GB (2x2GB) 1,333 MHz DDR3 unbuffered DIMM\nC. 8 GB 260-pin DDR4 SODIMM 2400 (PC4 19200)\nD. 8 GB DDR3 204-pin SODIMM PC3-12800 memory","a":"Dim the display, use battery saver/power plan settings, disable unused wireless/Bluetooth, close unnecessary apps, and use sleep/hibernate.","e":"Expected answer:\nDim the display, use battery saver/power plan settings, disable unused wireless/Bluetooth, close unnecessary apps, and use sleep/hibernate.\n\nExtra file category 10 Mobile Devices, Q5.","src":"extra-reworded"},{"d":1,"t":"flash","q":"In these advertisements, which memory module(s) would work as an upgrade for a laptop, given the following specifications:\nMaximum of 16 GB. Configured with 4 GB DDR4 1 main memory slot (which is occupied).\n____","a":"C","e":"Expected answer:\nC\n\nExtra file category 10 Mobile Devices, Q6.","src":"extra-reworded"},{"d":1,"q":"Which solution would help a company manage the corporate apps deployed on employees’ personal mobile devices?","o":["ActiveSync","PRL","iCloud","MAM"],"c":3,"e":"Correct answer: D. MAM\n\nSource note: Extra file category 10 Mobile Devices, Q7.","src":"extra-reworded"},{"d":1,"q":"Which options are used to back up an iOS device? (Choose two.)","o":["Tips","Backup","iBackup","iTunes","iBooks","iCloud"],"c":[3,5],"e":"Correct answers: D, F. D. iTunes; F. iCloud\n\nSource note: Extra file category 10 Mobile Devices, Q8.","src":"extra-reworded"},{"d":1,"q":"Which type of laptop hard drive would provide the best performance?","o":["stock","mechanical","SSD","hybrid"],"c":2,"e":"Correct answer: C. SSD\n\nSource note: Extra file category 10 Mobile Devices, Q9.","src":"extra-reworded"},{"d":1,"q":"A technician is sometimes judged and assumed to be competent or not competent based on what he or she is wearing.","o":["True","False"],"c":0,"e":"Correct answer: A. True\n\nSource note: Extra file category 10 Mobile Devices, Q11.","src":"extra-reworded"},{"d":1,"q":"A laptop display is not showing anything, but the technician can hear the hard drive working. The technician connects an external monitor, and the monitor works. What should the technician try next?","o":["Try connecting another external monitor.","Replace the laptop display.","Use the appropriate key to retest the output to the display.","Replace the laptop display connector."],"c":2,"e":"Correct answer: C. Use the appropriate key to retest the output to the display.\n\nSource note: Extra file category 10 Mobile Devices, Q13.","src":"extra-reworded"},{"d":1,"q":"What does a laptop inverter?","o":["to allow the display to be flipped backward","to allow specific keys to be used as a numeric keypad, when enabled","to attach the keypad to the keyboard","to convert DC to AC for the CCFL backlight"],"c":3,"e":"Correct answer: D. to convert DC to AC for the CCFL backlight\n\nSource note: Extra file category 10 Mobile Devices, Q14.","src":"extra-reworded"},{"d":1,"t":"flash","q":"Name three recommendations for laptop security.\n____\n____\n____","a":"Use a strong password/biometrics, enable encryption, use a cable lock or secure storage, enable tracking/remote wipe, and avoid leaving it unattended.","e":"Expected answer:\nUse a strong password/biometrics, enable encryption, use a cable lock or secure storage, enable tracking/remote wipe, and avoid leaving it unattended.\n\nExtra file category 10 Mobile Devices, Q15.","src":"extra-reworded"},{"d":1,"q":"A hybrid drive is:","o":["an upgraded flash drive.","a combination of an SSD part and a mechanical drive in the same case.","a mechanical hard drive.","an SSD."],"c":1,"e":"Correct answer: B. a combination of an SSD part and a mechanical drive in the same case.\n\nSource note: Extra file category 10 Mobile Devices, Q16.","src":"extra-reworded"},{"d":1,"q":"Which option should be tried first if a mobile device is frozen?","o":["soft reset","hard reset","recovery","factory reset"],"c":0,"e":"Correct answer: A. soft reset\n\nSource note: Extra file category 10 Mobile Devices, Q17.","src":"extra-reworded"},{"d":1,"t":"flash","q":"A user complains that he has slow data speeds on his mobile device. Name three things you will check.\n____\n____\n____\n____\n____\n____\n____\n____\n____\n____","a":"Check signal strength/coverage, Wi-Fi vs cellular connection, data limit/throttling, Airplane Mode, APN/carrier settings, SIM status, background apps, and malware/updates.","e":"Expected answer:\nCheck signal strength/coverage, Wi-Fi vs cellular connection, data limit/throttling, Airplane Mode, APN/carrier settings, SIM status, background apps, and malware/updates.\n\nExtra file category 10 Mobile Devices, Q18.","src":"extra-reworded"},{"d":1,"q":"A mobile device continuously attaches to a nearby Bluetooth-enabled computer that is not the computer the user wants to attach to. What should be done?","o":["Power off the nearby computer.","Put the mobile device in Airplane Mode.","Disconnect the Bluetooth adapter from the nearby computer.","Move the Bluetooth device closer to the desired computer."],"c":3,"e":"Correct answer: D. Move the Bluetooth device closer to the desired computer.\n\nSource note: Extra file category 10 Mobile Devices, Q19.","src":"extra-reworded"},{"d":1,"q":"A technician suspects that a mobile device has a security issue due to a rogue APK source because the user admits to just having updated the OS. Which type of mobile device is the technician working on?","o":["iPad","Android device","Apple laptop","Windows laptop"],"c":1,"e":"Correct answer: B. Android device\n\nSource note: Extra file category 10 Mobile Devices, Q20.","src":"extra-reworded"},{"d":5,"q":"____ executes POST.","o":["NAS","RAM","CMOS","BIOS/UEFI"],"c":3,"e":"Correct answer: D. BIOS/UEFI\n\nSource note: Extra file category 11 Computer Design and Troubleshooting Review, Q1.","src":"extra-reworded"},{"d":5,"q":"Which option is most likely to require dual monitors as part of the configuration?","o":["NAS","home server","virtual computer","audio/video editing workstation"],"c":3,"e":"Correct answer: D. audio/video editing workstation\n\nSource note: Extra file category 11 Computer Design and Troubleshooting Review, Q2.","src":"extra-reworded"},{"d":5,"q":"A person comes into a computer store wanting a custom-built computer. The customer will be using the computer to stream and save videos; to video chat with remote family; and for standard computer tasks such as using a word processing program, using spreadsheets, and browsing the internet. In addition, a child will use the computer to play games. Which computer component will the technician focus on to satisfy this customer?","o":["multicore processor","10G NIC","500 GB hard drive","RAID array"],"c":0,"e":"Correct answer: A. multicore processor\n\nSource note: Extra file category 11 Computer Design and Troubleshooting Review, Q3.","src":"extra-reworded"},{"d":5,"q":"Before making any changes to a computer that has a problem, what is the first thing you should do?","o":["Use a loopback plug to run diagnostics.","Inform your supervisor of the steps you are taking.","Back up any data that is stored locally on the computer that is not backed up elsewhere.","Inform the user of any possibilities that might be causing the problem."],"c":2,"e":"Correct answer: C. Back up any data that is stored locally on the computer that is not backed up elsewhere.\n\nSource note: Extra file category 11 Computer Design and Troubleshooting Review, Q4.","src":"extra-reworded"},{"d":5,"q":"Which option would most likely be a design consideration for a gaming PC rather than for a computer used for virtualization?","o":["additional system cooling","high amount of RAM","multiple fast, large-capacity hard drives","NAS"],"c":0,"e":"Correct answer: A. additional system cooling\n\nSource note: Extra file category 11 Computer Design and Troubleshooting Review, Q5.","src":"extra-reworded"},{"d":5,"q":"If a computer beeps once during POST, what does this commonly mean to a technician?","o":["A video initialization error has occurred.","A CPU register test is occurring.","There is not a problem.","A DRAM refresh is occurring."],"c":2,"e":"Correct answer: C. There is not a problem.\n\nSource note: Extra file category 11 Computer Design and Troubleshooting Review, Q6.","src":"extra-reworded"},{"d":5,"q":"An adapter or a USB device that performs diagnostics and displays a code or illuminates LEDs is known as a ____.","o":["probe","torx","POST card","DIGI card"],"c":2,"e":"Correct answer: C. POST card\n\nSource note: Extra file category 11 Computer Design and Troubleshooting Review, Q7.","src":"extra-reworded"},{"d":5,"t":"flash","q":"8–10. Group the following computer components into three design subsystems. In other words, group the components that need to be considered together when designing a subsystem of a computer. Each group must include at least two components. All components are used.\npower supply\nCPU\nchipset\nvideo card\ncase\nCPU cooling\nmotherboard\ndisplay\nRAM\nGroup 1 components: ____\nGroup 2 components: ____\nGroup 3 components: ____\n____\n____\n____\n____","a":"Group 1: CPU, chipset, motherboard, RAM. Group 2: video card, display. Group 3: power supply, case, CPU cooling.","e":"Expected answer:\nGroup 1: CPU, chipset, motherboard, RAM. Group 2: video card, display. Group 3: power supply, case, CPU cooling.\n\nExtra file category 11 Computer Design and Troubleshooting Review, Q8-10.","src":"extra-reworded"},{"d":5,"q":"A motherboard advertisement lists UEFI as one of the motherboard features. What is UEFI?","o":["a BIOS replacement","a port","an internal interface","a type of storage device"],"c":0,"e":"Correct answer: A. a BIOS replacement\n\nSource note: Extra file category 11 Computer Design and Troubleshooting Review, Q11.","src":"extra-reworded"},{"d":5,"q":"Which design environments would have the largest display needs? (Choose three.)","o":["CAD","virtualization","home server","audio/video editing","gaming","thick client"],"c":[0,4,3],"e":"Correct answers: A, D, E. A. CAD; D. audio/video editing; E. gaming\n\nSource note: Extra file category 11 Computer Design and Troubleshooting Review, Q12.","src":"extra-reworded"},{"d":5,"q":"Which type of computer design would be implemented if a workstation ran both Linux and Windows as operating systems?","o":["home theater","virtualization","thin client","CAD","thick client"],"c":1,"e":"Correct answer: B. virtualization","src":"extra-reworded"},{"d":5,"q":"When designing a tower computer, with which computer component would you consider physical space more than any other part?","o":["power supply","hard drive","C  B","HTTP = D\nrouter = D\nswitch = D\nICMP = B\nstraight-through cable = A\nUDP = C\nIP = A\nMAC address = B\nNIC = D\nDNS = C\nTCP = C\nwireless antenna = D"],"c":0,"e":"Correct mapping:\nHTTP = A\nrouter = C\nswitch = D\nICMP = C\nstraight-through cable = D\nUDP = B\nIP = C\nMAC address = D\nNIC = D\nDNS = A\nTCP = B\nwireless antenna = D\n\nSource note: Extra file category 13 Networking, Q4.","src":"extra-reworded"},{"d":2,"q":"Some computers (both wired and wireless) in a specific area of the building are having problems connecting to printers, servers, and the internet. What should the technician do?","o":["Check the access point.","Check problem computers for a DNS server address.","Check the router that connects to the internet.","Use a tone generator."],"c":0,"e":"Correct answer: A. Check the access point.\n\nSource note: Extra file category 13 Networking, Q5.","src":"extra-reworded"},{"d":2,"q":"Some wireless computers in a specific area of the building are having problems connecting to printers, servers, and the internet. What should the technician check first?","o":["Network and transport","UTP and STP","Data plane and control plane","2.4 GHz and 5 GHz"],"c":2,"e":"Correct answer: C. Data plane and control plane","src":"extra-reworded"},{"d":2,"q":"Which network device works at Layer 1 and sends received data out all its ports (except the port that received the data)?","o":["hub","router","antenna","switch"],"c":0,"e":"Correct answer: A. hub\n\nSource note: Extra file category 13 Networking, Q7.","src":"extra-reworded"},{"d":2,"q":"What is the most common network protocol suite and the protocol suite required to communicate on the internet?","o":["LTE","Bluetooth","ISO","TCP/IP"],"c":3,"e":"Correct answer: D. TCP/IP\n\nSource note: Extra file category 13 Networking, Q8.","src":"extra-reworded"},{"d":2,"q":"Which type of address is 48 bits long and is hard-coded into a NIC?","o":["TCP","NAT","IP","MAC"],"c":3,"e":"Correct answer: D. MAC\n\nSource note: Ex
