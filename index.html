   <tr><td class="mono">sudo (admin)</td><td>run commands elevated; Windows uses "Run as administrator"</td></tr>
  </table>`},
 {t:"OS install, upgrade & partitioning", h:`
  <p><b>Boot/install methods:</b> USB, optical, network (PXE), and disk imaging for mass deployment. <b>Install types:</b> clean install, in-place upgrade, repair install, image deployment, and recovery partition.</p>
  <p><b>Partition styles:</b> <span class="kw">GPT</span> (modern, &gt;2&nbsp;TB, many partitions, pairs with UEFI) vs. <span class="kw">MBR</span> (legacy, 2&nbsp;TB limit, 4 primary partitions). During setup you'll choose a partition and a file system to <b>format</b> (NTFS for Windows). A <span class="kw">quick format</span> just rewrites the table; a <span class="kw">full format</span> also checks the disk.</p>`},
 {t:"macOS & Linux basics", h:`
  <p><b>macOS:</b> <span class="kw">Finder</span> (file manager), the <span class="kw">Dock</span>, <span class="kw">Mission Control</span> (window/desktop overview), <span class="kw">Spotlight</span> (search), <span class="kw">Disk Utility</span>, <span class="kw">Time Machine</span> (backups), <span class="kw">Keychain</span> (passwords), <span class="kw">FileVault</span> (full-disk encryption — the macOS equivalent of BitLocker), <span class="kw">iCloud</span> sync, gestures on the trackpad, and <span class="kw">Terminal</span>. Force Quit handles a frozen app.</p>
  <p><b>Linux commands</b> — a core set:</p>
  <table class="ports">
   <tr><td class="mono">ls / pwd / cd</td><td>list / show / change directory</td></tr>
   <tr><td class="mono">cp / mv / rm</td><td>copy / move / remove</td></tr>
   <tr><td class="mono">chmod / chown</td><td>change permissions / ownership</td></tr>
   <tr><td class="mono">ps / top / kill</td><td>processes and ending them</td></tr>
   <tr><td class="mono">grep / cat</td><td>search text / show a file</td></tr>
   <tr><td class="mono">apt / yum / dnf</td><td>package managers (install software)</td></tr>
   <tr><td class="mono">sudo</td><td>run a command as root</td></tr>
  </table>`},
],
2:[
 {t:"Malware types & removal", h:`
  <p>Know each by behavior:</p>
  <table class="ports">
   <tr><td class="mono">Virus</td><td>attaches to a file, runs when opened</td></tr>
   <tr><td class="mono">Worm</td><td>self-replicates across a network, no host file needed</td></tr>
   <tr><td class="mono">Trojan</td><td>disguised as legit software</td></tr>
   <tr><td class="mono">Ransomware</td><td>encrypts data and demands payment</td></tr>
   <tr><td class="mono">Rootkit</td><td>hides deep in the OS, hard to detect</td></tr>
   <tr><td class="mono">Keylogger</td><td>records keystrokes</td></tr>
   <tr><td class="mono">Spyware</td><td>secretly collects info</td></tr>
   <tr><td class="mono">Cryptominer</td><td>hijacks CPU/GPU to mine coins</td></tr>
  </table>
  <p><b>The 7-step malware-removal process, in order</b> (memorize it — it's a classic exam question):</p>
  <ol>
   <li>Investigate and verify symptoms.</li>
   <li>Quarantine the infected system.</li>
   <li>Disable System Restore (in Windows).</li>
   <li>Remediate: update anti-malware, then scan and remove (safe mode / pre-installation environment).</li>
   <li>Schedule scans and run updates.</li>
   <li>Enable System Restore and create a fresh restore point.</li>
   <li>Educate the end user.</li>
  </ol>`},
 {t:"Social engineering, threats & vulnerabilities", h:`
  <p><b>Social engineering</b> targets people, not systems:</p>
  <table class="ports">
   <tr><td class="mono">Phishing</td><td>fraudulent email; <b>spear</b> = targeted, <b>whaling</b> = execs</td></tr>
   <tr><td class="mono">Vishing / smishing</td><td>by voice call / by SMS text</td></tr>
   <tr><td class="mono">Shoulder surfing</td><td>watching you enter credentials</td></tr>
   <tr><td class="mono">Tailgating</td><td>following someone through a secure door</td></tr>
   <tr><td class="mono">Impersonation</td><td>pretending to be staff/authority</td></tr>
   <tr><td class="mono">Dumpster diving</td><td>digging through trash for info</td></tr>
   <tr><td class="mono">Evil twin</td><td>rogue Wi-Fi AP mimicking a real one</td></tr>
  </table>
  <p><b>Network attacks:</b> DoS/DDoS, spoofing, on-path (man-in-the-middle), brute force, dictionary, zero-day, and insider threats. <b>Vulnerabilities:</b> unpatched/non-compliant systems, EOL software, and unprotected BYOD devices.</p>`},
 {t:"Wireless security & authentication", h:`
  <p><b>Wireless encryption (best to worst):</b> <span class="kw">WPA3</span> &gt; <span class="kw">WPA2</span> (AES/CCMP) &gt; WPA (TKIP, weak) &gt; WEP (broken — never use). On the exam, "use stronger security" almost always means WPA2 or WPA3.</p>
  <p><b>Authentication:</b> <span class="kw">RADIUS</span> and <span class="kw">TACACS+</span> centralize login (AAA) for networks and devices; <span class="kw">Kerberos</span> is the domain authentication protocol. <span class="kw">MFA</span> (multifactor) combines factors: something you know (password), have (token/phone), and are (biometric). Reuse the AAA idea from Core 1 here.</p>`},
 {t:"Windows security settings", h:`
  <p><b>Defender Antivirus</b> and the <b>Windows Firewall</b> are built in. Manage accounts in <b>Users and Groups</b>; follow <span class="kw">least privilege</span> (standard user for daily work, admin only when needed).</p>
  <p><b>NTFS vs. share permissions:</b> NTFS permissions apply locally and over the network; share permissions only apply over the network. When they conflict, the <b>most restrictive</b> effective permission wins.</p>
  <p><span class="kw">UAC</span> (User Account Control) prompts before privileged actions. <span class="kw">BitLocker</span> encrypts whole drives (uses TPM); <span class="kw">EFS</span> encrypts individual files. Sign-in options include PIN, password, and biometrics.</p>`},
 {t:"Hardening workstations & SOHO", h:`
  <p><b>Workstation hardening:</b> strong/unique passwords and a lockout policy, disable AutoRun/AutoPlay, remove or disable unused accounts (rename/disable the default admin and guest), keep the OS and apps patched, and use account-management best practices like screen-lock timeouts.</p>
  <p><b>SOHO router hardening:</b> change default admin credentials, update firmware, use WPA2/WPA3, disable WPS, turn off remote management/UPnP if not needed, change the default SSID, and segment guests onto a guest network.</p>
  <p><b>Data destruction:</b> physical (shred, drill, degauss) for true destruction; or a secure wipe/standard format + overwrite before reuse. Recycling a drive without wiping it leaks data.</p>`},
 {t:"Browser & data security", h:`
  <p><b>Browser security:</b> verify <span class="kw">HTTPS</span> (valid certificate) before entering credentials, install extensions only from trusted stores, use a password manager, enable pop-up and ad/script blocking, and clear cache/cookies when troubleshooting. Watch for typo-squatted or look-alike domains.</p>
  <p><b>Protecting data in motion and at rest:</b> encryption (BitLocker/EFS, full-disk on mobile), VPNs for remote access, and MFA on accounts. Recognize <span class="kw">PII</span> (personal data) and regulated data like <span class="kw">PCI</span> (cards) and healthcare info that demand extra care.</p>`},
],
3:[
 {t:"Windows OS problems", h:`
  <p>Symptom → likely fix:</p>
  <ul>
   <li><b>BSOD / spontaneous restart</b> → bad driver, failing hardware (RAM), or recent update; check Event Viewer and roll back.</li>
   <li><b>Boot fails / "no OS found"</b> → boot order, corrupt boot files (<span class="mono">bootrec</span>), or a dead drive; try Startup Repair in the recovery environment.</li>
   <li><b>Slow performance</b> → too many startup apps, low disk space, malware, or a failing drive; use Task Manager and <span class="mono">sfc /scannow</span>.</li>
   <li><b>Services won't start / frequent crashes</b> → check dependencies and logs; repair system files.</li>
   <li><b>Profile won't load / corrupt profile</b> → rebuild the user profile.</li>
  </ul>
  <p><b>Recovery toolkit:</b> Safe Mode, System Restore, Startup Repair, <span class="mono">sfc</span>, <span class="mono">chkdsk</span>, Reset this PC, and (last resort) reimage/reinstall. Practice these in a VM with a snapshot so you can roll back.</p>`},
 {t:"Malware symptoms & PC security issues", h:`
  <p><b>Red flags of infection:</b> pop-ups and redirected searches, unexpected new toolbars/extensions, slow system, high disk/CPU/network with no cause, disabled antivirus/Task Manager, renamed or missing files, and altered certificates or invalid cert warnings.</p>
  <p><b>Response:</b> follow the 7-step removal process (verify → quarantine → disable System Restore → remediate in safe mode → schedule scans → re-enable System Restore → educate). Disconnect from the network early to stop spread, and never trust the infected machine's own tools to confirm it's clean.</p>`},
 {t:"Mobile OS, app & security issues", h:`
  <ul>
   <li><b>App won't install/launch or crashes</b> → not enough storage, OS too old, or corrupt app data; update/clear cache/reinstall.</li>
   <li><b>Fast battery drain / overheating</b> → a rogue app, poor signal forcing high power, or background sync; check battery usage stats.</li>
   <li><b>No connectivity</b> → toggle airplane mode, forget/re-join Wi-Fi, re-pair Bluetooth, check APN/cellular.</li>
   <li><b>Slow/laggy or frozen</b> → close apps, free storage, reboot, update the OS.</li>
  </ul>
  <p><b>Mobile security symptoms:</b> high data usage, unexpected app permissions, fake/leaked notifications, unauthorized account access, or unusual battery drain can indicate malware or a compromised account. Remedies: update the OS, remove suspicious apps, change passwords, and as a last resort factory-reset or remote-wipe.</p>`},
],
4:[
 {t:"Documentation & change management", h:`
  <p><b>Documentation a tech relies on:</b> ticketing systems, asset management/inventory, a knowledge base, standard operating procedures (SOPs), network topology diagrams, acceptable-use policies (AUP), and incident reports.</p>
  <p><b>Change management</b> reduces the risk of breaking production. The pieces: a documented <span class="kw">request</span>, the <span class="kw">purpose</span> and <span class="kw">scope</span>, a <span class="kw">risk analysis</span>, approval from a change board, a <span class="kw">rollback/backout plan</span>, an end-user acceptance step, and a scheduled maintenance window. The big idea: <b>plan and get approval before you change anything important.</b></p>`},
 {t:"Backups & recovery", h:`
  <p><b>Backup types:</b></p>
  <table class="ports">
   <tr><td class="mono">Full</td><td>everything every time; fastest restore, most storage</td></tr>
   <tr><td class="mono">Incremental</td><td>only what changed since the last backup; small/fast backups, slower restore (needs the chain)</td></tr>
   <tr><td class="mono">Differential</td><td>everything changed since the last full; bigger than incremental, simpler restore</td></tr>
   <tr><td class="mono">Synthetic</td><td>combines a full with later increments into a new full</td></tr>
  </table>
  <p>Follow the <span class="kw">3-2-1 rule</span>: three copies, on two different media, one off-site. And always <b>test restores</b> — a backup you've never restored is a guess. Know on-site vs. off-site/cloud and backup rotation (e.g. grandfather-father-son).</p>`},
 {t:"Safety & environment", h:`
  <p><b>Personal/equipment safety:</b> use an <span class="kw">ESD strap</span> and mat to protect components, unplug before servicing, discharge stored power (don't open a PSU or CRT — capacitors hold lethal charge), and lift with your legs.</p>
  <p><b>Environmental:</b> read the <span class="kw">SDS</span> (safety data sheet, formerly MSDS) for any chemical or battery; control temperature and humidity (humidity too low → more ESD); and protect against power problems with a <span class="kw">surge suppressor</span> and a <span class="kw">UPS</span> (battery backup for clean shutdown). Dispose of batteries, toner, and CRTs per local regulations.</p>`},
 {t:"Privacy, licensing & policy", h:`
  <p><b>Regulated/sensitive data:</b> <span class="kw">PII</span> (personally identifiable info), <span class="kw">PHI</span> (health), and <span class="kw">PCI</span> (payment cards) all require careful handling. Know <b>GDPR</b>-style data-privacy obligations at a high level.</p>
  <p><b>Licensing:</b> understand the <span class="kw">EULA</span>, the difference between <b>open-source</b> and <b>commercial/proprietary</b> licenses, personal vs. enterprise (volume) licensing, and <span class="kw">DRM</span>. Use valid, non-expired licenses.</p>
  <p><b>Incident response:</b> preserve evidence and maintain <span class="kw">chain of custody</span>, document the incident, and report through the proper channels. First responders don't tamper with evidence.</p>`},
 {t:"Communication & professionalism", h:`
  <p>The "soft skills" CompTIA tests as right-vs-wrong behavior: use clear language and <b>avoid jargon</b> with end users, actively listen and don't interrupt, be on time and set realistic expectations, maintain a positive attitude, and keep customer information <b>private and confidential</b>.</p>
  <p>Handle a difficult customer by staying calm, not arguing or being defensive, not minimizing their problem, and not taking calls or texting while working with them. Always follow up afterward to confirm satisfaction.</p>`},
 {t:"Scripting fundamentals", h:`
  <p>You won't write complex code on the exam, but you should read a simple script and know the building blocks.</p>
  <ul>
   <li><b>Variables</b> hold values you reuse; a <span class="kw">data type</span> is what kind of value it is (text/string, whole number/integer, true-false/boolean).</li>
   <li><b>Environment variables</b> are system-wide values scripts can read, like <span class="mono">%USERNAME%</span> or <span class="mono">%PATH%</span> on Windows.</li>
   <li><b>Comments</b> (<span class="mono">#</span> or <span class="mono">REM</span>) are notes the computer ignores — they explain what the script does.</li>
   <li><b>Conditionals</b> (<span class="mono">if</span>) run code only when something is true; <b>loops</b> (<span class="mono">for</span>/<span class="mono">while</span>) repeat code until a condition is met.</li>
  </ul>
  <p><b>Good use cases:</b> automating backups, mapping network drives at login, installing apps across many machines, and routine maintenance. <b>Risks to respect:</b> a buggy script can change the wrong system settings, crash systems, create runaway resource use, or loop forever — always test on one machine (or a VM snapshot) before running it widely.</p>`},
 {t:"Script file types & remote access", h:`
  <p><b>Script file types:</b></p>
  <table class="ports">
   <tr><td class="mono">.bat</td><td>Windows batch</td></tr>
   <tr><td class="mono">.ps1</td><td>PowerShell</td></tr>
   <tr><td class="mono">.sh</td><td>shell (Linux/macOS)</td></tr>
   <tr><td class="mono">.py</td><td>Python</td></tr>
   <tr><td class="mono">.js</td><td>JavaScript</td></tr>
   <tr><td class="mono">.vbs</td><td>VBScript (legacy)</td></tr>
  </table>
  <p>Scripts automate tasks like backups, drive mapping, and app installs — but a bad script can cause mistakes, loops, or resource exhaustion, so test safely. <b>Remote access:</b> <span class="kw">RDP</span> (Remote Desktop), <span class="kw">VPN</span>, <span class="kw">SSH</span>, <span class="kw">VNC</span>, <span class="kw">MSRA</span> (Quick Assist), and <span class="kw">RMM</span> tools — each trades off security and convenience; prefer encrypted options.</p>`},
],
};

const QUESTIONS2 = [
/* ===== Domain 1: Operating Systems ===== */
{d:1,q:"A user needs to store a single 6 GB video file on a USB drive that will also be read on a Mac. Which file system should you use?",o:["FAT32","NTFS","exFAT","ext4"],c:2,e:"exFAT handles files larger than 4 GB and is readable by both Windows and macOS. FAT32 caps single files at 4 GB. NTFS is Windows-native (macOS reads it but can't write by default). ext4 is a Linux file system."},
{d:1,q:"Which Windows edition is the minimum required to join an Active Directory domain?",o:["Home","Pro","Enterprise","Education"],c:1,e:"Windows Pro is the lowest edition that can join a domain. Home can only join workgroups. Enterprise and Education can also join domains but Pro is the minimum."},
{d:1,q:"A technician wants to view system and application error logs to diagnose a recurring crash. Which tool should they open?",o:["Task Scheduler (taskschd)","Event Viewer (eventvwr)","Device Manager (devmgmt)","Performance Monitor (perfmon)"],c:1,e:"Event Viewer (eventvwr) collects system, application, and security logs. Task Scheduler runs automated tasks, Device Manager manages hardware/drivers, and Performance Monitor tracks live metrics."},
{d:1,q:"Which command repairs corrupted protected Windows system files?",o:["chkdsk","sfc /scannow","gpupdate","diskpart"],c:1,e:"sfc /scannow (System File Checker) scans and repairs protected OS files. chkdsk checks the disk's file system, gpupdate refreshes Group Policy, and diskpart manages partitions."},
{d:1,q:"A Windows 11 installation fails on otherwise capable hardware. Which requirement is the most likely cause?",o:["A spinning HDD instead of an SSD","Missing TPM 2.0 / Secure Boot","Less than 16 GB of RAM","An AMD instead of Intel CPU"],c:1,e:"Windows 11 requires TPM 2.0 and UEFI Secure Boot. Storage type, exact RAM beyond the 4 GB minimum, and CPU vendor aren't the blocking requirement here."},
{d:1,q:"Which command displays and lets you renew a Windows client's IP configuration?",o:["netstat","nslookup","ipconfig","hostname"],c:2,e:"ipconfig shows IP settings and supports /release and /renew. netstat lists connections, nslookup queries DNS, and hostname prints the computer name."},
{d:1,q:"A partition scheme is needed for a 4 TB boot drive on a UEFI system. Which should you choose?",o:["MBR","GPT","FAT","Dynamic"],c:1,e:"GPT supports drives larger than 2 TB and pairs with UEFI. MBR is limited to 2 TB and four primary partitions. FAT is a file system, not a partition scheme; 'dynamic' is a disk type, not the partition style asked for."},
{d:1,q:"On Linux, which command changes a file's permissions?",o:["chown","chmod","grep","ps"],c:1,e:"chmod changes permission modes. chown changes ownership, grep searches text, and ps lists processes."},
{d:1,q:"A technician wants to keep all installed applications and personal files while moving from Windows 10 to Windows 11. Which method fits?",o:["Clean install","In-place upgrade","Reimage","Reset this PC (remove everything)"],c:1,e:"An in-place upgrade preserves apps and files. A clean install, reimage, and 'remove everything' reset all wipe installed applications."},
{d:1,q:"Which utility lets you control which programs launch automatically at startup?",o:["regedit","Task Manager (Startup tab)","dxdiag","Disk Management"],c:1,e:"Task Manager's Startup tab enables/disables startup programs (msconfig also historically did this). regedit edits the registry, dxdiag reports graphics info, and Disk Management handles partitions."},
{d:1,q:"Which macOS feature provides automated, scheduled backups to an external drive?",o:["Keychain","Spotlight","Time Machine","Mission Control"],c:2,e:"Time Machine performs scheduled backups. Keychain stores passwords, Spotlight is search, and Mission Control manages windows/desktops."},
{d:1,q:"A Linux admin needs to install a package from the distribution's repository on a Debian/Ubuntu system. Which tool is appropriate?",o:["yum","apt","brew","chmod"],c:1,e:"apt is the Debian/Ubuntu package manager. yum/dnf are used on Red Hat-based systems, brew is for macOS, and chmod changes permissions."},

/* ===== Domain 2: Security ===== */
{d:2,q:"Malware encrypts a user's files and displays a message demanding payment for the decryption key. What type is this?",o:["Rootkit","Ransomware","Keylogger","Worm"],c:1,e:"Ransomware encrypts data and demands payment. A rootkit hides itself, a keylogger records keystrokes, and a worm self-replicates across networks."},
{d:2,q:"What is the correct first step of the malware-removal process?",o:["Disable System Restore","Quarantine the system","Investigate and verify symptoms","Educate the end user"],c:2,e:"You first investigate and verify the symptoms to confirm malware. Then quarantine, disable System Restore, remediate, schedule scans, re-enable System Restore, and finally educate the user."},
{d:2,q:"An attacker sends a text message pretending to be the bank to trick a user into revealing a code. What is this attack called?",o:["Phishing","Vishing","Smishing","Whaling"],c:2,e:"Smishing is phishing over SMS text. Phishing is generic (usually email), vishing is by voice call, and whaling targets high-value executives."},
{d:2,q:"Which wireless security option should a technician choose for the strongest protection on a modern network?",o:["WEP","WPA","WPA2","WPA3"],c:3,e:"WPA3 is the newest and strongest. WPA2 (AES) is still acceptable, WPA (TKIP) is weak, and WEP is broken and should never be used."},
{d:2,q:"A standard user gets a UAC prompt when trying to install software. What security principle does this enforce?",o:["Least privilege","Defense in depth","Non-repudiation","Implicit deny"],c:0,e:"UAC enforces least privilege by requiring elevation for administrative actions, so users run with minimal rights by default. The others are related security concepts but not what UAC primarily demonstrates."},
{d:2,q:"On the same folder, a user's NTFS permission is Read and the share permission is Full Control over the network. What is the effective network access?",o:["Full Control","Read","Modify","No access"],c:1,e:"When NTFS and share permissions combine, the most restrictive effective permission applies. Read (NTFS) is more restrictive than Full Control (share), so the user gets Read over the network."},
{d:2,q:"A rogue access point is set up to imitate a legitimate company SSID to capture traffic. This is known as a(n):",o:["On-path attack","Evil twin","Tailgating","Zero-day"],c:1,e:"An evil twin is a malicious AP impersonating a real one. An on-path attack intercepts traffic between two parties, tailgating is following someone through a secure door, and a zero-day exploits an unknown flaw."},
{d:2,q:"Which technology encrypts an entire Windows drive and can use the TPM to protect the key?",o:["EFS","BitLocker","Defender","UAC"],c:1,e:"BitLocker encrypts whole volumes and integrates with the TPM. EFS encrypts individual files, Defender is antivirus, and UAC controls privilege elevation."},
{d:2,q:"What is the best way to ensure data on a failed hard drive cannot be recovered before disposal?",o:["Quick format the drive","Delete the partition","Physically shred or degauss the drive","Move files to the Recycle Bin and empty it"],c:2,e:"Physical destruction (shred/drill/degauss) makes data unrecoverable. Formatting, deleting partitions, and emptying the Recycle Bin leave data that can be recovered, especially on a drive being discarded."},
{d:2,q:"Before entering credentials on a banking website, which indicator best confirms the connection is secure?",o:["The page loads quickly","The URL begins with https and has a valid certificate","The site has a professional logo","The browser is up to date"],c:1,e:"HTTPS with a valid certificate confirms an encrypted, authenticated connection. Load speed, logos, and browser version don't verify the site's legitimacy or encryption."},
{d:2,q:"A SOHO router still uses its factory admin password. What is the most important hardening step?",o:["Hide the SSID","Change the default administrator credentials","Lower the Wi-Fi transmit power","Disable the guest network"],c:1,e:"Default credentials are widely known and the top risk, so change them first. Hiding the SSID is weak security, reducing power and disabling guest networks are minor by comparison."},
{d:2,q:"Which authentication approach requires something you know plus something you have?",o:["Single sign-on","Multifactor authentication","Least privilege","Federation"],c:1,e:"Multifactor authentication combines factors from different categories (e.g., password + phone token). SSO is one login for many services, least privilege limits rights, and federation shares identity across organizations."},
{d:2,q:"Users in a building are tricked into letting an unknown person follow them through a badge-controlled door. What is this?",o:["Shoulder surfing","Dumpster diving","Tailgating","Impersonation"],c:2,e:"Tailgating is following an authorized person through a secure entrance. Shoulder surfing is watching credential entry, dumpster diving is searching trash, and impersonation is posing as someone with authority."},

/* ===== Domain 3: Software Troubleshooting ===== */
{d:3,q:"A Windows PC repeatedly shows a blue screen shortly after a recent driver update. What is the best first action?",o:["Reinstall Windows","Roll back the driver","Replace the motherboard","Run a full disk defragment"],c:1,e:"A BSOD right after a driver update points at that driver; roll it back first. Reinstalling Windows or replacing hardware is premature, and defragmenting won't address a driver fault."},
{d:3,q:"Windows won't boot and reports missing operating system. Which recovery tool should you try first?",o:["Startup Repair in the recovery environment","Format the system drive","Replace the RAM","Disable the firewall"],c:0,e:"Startup Repair attempts to fix boot files automatically and is the least destructive first step. Formatting destroys data, replacing RAM is unrelated to boot files, and the firewall has nothing to do with booting."},
{d:3,q:"A computer has become very slow. Task Manager shows the disk at 100% with no obvious heavy app. Which is the most likely cause to investigate?",o:["The monitor refresh rate","Malware or a failing drive","The keyboard driver","The default web browser"],c:1,e:"Sustained 100% disk with no clear app commonly indicates malware activity or a failing/overwhelmed drive. Refresh rate, keyboard driver, and browser choice don't cause constant disk saturation."},
{d:3,q:"To safely scan and remove stubborn malware that loads with Windows, which environment is most effective?",o:["Normal mode with antivirus","Safe Mode or a preinstallation environment","BIOS/UEFI setup","A guest user account"],c:1,e:"Safe Mode or a preinstallation environment loads minimal components so persistent malware can't run and block removal. Normal mode lets it interfere, and BIOS/guest accounts don't run malware scans."},
{d:3,q:"During malware remediation, why should System Restore be disabled before cleaning?",o:["It speeds up the scan","Restore points can harbor the infection","It frees disk space permanently","It is required to install updates"],c:1,e:"Restore points can contain copies of the malware, so they're disabled (and purged) during cleanup, then re-enabled with a fresh point afterward. The other reasons are incorrect."},
{d:3,q:"A user's phone app crashes immediately on launch after working for months. Which step is the best first try?",o:["Factory reset the phone","Clear the app's cache/data or reinstall it","Replace the battery","Disable Wi-Fi"],c:1,e:"Clearing the app's cache/data or reinstalling resolves most single-app crashes with the least disruption. A factory reset is a last resort, and battery or Wi-Fi aren't the cause of one app crashing."},
{d:3,q:"Which symptom most strongly suggests a mobile device may be compromised rather than simply low on battery?",o:["Slightly dimmer screen","Unexpectedly high data usage and unknown app permissions","A cracked screen protector","Slower charging on an old cable"],c:1,e:"Unexplained high data usage plus unfamiliar app permissions point to malware or a compromised account. A dim screen, cracked protector, or slow charging are hardware/cosmetic, not security indicators."},
{d:3,q:"A technician needs to verify a malware-infected machine is no longer spreading on the network during cleanup. What should they do early?",o:["Disconnect it from the network","Defragment the drive","Update the BIOS","Increase the page file"],c:0,e:"Disconnecting (quarantining) stops the malware from spreading or communicating. Defragmenting, BIOS updates, and page-file changes don't contain an infection."},
{d:3,q:"After many failed Windows updates, services fail to start and files seem corrupt. Which command-line repair is appropriate before reinstalling?",o:["ping","sfc /scannow","tracert","hostname"],c:1,e:"sfc /scannow repairs corrupted protected system files and is a sensible step before a full reinstall. ping/tracert test networking and hostname just prints the name."},

/* ===== Domain 4: Operational Procedures ===== */
{d:4,q:"Following the 3-2-1 backup rule, how many total copies of data should you keep?",o:["One","Two","Three","Five"],c:2,e:"3-2-1 means three copies of the data, on two different media types, with one copy off-site."},
{d:4,q:"Which backup type captures only the data changed since the last full backup, and is simpler to restore than incremental?",o:["Differential","Incremental","Synthetic","Snapshot"],c:0,e:"A differential backup includes everything changed since the last full backup, so restoring needs only the full plus the latest differential. Incremental backups need the full plus every increment in the chain."},
{d:4,q:"A technician is about to deploy a major configuration change to production servers. Which step should happen first?",o:["Apply the change immediately to save time","Get approval and document a rollback plan","Delete old backups to free space","Disable monitoring during the change"],c:1,e:"Change management requires documenting the change, obtaining approval, and having a rollback/backout plan before implementing. Rushing, deleting backups, or disabling monitoring all increase risk."},
{d:4,q:"Which precaution best protects sensitive components from electrostatic discharge while servicing a PC?",o:["Work on carpet for grip","Wear an ESD wrist strap connected to ground","Keep the room very dry","Use a magnetized screwdriver"],c:1,e:"An ESD wrist strap safely equalizes charge to ground. Carpet and low humidity increase static, and a magnetized screwdriver can risk data on drives and doesn't address ESD."},
{d:4,q:"What document should a technician consult for safe handling and disposal of a leaking battery or chemical?",o:["EULA","SDS (Safety Data Sheet)","SOP","Change request"],c:1,e:"The SDS (formerly MSDS) details safe handling, storage, and disposal of hazardous materials. A EULA is a license agreement, an SOP is a procedure, and a change request documents a change."},
{d:4,q:"Which device provides battery backup so a server can shut down cleanly during a power outage?",o:["Surge suppressor","Power strip","UPS","PDU"],c:2,e:"A UPS (uninterruptible power supply) supplies battery power during outages for a clean shutdown. A surge suppressor only blocks spikes, a power strip just adds outlets, and a basic PDU distributes power without battery backup."},
{d:4,q:"While handling evidence after a security incident, what must be maintained to keep the evidence admissible?",o:["Chain of custody","An open-source license","A maintenance window","A differential backup"],c:0,e:"Chain of custody documents who handled evidence and when, preserving its integrity. The other items are unrelated to evidence handling."},
{d:4,q:"A customer becomes upset and starts venting about an unrelated problem. What is the most professional response?",o:["Interrupt to correct them","Take a personal call to wait it out","Listen actively and avoid being defensive","Tell them the issue isn't your job"],c:2,e:"Professionalism calls for active listening, staying calm, and not being defensive or dismissive. Interrupting, taking calls mid-service, and brushing off the customer are all poor practice."},
{d:4,q:"Which file extension indicates a PowerShell script?",o:[".bat",".sh",".ps1",".vbs"],c:2,e:".ps1 is PowerShell. .bat is Windows batch, .sh is a shell script for Linux/macOS, and .vbs is VBScript."},
{d:4,q:"A remote support tool must give a technician encrypted, full control of a Windows desktop across the internet. Which is most appropriate?",o:["Telnet","RDP over a VPN","FTP","SMTP"],c:1,e:"RDP (encrypted), ideally tunneled through a VPN, provides secure remote desktop control. Telnet is unencrypted, while FTP and SMTP are for file transfer and email, not remote control."},
{d:4,q:"What is the main risk of running an untested automation script on production systems?",o:["It always improves performance","It could cause errors, loops, or resource exhaustion","It encrypts the drive automatically","It updates the BIOS"],c:1,e:"A flawed script can introduce mistakes, infinite loops, or consume resources, so test in a safe environment first. The other options are not inherent script behaviors."},
{d:4,q:"Which regulated data category specifically covers payment card information?",o:["PII","PHI","PCI","DRM"],c:2,e:"PCI (Payment Card Industry) data covers cardholder information. PII is general personal data, PHI is protected health information, and DRM is digital rights management."},
{d:4,q:"A help desk wants a consistent record of issues, steps taken, and resolutions for future reference. Which tool best supports this?",o:["A ticketing system with a knowledge base","A personal sticky-note system","Disabling logging to save space","Verbal handoffs only"],c:0,e:"A ticketing system plus a knowledge base creates searchable, consistent documentation. Sticky notes, disabling logs, and verbal-only handoffs lose information and aren't repeatable."},
{d:4,q:"In a script, what does an environment variable such as %USERNAME% represent?",o:["A comment the system ignores","A system-provided value the script can read","A loop that repeats code","A type of remote-access protocol"],c:1,e:"Environment variables are system-wide values (like the current user or PATH) that scripts can read. Comments are ignored notes, loops repeat code, and remote access is unrelated."},
{d:4,q:"Which scripting construct repeats a block of code until a condition is met?",o:["A variable","A comment","A loop","A data type"],c:2,e:"A loop (for/while) repeats code. A variable stores a value, a comment is an ignored note, and a data type describes what kind of value something is."},
{d:4,q:"What is the safest practice before running a new maintenance script on many production machines?",o:["Run it everywhere at once to save time","Test it on a single machine or VM snapshot first","Delete the backups first","Disable antivirus during the run"],c:1,e:"Testing on one machine or a VM snapshot limits the blast radius if the script misbehaves. Mass-running untested code, deleting backups, and disabling antivirus all increase risk."},
{d:1,q:"A Windows application needs to connect to a SQL database. Which Control Panel/admin tool configures that connection?",o:["Data Sources (ODBC)","Device Manager","Disk Management","Event Viewer"],c:0,e:"ODBC Data Sources sets up connections between Windows applications and databases. Device Manager handles hardware, Disk Management handles partitions, and Event Viewer shows logs."},
{d:1,q:"A technician wants a single console that includes Disk Management, Device Manager, Event Viewer, and Services together. Which tool fits?",o:["Task Manager","Computer Management","Registry Editor","Control Panel"],c:1,e:"Computer Management bundles those snap-ins in one console. Task Manager shows live processes/performance, the Registry Editor edits the registry, and Control Panel holds individual applets."},
{d:1,q:"Which macOS feature provides full-disk encryption, similar to BitLocker on Windows?",o:["Time Machine","Keychain","FileVault","Spotlight"],c:2,e:"FileVault encrypts the entire macOS startup disk. Time Machine is backups, Keychain stores passwords, and Spotlight is search."},
{d:1,q:"Which Control Panel applet is used to uninstall a desktop application in Windows?",o:["Programs and Features","Indexing Options","Power Options","Sound"],c:0,e:"Programs and Features lists installed apps and lets you uninstall or change them. Indexing Options tunes search, Power Options manages sleep/battery, and Sound configures audio."},
];
</script>
<script>
/* ============ PHASES ============ */
const PHASES = {
  1:{code:'220-1201', name:'Core 1', tag:'Hardware & Networking', pass:675, domains:DOMAINS1, lessons:LESSONS1, questions:QUESTIONS1},
  2:{code:'220-1202', name:'Core 2', tag:'OS, Security & Procedures', pass:700, domains:DOMAINS2, lessons:LESSONS2, questions:QUESTIONS2},
};
let phase=1; try{ phase=+localStorage.getItem('bench_phase')||1; }catch(e){} if(![1,2].includes(phase)) phase=1;
function P(){ return PHASES[phase]; }
const COLORVAR = {1:'--d1',2:'--d2',3:'--d3',4:'--d4',5:'--d5'};

/* ============ STORAGE (per-phase progress) ============ */
const store = {
  read(){ try{ return JSON.parse(localStorage.getItem('bench_progress')||'{}'); }catch(e){ return {}; } },
  write(o){ try{ localStorage.setItem('bench_progress', JSON.stringify(o)); }catch(e){} },
};
let allProg = store.read();
function prog(){ allProg[phase] = allProg[phase] || {lessons:{},best:{},wrong:[]}; const p=allProg[phase]; p.lessons=p.lessons||{}; p.best=p.best||{}; p.wrong=p.wrong||[]; return p; }
function saveLesson(d, idx){ const p=prog(); p.lessons[d]=p.lessons[d]||[]; if(!p.lessons[d].includes(idx)) p.lessons[d].push(idx); store.write(allProg); }
function lessonsDone(d){ return (prog().lessons[d]||[]).length; }

/* ============ THEME & PHASE CHROME ============ */
function initTheme(){
  let t='dark'; try{ t=localStorage.getItem('bench_theme')||'dark'; }catch(e){}
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('themeBtn').firstChild.textContent = t==='dark'?'🌙 ':'☀️ ';
}
function paintChrome(){
  document.getElementById('subLabel').textContent = 'A+ '+P().name+' · '+P().code;
  document.querySelectorAll('#phaseSwitch button').forEach(b=>b.classList.toggle('on', +b.dataset.p===phase));
}
function setPhase(n){
  if(phase===n){ go('home'); return; }
  phase=n; try{ localStorage.setItem('bench_phase',n); }catch(e){}
  paintChrome(); go('home');
}
document.getElementById('themeBtn').onclick=()=>{
  const cur=document.documentElement.getAttribute('data-theme');
  const next=cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  document.getElementById('themeBtn').firstChild.textContent = next==='dark'?'🌙 ':'☀️ ';
  try{ localStorage.setItem('bench_theme',next); }catch(e){}
};
document.getElementById('resetBtn').onclick=()=>{
  if(confirm('Reset all lesson and quiz progress for '+P().name+' ('+P().code+') on this device?')){
    allProg[phase]={lessons:{},best:{},wrong:[]}; store.write(allProg); go('home');
  }
};

/* ============ ROUTER ============ */
const app=document.getElementById('app');
let quiz=null;
function go(view,arg){ window.scrollTo(0,0); ({home:viewHome,lesson:viewLesson,setup:viewSetup,quiz:viewQuiz,results:viewResults}[view])(arg); }
function el(html){ app.innerHTML='<div class="view">'+html+'</div>'; }
function esc(s){ return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function qByDomain(d){ return P().questions.map((q,i)=>({q,i})).filter(o=>o.q.d===d); }

/* ============ HOME ============ */
function viewHome(){
  const DOMAINS=P().domains, LESSONS=P().lessons, QUESTIONS=P().questions;
  const totalLessons = DOMAINS.reduce((a,d)=>a+LESSONS[d.n].length,0);
  const doneLessons = DOMAINS.reduce((a,d)=>a+lessonsDone(d.n),0);
  const bestVals = Object.values(prog().best);
  const avg = bestVals.length ? Math.round(bestVals.reduce((a,b)=>a+b.score/b.total,0)/bestVals.length*100) : 0;
  let cards = DOMAINS.map(d=>{
    const cv=COLORVAR[d.n], lc=LESSONS[d.n].length, ld=lessonsDone(d.n), qn=qByDomain(d.n).length;
    const dots = Array.from({length:lc},(_,i)=>`<span class="led-dot ${i<ld?'on':''}"></span>`).join('');
    const best = prog().best[d.n];
    const bestTxt = best ? `best ${Math.round(best.score/best.total*100)}%` : 'not attempted';
    return `<div class="card" style="--dc:var(${cv})" onclick="go('lesson',${d.n})">
      <div class="bar"></div>
      <div class="top"><span class="dnum">${d.n}.0</span><span class="pct">${d.pct}% of exam</span></div>
      <h4>${d.title}</h4>
      <p class="desc">${d.blurb}</p>
      <div class="led-strip">${dots}</div>
      <div class="meta"><span>${ld}/${lc} lessons read</span><span>${qn} questions · ${bestTxt}</span></div>
    </div>`;
  }).join('');
  el(`
    <div class="hero">
      <span class="eyebrow">Phase ${phase} · ${P().code} · ${P().tag}</span>
      <h2>Pass ${P().name}.<br>One domain at a time.</h2>
      <p>${DOMAINS.length} domains, plain-language lessons, and ${QUESTIONS.length} practice questions with full explanations. Read a domain, then run a quiz to find the gaps.</p>
      <div class="stat-strip">
        <div class="stat"><span class="num">${doneLessons}/${totalLessons}</span><span class="lbl">Lessons read</span></div>
        <div class="stat"><span class="num">${QUESTIONS.length}</span><span class="lbl">Practice Qs</span></div>
        <div class="stat"><span class="num ${avg>=75?'led':''}">${avg}%</span><span class="lbl">Avg best score</span></div>
        <div class="stat"><span class="num">${P().pass}</span><span class="lbl">Pass score /900</span></div>
      </div>
    </div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px">
      <button class="btn primary" onclick="go('setup','mix')">Start a mixed quiz</button>
      ${prog().wrong.length?`<button class="btn" onclick="startWrong()">Review ${prog().wrong.length} missed</button>`:''}
    </div>
    <div class="section-h"><h3>Domains</h3><div class="line"></div></div>
    <div class="grid">${cards}</div>
  `);
}

/* ============ LESSON ============ */
function viewLesson(d){
  d=+d; const DOMAINS=P().domains, LESSONS=P().lessons;
  const dom=DOMAINS.find(x=>x.n===d), cv=COLORVAR[d], list=LESSONS[d];
  const toc = list.map((l,i)=>`<button onclick="document.getElementById('ls${i}').scrollIntoView({behavior:'smooth'})">${esc(l.t)}</button>`).join('');
  const cards = list.map((l,i)=>`
    <section class="lesson-card" id="ls${i}" style="--dc:var(${cv})">
      <h3>${esc(l.t)}</h3>
      ${l.h}
    </section>`).join('');
  el(`
    <button class="back" onclick="go('home')">← All domains</button>
    <div class="lesson-head" style="--dc:var(${cv})">
      <span class="dnum">${d}.0</span>
      <h2>${dom.title}</h2>
    </div>
    <p style="color:var(--muted);margin:0 0 4px">${dom.blurb}</p>
    <div class="toc">${toc}</div>
    ${cards}
    <div class="lesson-foot">
      <button class="btn" onclick="markRead(${d})" id="readBtn">Mark all read ✓</button>
      <button class="btn dc" style="--dc:var(${cv})" onclick="go('setup',${d})">Quiz this domain →</button>
    </div>
  `);
}
function markRead(d){
  P().lessons[d].forEach((_,i)=>saveLesson(d,i));
  const b=document.getElementById('readBtn'); b.textContent='Saved ✓'; b.classList.add('primary');
}

/* ============ QUIZ SETUP ============ */
let setupDomain='mix', setupLen=10;
function viewSetup(arg){
  const DOMAINS=P().domains, QUESTIONS=P().questions;
  setupDomain = arg==null?'mix':arg;
  const domOpts = [`<button class="opt ${setupDomain==='mix'?'sel':''}" onclick="pickDom('mix')">
      <span class="ot">Mixed</span><span class="os">all ${QUESTIONS.length} questions</span></button>`]
    .concat(DOMAINS.map(d=>`<button class="opt ${setupDomain==d.n?'sel':''}" onclick="pickDom(${d.n})" style="--dc:var(${COLORVAR[d.n]})">
      <span class="ot">${d.n}.0 ${d.title.split(' ')[0]}</span><span class="os">${qByDomain(d.n).length} questions</span></button>`)).join('');
  const pool = setupDomain==='mix'?QUESTIONS.length:qByDomain(+setupDomain).length;
  const lens=[5,10,20].filter(n=>n<=pool);
  const lenSet=[...new Set(lens.concat(pool))];
  if(setupLen>pool) setupLen=pool;
  const lenChips=lenSet.map(n=>`<button class="chip ${setupLen===n?'sel':''}" onclick="pickLen(${n})">${n===pool?('All '+n):n} Qs</button>`).join('');
  el(`
    <button class="back" onclick="go('home')">← Home</button>
    <span class="eyebrow">${P().name} · configure quiz</span>
    <h2 style="font-family:var(--display);font-size:28px;margin:8px 0 4px;letter-spacing:-.02em">Build your quiz</h2>
    <p style="color:var(--muted);margin:0 0 8px">Questions are drawn at random and shuffled. You'll see an explanation after every answer.</p>
    <div class="section-h"><h3>Topic</h3><div class="line"></div></div>
    <div class="setup-grid">${domOpts}</div>
    <div class="section-h"><h3>Length</h3><div class="line"></div></div>
    <div class="lenrow">${lenChips}</div>
    <div style="margin-top:30px"><button class="btn primary" onclick="startQuiz()">Begin →</button></div>
  `);
}
function pickDom(d){ setupDomain=d; viewSetup(d); }
function pickLen(n){ setupLen=n; viewSetup(setupDomain); }

/* ============ QUIZ ENGINE ============ */
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];} return a; }
function buildOrder(ids){ const Q=P().questions, o={}; ids.forEach(id=>{ o[id]=shuffle(Q[id].o.map((_,i)=>i)); }); return o; }
function startQuiz(){
  const QUESTIONS=P().questions;
  let pool = setupDomain==='mix' ? QUESTIONS.map((q,i)=>i) : qByDomain(+setupDomain).map(o=>o.i);
  pool = shuffle(pool).slice(0, setupLen);
  quiz={ phase, domain:setupDomain, ids:pool, order:buildOrder(pool), cur:0, score:0, answered:false, missed:[] };
  go('quiz');
}
function startWrong(){
  const pool=shuffle(prog().wrong.slice());
  if(!pool.length) return;
  quiz={ phase, domain:'wrong', ids:pool, order:buildOrder(pool), cur:0, score:0, answered:false, missed:[] };
  go('quiz');
}
function viewQuiz(){
  const QUESTIONS=P().questions, DOMAINS=P().domains;
  const id=quiz.ids[quiz.cur], q=QUESTIONS[id];
  const cv=COLORVAR[q.d], dom=DOMAINS.find(x=>x.n===q.d);
  const keys=['A','B','C','D','E','F'];
  const ord=(quiz.order&&quiz.order[id]) || q.o.map((_,i)=>i);
  const opts=ord.map((origIdx,pos)=>`<button class="ans" data-i="${origIdx}" onclick="answer(${origIdx})" style="--dc:var(${cv})">
    <span class="key">${keys[pos]}</span><span>${esc(q.o[origIdx])}</span></button>`).join('');
  const pctW=(quiz.cur/quiz.ids.length*100);
  el(`
    <div class="qbar">
      <div class="progress"><i style="width:${pctW}%"></i></div>
      <span class="qcount">Q ${quiz.cur+1}/${quiz.ids.length}</span>
      <span class="qscore"><b>${quiz.score}</b> correct</span>
    </div>
    <span class="qtag" style="--dc:var(${cv})">${q.d}.0 ${esc(dom.title.split(' ')[0])}</span>
    <h2 class="question">${esc(q.q)}</h2>
    <div class="answers" id="answers">${opts}</div>
    <div id="exwrap"></div>
    <div class="qfoot" id="qfoot"></div>
  `);
  quiz.answered=false;
}
function answer(i){
  if(quiz.answered) return; quiz.answered=true;
  const QUESTIONS=P().questions;
  const id=quiz.ids[quiz.cur], q=QUESTIONS[id], cv=COLORVAR[q.d];
  const btns=[...document.querySelectorAll('.ans')];
  btns.forEach(b=>b.disabled=true);
  const correct=q.c, p=prog();
  const pick=document.querySelector('.ans[data-i="'+i+'"]');
  const corr=document.querySelector('.ans[data-i="'+correct+'"]');
  if(i===correct){ quiz.score++; if(pick)pick.classList.add('correct');
    p.wrong=p.wrong.filter(x=>x!==id);
  } else {
    if(pick)pick.classList.add('wrong'); if(corr)corr.classList.add('correct');
    quiz.missed.push(id);
    if(!p.wrong.includes(id)) p.wrong.push(id);
  }
  store.write(allProg);
  document.getElementById('exwrap').innerHTML=`
    <div class="explain" style="--dc:var(${cv})">
      <div class="et">${i===correct?'Correct':'Explanation'}</div>${esc(q.e)}
    </div>`;
  const last = quiz.cur===quiz.ids.length-1;
  document.getElementById('qfoot').innerHTML=
    `<button class="btn primary" onclick="next()">${last?'See results →':'Next question →'}</button>`;
}
function next(){
  if(quiz.cur===quiz.ids.length-1){ finishQuiz(); }
  else { quiz.cur++; go('quiz'); }
}
function finishQuiz(){
  if(quiz.domain!=='mix' && quiz.domain!=='wrong'){
    const d=+quiz.domain, p=prog(), prev=p.best[d];
    const ratio=quiz.score/quiz.ids.length;
    if(!prev || ratio > prev.score/prev.total) p.best[d]={score:quiz.score,total:quiz.ids.length};
    store.write(allProg);
  }
  go('results');
}

/* ============ RESULTS ============ */
function viewResults(){
  const QUESTIONS=P().questions, DOMAINS=P().domains;
  const total=quiz.ids.length, score=quiz.score, pct=Math.round(score/total*100);
  const pass=pct>=75;
  const R=70,C=2*Math.PI*R, off=C*(1-score/total);
  const ringColor=pass?'var(--led)':'var(--wrong)';
  const counts={};
  quiz.ids.forEach(id=>{const d=QUESTIONS[id].d;counts[d]=counts[d]||{t:0,c:0};counts[d].t++;});
  quiz.ids.forEach(id=>{ if(!quiz.missed.includes(id)){const d=QUESTIONS[id].d;counts[d].c++;} });
  const rows=Object.keys(counts).sort().map(d=>{
    const dom=DOMAINS.find(x=>x.n==d),cv=COLORVAR[d],o=counts[d];
    return `<div class="brow" style="--dc:var(${cv})"><span class="bd"></span><span class="bn">${d}.0</span>
      <span class="btitle">${dom.title}</span><span class="bsc">${o.c}/${o.t}</span></div>`;
  }).join('');
  const msg = pct>=90?'Bench-ready. Excellent.':pct>=75?'Passing range — keep sharpening.':pct>=50?'Getting there. Re-read the weak domains.':'Early days. Work the lessons, then retry.';
  el(`
    <div class="result-hero">
      <svg class="ring" viewBox="0 0 160 160">
        <circle cx="80" cy="80" r="${R}" fill="none" stroke="var(--border)" stroke-width="12"/>
        <circle cx="80" cy="80" r="${R}" fill="none" stroke="${ringColor}" stroke-width="12" stroke-linecap="round"
          stroke-dasharray="${C}" stroke-dashoffset="${off}" transform="rotate(-90 80 80)"
          style="transition:stroke-dashoffset 1s ease"/>
        <text x="80" y="74" text-anchor="middle" font-family="Space Grotesk" font-size="34" font-weight="700" fill="var(--text)">${pct}%</text>
        <text x="80" y="96" text-anchor="middle" font-family="JetBrains Mono" font-size="11" fill="var(--muted)">${score} / ${total}</text>
      </svg>
      <h2>${score} of ${total} correct</h2>
      <p>${msg}</p>
      <div class="verdict ${pass?'pass':'fail'}">${pass?'▲ PASSING RANGE':'▼ BELOW 75%'}</div>
    </div>
    <div class="result-actions">
      <button class="btn primary" onclick="go('setup','${quiz.domain==='wrong'?'mix':quiz.domain}')">New quiz</button>
      ${quiz.missed.length?`<button class="btn" onclick="retryMissed()">Retry ${quiz.missed.length} missed</button>`:''}
      <button class="btn" onclick="go('home')">Home</button>
    </div>
    ${rows?`<div class="section-h"><h3>By domain</h3><div class="line"></div></div><div class="breakdown">${rows}</div>`:''}
  `);
}
function retryMissed(){
  const pool=shuffle(quiz.missed.slice());
  quiz={ phase, domain:quiz.domain, ids:pool, order:buildOrder(pool), cur:0, score:0, answered:false, missed:[] };
  go('quiz');
}

/* ============ BOOT ============ */
initTheme();
paintChrome();
go('home');
</script>
