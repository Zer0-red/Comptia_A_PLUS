cated within colleges and public libraries."},{"d":3,"q":"When an instruction is sent to the CPU in a binary pattern, how does the CPU know what instruction the pattern means?","o":["External data bus","Register","Translator","Code book"],"c":3,"e":"The CPU has an internal code book that identifies each instruction pattern. A register is a memory location inside a CPU. The external data bus is the set of wires that carry data and instructions between the CPU and RAM. In this context, translator is a made-up term."},{"d":3,"q":"Which of the following is NOT an example of an Instruction Set Architecture (ISA)?","o":["x64","x86","x84","x86-64"],"c":2,"e":"x84 is not an ISA standard. x64, x86, and x86-64 are all ISA standards."},{"d":3,"q":"In the following example, which part of the CPU information corresponds to the generation?","o":["Intel","Core i9","12","900"],"c":2,"e":"12 corresponds to the generation. Intel is the brand, Core i9 is the tier, 900 is the model, and K is the suffix."},{"d":3,"q":"Before installing a CPU, what's the best way to protect it?","o":["ESD mat","OEM fan","Thermal paste","Orientation notch"],"c":0,"e":"An electrostatic discharge (ESD) mat protects chips and electronics from electrostatic discharges while you're installing the equipment. A fan keeps the chip cool after it has been installed. Thermal paste helps transfer heat from the CPU to the heat sink/fan after it has been installed. The orientation notch identifies which direction the CPU should face so that it seats correctly in the socket."},{"d":3,"q":"DDR4 RAM modules have how many pins?","o":["168","240","288","184"],"c":2,"e":"DDR4 RAM sticks have 288 pins. SDRAM has 168 pins, DDR has 184 pins, DDR2 and DDR3 have 240 pins."},{"d":3,"q":"Which RAM would typically be installed into a laptop computer?","o":["ECC","SPD RAM","SDRAM","SO-DIMMs"],"c":3,"e":"Laptops and other small form factor motherboards typically use SO-DIMM memory modules. ECC RAM is usually found in server-grade computers. SDRAM is an early generation of RAM technology but it is not specific to laptops. There is no such thing as SPD RAM."},{"d":3,"q":"Which types of RAM can function even if one of its memory chips fails?","o":["SO-DIMMs","ECC","Double-sided RAM","Dual-Channel RAM"],"c":1,"e":"Error correction code (ECC) RAM and parity RAM can function with a failed memory chip. SO-DIMMs are small outline (form factor) memory modules.  Dual-channel is technology that supports simultaneous access to multiple RAM modules. Double-sided RAM are RAM modules that are organized into 4 bits."},{"d":3,"q":"In what order should memory slots be filled?","o":["Whatever order the motherboard manual specifies","Closest to the CPU to farthest from the CPU","Alternate slots starting farthest from the CPU","Farthest from the CPU to closest to the CPU"],"c":0,"e":"The best practice is to follow whatever the motherboard manual specifies. Every motherboard is slightly different, so what works in one may not work in another."},{"d":3,"q":"What should a technician do to improve performance if the virtual memory file is constantly full?","o":["Increase the size of the virtual memory file","Add more RAM to the computer","Close some applications","The technician should do nothing; virtual memory works best when the file is full"],"c":1,"e":"The best answer for performance is to add RAM. It is generally recommended to let the operating system manage the size of the virtual memory file.  Closing applications is a short-term solution but eventually, the user will reopen them. Because virtual memory is slower than physical memory, using large amounts of virtual memory will slow the system down significantly."},{"d":3,"q":"You are using the CompTIA Troubleshooting Methodology to determine the cause of some faulty RAM. You theorize that one or more RAM modules might not be properly seated. You test the theory, and it seems like a probable assumption. What is your next step?","o":["Identify the problem by removing all hardware components from the motherboard","remove the RAM and replace with new modules","Verify full system functionality by rebooting the PC","Implement the solution by reseating the RAM"],"c":3,"e":"CompTIA’s Troubleshooting Methodology offers a simplified list of steps that can help you troubleshoot and resolve almost any issue that you will run in to. After establishing and testing a theory, the next step would be to establish a plan of action to resolve the problem and implement the solution. Since we surmised that our RAM sticks weren’t seated properly, the solution to the would be to reseat the RAM."},{"d":3,"q":"BIOS programs that enable hardware to function are called what?","o":["POST","Services","CMOS","Device drivers"],"c":2,"e":"Services are BIOS programs that make hardware functional. POST is a testing program in BIOS. CMOS is a type of memory chip. Device drivers make hardware function in an operating system."},{"d":3,"q":"Which is found in BIOS?","o":["CMOS battery","CPU","POST","Real-time clock"],"c":2,"e":"The Power On Self Test (POST) program is contained in the BIOS chip. The CPU is found on the motherboard, not within BIOS. The CMOS battery is not inside a chip. The real-time clock (RTC) is in the CMOS chip, not the BIOS chip."},{"d":5,"q":"What is the primary purpose of POST?","o":["It is an add-on card to test the computer","It applies power to the CPU","It enables hardware to function before the OS boots","It performs diagnostic tests before booting the operating system"],"c":3,"e":"POST is a program in the computer's BIOS chip that performs diagnostics prior to the computer booting an operating system. POST can send messages to a POST card but the card does not contain the POST program. A power supply provides power to the CPU. POST does not enable hardware, it tests hardware."},{"d":5,"q":"For which failures would you expect POST to issue beep codes?","o":["Video card","Missing keyboard","No CPU installed","No printer found"],"c":0,"e":"Beep codes are issued when error messages can't be displayed on the screen, thus a bad video card would cause beep codes. Missing keyboard, printers, and network connection failures can all be shown on a screen. The POST program will not run at all without a CPU installed (and thus would not generate a beep code)."},{"d":2,"q":"How would a technician start the system setup program?","o":["Touch the system setup button on the front panel of the computer","Press a certain key before the computer boots the operating system","Turn off the power switch and unplug the computer, then plug in the computer and press the power switch to automatically start the setup program","Enter the administrator password during bootup"],"c":1,"e":"Every computer has a certain key on the keyboard that must be pressed before the OS boots to launch the setup program. There is no automatic procedure or button to start the setup program. The administrator password is not entered until after the setup program has started."},{"d":2,"q":"To prevent random people from booting the OS, a technician should do what?","o":["Set a user password","Set an administrator password","Flash the BIOS chip","Remove the CMOS battery"],"c":0,"e":"A user password prevents the OS from booting until the password is entered. The administrator password prevents access to the setup program until the password is entered. Flashing the BIOS is for fixing bugs and adding features to the contents of the BIOS chip. Removing the CMOS battery might prevent the OS from booting, but it is not the best answer."},{"d":5,"q":"Which is more likely to cause a computer's reported time to fall behind?","o":["Earth is spinning more slowly","The computer was not programmed to recognize leap year","The CMOS battery is weak or failing","The wall voltage is too low"],"c":2,"e":"A weak or failed CMOS battery will slow the system clock and may cause other problems. Missing a leap year won't affect the computer's clock rate. Low wall voltage is adjusted in the power supply; if it is too low, the computer won't boot."},{"d":5,"q":"Which battery provides power to the RTC and CMOS chip?","o":["CR3022","CR2032","AA Battery","9 Volt Battery"],"c":1,"e":"CR2032 is the standard CMOS battery. The other choices are not normally used for CMOS in a computer."},{"d":3,"q":"The largest motherboard form factor is?","o":["ATX","Micro-ATX","ITX","Mini-ITX"],"c":0,"e":"In order of largest to smallest, the form factors are ATX, Micro-ATX, ITX, and Mini-ITX."},{"d":3,"q":"Which is true of an I/O shield?","o":["The I/O shield must be customized to fit the case","The I/O shield is customized to fit the motherboard I/O area","The dimensions of the I/O shield for a Micro-ATX motherboard are 9.6 inches by 9.6 inches","All I/O shields are standardized to fit all motherboard I/O areas"],"c":1,"e":"I/O shields are customized to fit the motherboard I/O area.  I/O shields have standard dimensions to fit standard form factor cases.  Micro-ATX motherboards are 9.6 x 9.6, not their I/O shields. Different motherboards have different I/O ports so it is impossible to create a one-size-fits-all I/O shield for different motherboards."},{"d":3,"q":"Which chip is typically found on modern motherboards?","o":["CMOS battery","Second bridge","Northbridge","Southbridge"],"c":3,"e":"The southbridge is typically found on modern motherboards. The functions of the old northbridge chip have been moved onto modern CPUs. The CMOS battery is mounted on the motherboard, but it is not a chip, it is a battery. Second bridge is a made-up term."},{"d":3,"q":"The job of the southbridge is to act as the interface between the CPU and what?","o":["Slow hardware","Fast hardware","RAM","Video card"],"c":0,"e":"The southbridge interfaces slow hardware such as hard drives and keyboards to the CPU. The CPU interacts directly with fast hardware including RAM and video cards."},{"d":3,"q":"Which is typically not found on a motherboard?","o":["PCIe slots","SATA cables","Voltage regulators","Power connectors"],"c":1,"e":"SATA cables attach to connectors on the motherboard, but they are not part of the motherboard. PCIe slots, voltage regulators, and power connectors are all found on motherboards."},{"d":3,"q":"The small, metal items that screw into a case and keep the motherboard from touching the case are called:","o":["Dongles","Standoffs","Slots","I/O shields"],"c":1,"e":"Standoffs are the screws used to keep the motherboard from touching the case so that there isn't an electric short, which could damage the components. Slots are for plugging in RAM and expansion cards. I/O shields protect the motherboard from dust and debris."},{"d":3,"q":"How can you protect your system from ESD while installing the motherboard?","o":["I/O shields","Antistatic wrist strap","Drinking hot coffee over your system","Use fans to blow cool air throughout the room"],"c":1,"e":"Antistatic (or ESD) wrist straps protect from ESD by dispersing the electricy generated by your body so it doesn't get dispersed into the components instead. I/O shields protect the motherboard from dust and debris. Drinking hot coffee over a system you're building is NEVER a good idea, as liquids can ruin electronic equipment. Using fans to blow cool air throughout the room isn't necessary at this point of your PC build, since none of the heat-producing componenets are installed and turned on yet."},{"d":3,"q":"Which must be done before installing a motherboard into a case?","o":["Install case fans","Install the I/O shield","Install the SATA cables","Install a video card into a PCIe slot"],"c":1,"e":"The I/O shield must be installed before the motherboard is installed; it won't fit after the board is in place. Case fans and SATA cables can be installed at any time. Installing a video card into the motherboard may make it challenging or impossible to install the motherboard into the case."},{"d":3,"q":"A power supply with optional cable plug-ins is known as a what?","o":["Soldered power supply","Option power supply","Flex power supply","Modular power supply"],"c":3,"e":"A modular power supply simplifies cable management by enabling you to add and remove optional plug-in cables as needed to power components. Option power supply is a made-up term. A Flex power supply is a small-form-factor power supply. A soldered power supply has all of its power cables soldered to the power supply unit (PSU)."},{"d":3,"q":"What does the on/off switch on a power supply do?","o":["Provides wall power to the power supply","Turns on the computer","Applies power to the \"power good\" wire","Nothing; power supplies autodetect power and turn on or off accordingly"],"c":0,"e":"It allows power to flow from the plug into the power supply. The computer has its own on/off switch. The power supply powers the \"power good\" wire (if the power is good) but the power supply switch does not do this directly. Power supplies (mostly) do not autodetect power and then react."},{"d":3,"q":"Which is a primary characteristic to be considered when choosing a power supply?","o":["Cable lengths","Efficiency","UPS compatibility","Power sag rating"],"c":1,"e":"Efficiency is a major consideration. Cable length is important, but most power cables are of sufficient length and don't typically need to be measured or checked. Power supplies do not have a sag rating. UPS compatibility is not a real specification."},{"d":3,"q":"Normal vacuums are dangerous to use inside of a PC due to their ability to:","o":["Generate loud noises which interferes with productivity","Build up static electricity","Scrub off thermal paste with the brush nozzle","Accidentally suck up capacitors and other components"],"c":1,"e":"Vacuums generate a lot of static electricity, specifically on the plastic areas of the device, including the nozzle. While niche anti-static PC vacuums exist, it is always best to use canned air to blow dust out of your PC."},{"d":3,"q":"A client’s PC will no longer boot up. You suspect the PSU is the cause. Which of these actions would be appropriate to take to resolve the issue?","o":["Practice proper power handling and then double check all connectors and cables","Verify functionality with a power supply tester","Swap the PSU for a known working one","All of the above"],"c":3,"e":"We always want to practice proper power handling, especially when dealing with the source of the power, our PSU. Power supply testers can be used to test a PSU and verify that it is functioning as intended. Many technicians keep spares of common components such as PSUs, so that they can swap a known working one into the system and test their theory of probable causation."},{"d":3,"q":"Mass storage is organized into __________?","o":["Gibibytes","LBAs","Pages","Gigabytes"],"c":1,"e":"Storage is organized into Logical Blocks (LBAs). Gigabytes and Gibibytes describe capacity, not organizational structure. Pages are the organizational structure of SSDs but not of all mass storage devices."},{"d":3,"q":"Which does NOT describe a mass storage device?","o":["Optical drive","M.1 drive","Magnetic disk","SSD"],"c":1,"e":"An M.1 drive is not a mass storage device; it is a made-up term that closely resembles the M.2 form factor. Optical drives, magnetic drives, and SSDs are all mass storage."},{"d":3,"q":"Which is a standard command and connection standard for mass storage devices?","o":["ATA","LBA","2.5\" form factor","3.5\" form factor"],"c":0,"e":"Advanced Technology Attachment (ATA) is a command and connection standard for mass storage devices. Form factors are not command or connection standards. LBA is an organization structure for mass storage devices."},{"d":3,"q":"SATA drives use how many wires to transfer data to and from the computer?","o":["8","4","2","1"],"c":3,"e":"SATA is a serial interface; all data moves in sequence (serial) over a single wire. SATA does not use 2, 4, or 8 wires to transfer data."},{"d":3,"q":"SSDs are organized into logical blocks, but their memory storage cells are called what?","o":["Sectors","Slots","Pages","Sockets"],"c":2,"e":"SSD memory cells are called pages. Magnetic drive storage units are called sectors. Slots and sockets are not terms to describe storage units."},{"d":3,"q":"Which interface is the fastest?","o":["SATA","SCSI","NVMe","PATA"],"c":2,"e":"NVMe uses PCIe lanes and is the fastest of these interface choices. PATA is the slowest; SATA and SCSI speeds fall between NVMe and PATA."},{"d":3,"q":"Combine SCSI with SATA to get ____________?","o":["SSCSI","SAS","M.2","SASI"],"c":1,"e":"Serial Attached SCSI (SAS) uses the SATA connector with the SCSI command language. M.2 is a connector interface and form factor. SSCSI and SASI are made up terms."},{"d":3,"q":"Running SCSI commands over Ethernet is called __________?","o":["iSCSI","SCSIi","eSCSI","SCSIe"],"c":0,"e":"iSCSI uses SCSI commands sent over Ethernet. SCSIi, eSCSI, and SCSIe are made up terms."},{"d":3,"q":"What is the minimum number of drives to perform RAID 5?","o":["2","3","4","5"],"c":1,"e":"It takes a minimum of three drives to create a RAID 5 array."},{"d":3,"q":"What is the maximum number of drive failures under RAID 6 at which the array will still function?","o":["0","1","2","3"],"c":2,"e":"A RAID 6 array will function with up to two drive failures."},{"d":3,"q":"Which is an example of a hardware RAID controller?","o":["Storage Spaces","Dedicated expansion card","Dynamic disks","Basic disks"],"c":1,"e":"A dedicated RAID controller comes in the form of an expansion card. Storage Spaces is a Microsoft software RAID implementation. Dynamic and basic disks are not RAID controllers."},{"d":3,"q":"RAID 10 requires how many drives?","o":["4","3","2","8"],"c":0,"e":"RAID 10 requires 4 drives."},{"d":3,"q":"Which is NOT a Storage Solution RAID configuration?","o":["Parity","Simple","Two-way mirror","RAID 10"],"c":3,"e":"Storage Spaces does not have a RAID 10 configuration. Simple (JBOD), two-way mirror, and parity (RAID 5) are all supported configurations under Storage Spaces."},{"d":3,"q":"What operates a software RAID solution?","o":["A RAID expansion card","A RAID controller built into the motherboard","The OS and CPU","The drives in the array"],"c":2,"e":"Software RAID is controlled by the operating system and the CPU. RAID expansion cards and motherboard-based RAID controllers are examples of hardware RAID. Drives don't have built-in RAID controllers."},{"d":3,"q":"What kind of chip holds a BitLocker key?","o":["TPM","MPT","TMP","PTM"],"c":0,"e":"A Trusted Platform Module (TPM) chip holds a BitLocker key. The rest are made-up terms."},{"d":5,"q":"Which is most likely the result of a corrupted operating system?","o":["The system attempts to boot from the wrong device","Slow performance","The hard drive makes a loud clicking noise","Continuous rebooting"],"c":3,"e":"Of the choices here, the most likely result of a corrupt operating system is continuous reboots. Boot order is set in the UEFI/BIOS system setup utility. A corrupt OS can cause crashes and reboots, not slow performance. Hard drive clicking comes from a mechanical failure inside the hard drive."},{"d":1,"q":"Which is not a valid USB speed?","o":["12 Mbps","480 Mbps","5 Gbps","1.1 Gbps"],"c":3,"e":"1.1 Gbps is not a valid USB speed. USB 1.1 Full Speed runs at 12 Mbps. USB 2.0 Hi Speed runs at 480 Mbps. USB 3 and 3.1 Gen 1 run at 5 Gbps (SuperSpeed)."},{"d":1,"q":"Each version of USB in a computer has its own what?","o":["USB hub","USB controller","USB peripheral","USB Type-B connector"],"c":1,"e":"Each version of USB in a computer has its own USB controller which is then connected to a USB hub. USB Type-B connectors connect to a downstream peripheral (such as a printer). A USB hub is a circuit or device with one or more upstream USB ports. Each version of USB does not have its own peripheral."},{"d":1,"q":"Most USB peripherals already have a what?","o":["Windows driver","USB lock","HID interface","Lightning connector"],"c":0,"e":"Windows comes with drivers for many common USB devices. A USB lock is an unpowered physical plug that secures open USB ports on a computer, not part of a USB peripheral. There is no such thing as an HID interface. USB devices come with USB connectors, not Lightning connectors."},{"d":3,"q":"Which is not a valid Thunderbolt speed?","o":["10 Gbps","20 Gbps","30 Gbps","40 Gbps"],"c":2,"e":"30 Gbps is not a valid Thunderbolt speed. Thunderbolt 1 runs at 10 Gbps, Thunderbolt 2 runs at 20 Gbps, and Thunderbolt 3 runs at 40 Gbps."},{"d":3,"q":"Which is a valid Compact Disc capacity?","o":["74 megabytes","74 minutes","80 megabytes","4.37 gigabytes"],"c":1,"e":"74 minutes is a valid CD capacity. The other values are not valid for CDs."},{"d":3,"q":"The term peripheral refers to both ______ and _______ devices.","o":["digital, analog","input, output","real, virtual","serial, DHCP"],"c":1,"e":"Peripheral is a term used to describe any and all input and output devices that can be connected to a computer. Things like monitors and printers are peripherals that output data, while keyboards and webcams are peripherals that input data."},{"d":3,"q":"Videoconferencing software allows viewing of remote desktops through a feature known as _____________.","o":["pixelated productivity","remote ready","world workgroup","screen sharing"],"c":3,"e":"Screen sharing is a fantastic feature included in most video conferencing tools that allows us to view and sometimes interact with another user’s desktop. It is highly useful when someone needs to display and collaborate information with many users at once. The other terms are made up."},{"d":3,"q":"Modern GPUs are installed in a _____ slot, which enables high speed communication between the GPU, the CPU, and RAM.","o":["PSU","PCIe","PCI","AGP"],"c":1,"e":"The Peripheral Component Interconnect Express (PCIe) slot enables high speed communication between GPUs, the CPU, and RAM. PCIe slots come in multiple size formats, known as lanes, and are denoted as x1, x4, x8, and x16 accordingly. A power supply unit (PSU) supplies power to the system. PCI is an older standard. AGP is a made-up term."},{"d":3,"q":"Which is a monitor backlight technology?","o":["LCD","LED","OLED","Nit"],"c":1,"e":"LEDs are a monitor backlight technology. LCDs don't make their own light (thus the need for a backlight). OLEDs make their own light (they don't need a backlight). Nit is a unit used to measure monitor brightness."},{"d":3,"q":"Which display technology uses moving mirrors?","o":["CCFL","RGB","DLP","LCD"],"c":2,"e":"DLP uses tiny, moving mirrors to create the projected image. CCFL is a back lighting technology. Red, green, and blue (RGB) are the subpixel colors. A liquid crystal display (LCD) contains liquid crystal that changes opacity."},{"d":3,"q":"A CPU with a built-in graphics processor is a what?","o":["DVI","APU","VGA","GPU"],"c":1,"e":"An APU includes a CPU and GPU on the same chip. VGA and DVI are video connectors. A graphics processing unit (GPU) can refer to either the core graphics processor or a standalone video card."},{"d":3,"q":"Which is not a task performed in Windows when installing a video card?","o":["Adjust PCIe power","Adjust font size","Update drivers","Set resolution to native"],"c":0,"e":"PCIe power is not adjustable. All of the other tasks are performed in Windows as part of a video card installation."},{"d":5,"q":"Which is not a standard projector adjustment?","o":["Keystone","Pincushion","Skew","Threading"],"c":3,"e":"Threading is not a projector adjustment. Keystone, skew and pincushion are all standard projector adjustments."},{"d":2,"q":"What goes at the end of an Ethernet frame?","o":["FCS","Destination MAC","Source MAC","Data"],"c":0,"e":"The frame check sequence (FCS) goes at the end of an Ethernet frame. In order, an Ethernet frame includes the destination MAC addresses, the source MAC address, the data payload, and finally the FCS."},{"d":2,"q":"MAC addresses are made up of how many bits?","o":["24","48","64","128"],"c":1,"e":"MAC addresses are made up of 48 bits. The other answers are incorrect."},{"d":2,"q":"Which device retransmits any inbound message out all of its other ports?","o":["Switch","Router","Hub","Smart Repeater"],"c":2,"e":"A hub repeats inbound traffic out all of its other ports. Switches only retransmit data out the port that the intended receiver is connected to. Routers forward traffic to remote networks as required. Smart repeater is an unofficial term for a switch."},{"d":2,"q":"How does a switch know the MAC addresses of connected devices?","o":["Switches don't know MAC addresses","Switches query each connected host","An administrator must program the MAC-to-port table","The switch learns the addresses by watching frames"],"c":3,"e":"Switches watch all inbound frames and learn MAC addresses from them. Switches definitely need to know MAC addresses, which they learn automatically without needing to query hosts or be manually programmed."},{"d":2,"q":"How are WANs identified?","o":["Logical addresses","Physical addresses","MAC addresses","Ethernet address"],"c":0,"e":"Networks are identified by logical addresses (IP addresses). Physical, MAC, and Ethernet addresses are all different names for the same thing."},{"d":2,"q":"Which device forwards data from one network to another?","o":["Hub","Switch","e-mail","Router"],"c":3,"e":"A router forwards network traffic from one network to another. Switches and hubs transmit traffic within a LAN. e-mail may send data from one network to another but it is an application/protocol, not a device."},{"d":2,"q":"Which is not a network cable type?","o":["Coaxial","Plenum","UTP","STP"],"c":1,"e":"Plenum describes any type of cable with a fire-resistant jacket. Coax, unshielded twisted pair (UTP) and shielded twisted pair (STP) are all types of network cable."},{"d":2,"q":"Multimode fiber optic cables use what for their light source?","o":["Lasers","Infrared light","LEDs","Halogen bulbs"],"c":2,"e":"Multimode fiber cables use LEDs to generate light pulses. The other answers are incorrect."},{"d":2,"q":"How many pairs of wires are in UTP Ethernet cables?","o":["2","3","4","8"],"c":2,"e":"UTP Ethernet cables have four pairs of wires. The other choices are incorrect."},{"d":2,"q":"Which is the best tool to identify a specific cable within a bundle of cables?","o":["Fox and Hound","TDR","Continuity tester","Punch down tool"],"c":0,"e":"A tone probe and tone generator, also called a Fox and Hound, can easily identify a specific cable within a bundle. Neither a TDR nor a continuity tester can identify a specific cable in a bundle. A punch down tool is not a diagnostic tool."},{"d":2,"q":"Solid-core cabling is best used where?","o":["To connect a switch to a patch bay in a patch panel","To connect a computer to a wall jack","To connect distant locations with horizontal runs and drops inside walls and plenum spaces","To connect rarely-moved office equipment such as printers and copiers"],"c":2,"e":"Solid-core cable is used in walls and horizontal runs because it is good for long runs and is not exposed to frequent bending. It is not used in environments where frequent bending occurs such as in patch panels, workspaces, or anywhere that it will be flexed regularly by people handling, stepping on, or tripping over it."},{"d":2,"q":"Which do link lights not normally indicate?","o":["Connection/link","Duplex status","Speed","Activity"],"c":1,"e":"Link lights do not normally indicate duplex status. They do show link/connection status, indicate connection speed, and show activity."},{"d":2,"q":"Wake-on-LAN is triggered by what?","o":["Magic bullet","Magic frame","Magic message","Magic packet"],"c":3,"e":"When supported, a magic packet triggers Wake-on-LAN. The other choices are incorrect."},{"d":2,"q":"A Class A IP address has how many locked octets?","o":["One","Two","Three","Four"],"c":0,"e":"The first octet of a Class A address, the network address, is locked. The other choices are incorrect."},{"d":2,"q":"How many bits are in an IPv6 address?","o":["32","64","128","256"],"c":2,"e":"IPv6 addresses are 128 bits long. IPv4 address are 32 bits long. No IP address versions are 64 or 256 bits long."},{"d":2,"q":"Which service uses port 445?","o":["HTTPS","SMB","IMAP","SLP"],"c":1,"e":"SMB uses port 445. HTTPS uses port 443. IMAP uses port 143. SLP uses port 427."},{"d":2,"q":"What is the maximum number of characters in an FQDN?","o":["128 (including dots)","128 (not including dots)","255 (including dots)","255 (not including dots)"],"c":2,"e":"Fully-qualified domain names (FQDNs) can have up to 255 characters, including dots. The other choices are not correct."},{"d":2,"q":"Which is not a Wi-Fi capable device?","o":["WAP","Switch","Smartphone","Tablet"],"c":1,"e":"A switch is a hard-wired network device. WAPs, smartphones, and tablets are all Wi-Fi capable."},{"d":2,"q":"Which 802.11 standard runs on 5GHz?","o":["802.11a","802.11b","802.11g","802.11c"],"c":0,"e":"802.11a runs on 5GHz. 802.11b and 802.11g run on 2.4GHz. 802.11c is not a Wi-Fi standard."},{"d":2,"q":"Which is not true of wireless mesh networks?","o":["Mesh networks have a single base station","Mesh networks are best for large enterprise networks","Mesh networks have one or more beacon/satellite stations","Mesh networks provide wide coverage in homes and small offices"],"c":1,"e":"Mesh networks don't provide the customized configuration required for enterprise-sized networks. All of the other statements are true of wireless mesh networks."},{"d":3,"q":"If you spot a WAP on the ceiling of a large room with no obvious power outlet nearby, how is it most-likely powered?","o":["PoE","RADIUS","Battery","Solar"],"c":0,"e":"Power over Ethernet is a common way to provide power to a WAP. RADIUS is an authentication protocol. Battery and solar power have limited use for powering a WAP mounted in a hard-to-reach location indoors."},{"d":1,"q":"Which is not a wireless radio technology found in computers, tablets, or phones?","o":["Infrared","Bluetooth","RFID","NFC"],"c":0,"e":"Infrared is a rarely-used wireless technology that communicates with infrared light, not radio waves. Bluetooth, RFID and NFC are all wireless radio technologies."},{"d":2,"q":"Which is most-likely to prevent a device from connecting to a previously-used Wi-Fi network?","o":["The antenna(s) are poorly oriented","The SSID has changed","Too many devices are accessing the WAP","The WAP is disconnected from the Internet"],"c":1,"e":"The most-likely answer is that the SSID changed. Poor antenna orientation may reduce speed or range. Too many devices using the WAP are likely to cause low or intermittent connectivity. Even if a WAP is disconnected from the Internet, devices can still connect to it."},{"d":2,"q":"Which firewall exception must be enabled on a client to connect to a webserver?","o":["Port 143 (inbound)","Port 143 (outbound)","Port 80 (inbound)","Port 80 (outbound)"],"c":3,"e":"The client (the system running the browser) must allow outbound traffic on port 80. Inbound port 80 traffic should be blocked on the web client. Port 143 is used for IMAP; it has nothing to do with web servers or clients."},{"d":2,"q":"Which is not an e-mail protocol port?","o":["25","110","143","443"],"c":3,"e":"Port 443 is for HTTPS, which is not an e-mail protocol. Port 25 is for the Simple Mail Transfer Protocol (SMTP), port 110 is for the Post Office Protocol (POP/POP3) ,and port 143 is for the Internet Message Access Protocol (IMAP)."},{"d":2,"q":"Which is not a wireless technology used in IoT?","o":["Ethernet","802.11","Zigbee","Z-wave"],"c":0,"e":"Ethernet is not wireless (and most IoT devices don't have an Ethernet port). 802.11/Wi-Fi, Zigbee, and Z-wave are all common wireless IoT connection schemes."},{"d":3,"q":"A virtual machine is a _______ OS running within a ________ OS.","o":["hypervisor, host","guest, hypervisor","guest, host","host, guest"],"c":2,"e":"A VM is a guest operating system that runs within a host operating system. The hypervisor manages the guest OS and the interface between the guest OS and the shared physical hardware of the host OS."},{"d":4,"q":"Which is not needed to install a virtual machine?","o":["Hypervisor","Guest OS .iso file","Virtual disk","Optical drive"],"c":3,"e":"A physical optical drive isn't necessary; the hypervisor can create a virtual optical drive from the guest OS .iso file. The installation needs a hypervisor, a guest OS .iso file and a virtual disk."},{"d":4,"q":"Which is not a good uses of a virtual machine?","o":["Practice administering different operating systems","Experiment with multiple drives without purchasing hardware","Configure virtual networking","Install 3D games"],"c":3,"e":"While many VMs support 3D technology, resource sharing with the host OS and other VMs limits a guest's 3D performance. VMs are a great way to practice administering different operating systems, configure and experiment with virtual networking, and experiment with multiple drives by using virtual disks instead of purchasing more physical hard drives."},{"d":4,"q":"Which is not a cloud ownership category?","o":["Corporate","Private","Public","Hybrid"],"c":0,"e":"There is no cloud ownership category known as a corporate cloud. While most of the physical equipment that makes up the cloud is owned by corporations, cloud ownership models focus on who is able to use services provided by a given cloud. Public, private and hybrid are each cloud ownership models."},{"d":1,"q":"Which is a good technique to use when working inside a laptop?","o":["Store all removed screws and hardware in a bowl to avoid losing them","Keep the battery attached so you can test as you go","Review a disassembly guide or manual","Use a butter knife to separate case halves because it is dull but strong"],"c":2,"e":"Review the disassembly process. Keeping all hardware and components in a single container can make small parts tough to find and identify when reassembling the computer. The battery should be removed or disconnected to avoid short circuits while working inside the computer. Avoid using tools that are not specifically designed to perform disassembly tasks."},{"d":1,"q":"Which technique is most helpful when reassembling a laptop?","o":["Consult pictures taken when disassembling the laptop","Use larger replacement screws than the ones removed","Upgrade all upgradeable components during reassembly","Have a second laptop of the same model to review during reassembly"],"c":0,"e":"Pictures are the easiest and most practical tool to help with reassembly. Use the original hardware to reassemble a laptop. Upgrading during reassembly is a good idea but it won't help the reassembly process. It is likely impractical to have an identical laptop to reference during reassembly."},{"d":1,"q":"Which component usually takes the most disassembly to replace in a laptop?","o":["RAM","Battery","Hard drive","CPU"],"c":3,"e":"The CPU is usually buried deep inside a laptop. RAM, batteries, and hard drives are usually easily accessible."},{"d":1,"q":"Laptop monitors can be challenging to work on for what reason?","o":["They use high power","They are sealed","They have built-in batteries","They use chemical backlighting"],"c":1,"e":"Laptop displays tend to be sealed. Laptop displays do not have built-in batteries. Laptop displays use the same backlighting technology as desktop displays: LEDs and CCFLs. Laptop displays generally use less power than desktop displays of the same size."},{"d":1,"q":"Which is not true of a mobile device?","o":["It is a single, sealed unit","It runs a mobile operating system","It supports wireless connectivity","It can be easily serviced and upgraded"],"c":3,"e":"Being sealed, mobile devices are not easily serviceable and they are not designed to be upgraded. The other choices are true of mobile devices."},{"d":1,"q":"Which is not a wired connection for a smart phone?","o":["Lightning","Ethernet","Micro USB","USB C"],"c":1,"e":"Smart phones do not come with Ethernet connectors. Smart phones commonly have Lightning, micro USB, or USB Type-C connectors."},{"d":1,"q":"Where can users get Android apps?","o":["Play Store","App Store","Microsoft Store","Steam store"],"c":0,"e":"Google Play is the primary source for Android apps. The Apple App Store provides access to iOS apps. Neither the Microsoft Store nor Steam distribute Android apps."},{"d":1,"q":"Which is not a mobile device maintenance practice?","o":["Update the PRL","Update the firmware","Back up the data and apps","Update the APK files"],"c":3,"e":"Android Package (APK) files contain installable applications; installing applications isn't part of the normal mobile-device maintenance process. PRL updates, firmware updates, and backups are all mobile device maintenance techniques."},{"d":1,"q":"Which port number is not used by an encrypted e-mail protocol?","o":["143","993","587","995"],"c":0,"e":"143 is the unencrypted IMAP port. 993 is the encrypted IMAP port. 587 is one of the encrypted SMTP port numbers. 995 is the encrypted POP3 port."},{"d":1,"q":"Synchronization is least concerned with which choice?","o":["Contacts","Calendar","Backups","Files"],"c":2,"e":"Backups are only in sync at the instant of backup - after that, the original source may undergo changes until the next backup session. Synchronization is concerned with keeping current, identical copies of contacts, calendar events and files across multiple devices."},{"d":1,"q":"Which is not a typical Android screen lock option?","o":["Swipe","Token","Pattern","PIN"],"c":1,"e":"Tokens are not used to unlock Android screens. Swipes, patterns and pins are commonly used to unlock screens."},{"d":1,"q":"Which is least likely solution for a dim mobile device screen?","o":["Charge the battery","Adjust the display's brightness","Enable automatic brightness adjustments","Replace the display or its backlight"],"c":0,"e":"A dead or low battery that is low enough to cause a dim display will likely prevent the device from functioning at all. Adjusting brightness, enabling automatic brightness adjustments, or replacing a bad display/backlight may all fix a dim screen."},{"d":3,"q":"What material do laser printers use to create the final printed image?","o":["Heated thermal plastic","Heat","Ink","Toner"],"c":3,"e":"Laser printers create the final printed image by fusing toner to the page. The other choices are incorrect."},{"d":3,"q":"Which letters represent the ink colors normally used in color inkjet printers?","o":["RGB, Bk, Wh","RGBKW","RGB","CMYK"],"c":3,"e":"Inkjet printers typically use cyan, magenta, yellow and black (CMYK) ink. Red, green, and blue (RGB) are the colors of light used by monitors. White ink is seldom used in inkjet printers."},{"d":3,"q":"Which is not part of the impact-printing process?","o":["Pins pop out of the printhead","Pre-heat the printhead","Pins strike an inked ribbon","Inked ribbon makes contact with paper"],"c":1,"e":"The printhead of a dot matrix (impact) printer does not require heating. All of the other options are part of the process of impact printing with a dot matrix printer."},{"d":3,"q":"Which is not a maintenance task for thermal printers?","o":["Replace the paper","Clean the printhead","Replace the fuser","Blow out any debris"],"c":2,"e":"Thermal printers do not have fusers. Replace paper as needed. Clean the printheads and blow out debris regularly."},{"d":3,"q":"Connecting a local printer to a computer is usually done with what kind of connection?","o":["USB","Serial","Ethernet","Infrared"],"c":0,"e":"Most printers have a USB port for connecting to a computer. Some niche industry printers use serial ports. Many printers have an Ethernet port, but they are normally used as network printers, not directly attached to a local computer. Infrared interfaces are not found on printers."},{"d":3,"q":"Which is not true of shared printers?","o":["To access a shared printer, create a local printer and then convert it to shared","To create a shared printer, enable file and printer sharing","To create a shared printer, give it a share name","To access a shared printer, add a printer and then select the shared printer"],"c":0,"e":"A shared printer cannot be accessed by creating a local printer. The other statements about shared printers are true."},{"d":3,"q":"Which is not part of the 3D-printing process?","o":["Create the 3D image","Create the slice file","Print a 2D test","Preheat the extruder and bed"],"c":2,"e":"Printing a 2D test is not part of the 3D-printing process. All of the other choices are part of the 3D-printing process."},{"d":5,"q":"Using CompTIA's troubleshooting methodology, what comes immediately after establishing a theory of probable cause?","o":["Document the findings","Test the theory to determine the cause","Identify the problem","Implement preventive measures"],"c":1,"e":"After forming a theory you test it to confirm or rule out the cause. Identifying the problem comes first, and documenting and preventive measures come at the end."},{"d":5,"q":"Before making changes to fix a user's computer, what should a technician do first to protect the user?","o":["Reinstall the operating system","Back up the data","Disable the antivirus","Update the BIOS"],"c":1,"e":"Backing up data before changes protects the user if something goes wrong. The other actions are risky or unnecessary as a first step."},{"d":5,"q":"A problem is clearly beyond a technician's skill and authority to resolve. What is the most appropriate action?","o":["Guess at a fix to save time","Tell the customer it cannot be fixed","Escalate the issue","Rebuild the system from scratch"],"c":2,"e":"Escalating gets the customer a faster, correct resolution and is the professional choice. Guessing, giving up, or a needless rebuild are all poor options."},{"d":3,"q":"Which tool best protects internal components from electrostatic discharge while a technician works inside a PC?","o":["Multimeter","ESD wrist strap","Power supply tester","Torx screwdriver"],"c":1,"e":"An ESD wrist strap (with an anti-static mat) safely equalizes charge to prevent static damage. A multimeter and PSU tester measure electrical values, and a screwdriver is for fasteners."},{"d":3,"q":"A technician needs to confirm whether a wall outlet is supplying the correct voltage. Which tool should they use?","o":["Loopback plug","Multimeter","Cable tester","POST card"],"c":1,"e":"A multimeter measures voltage (and continuity). A loopback plug tests ports, a cable tester checks network wiring, and a POST card diagnoses boot/POST errors."},{"d":2,"q":"What field appears at the end of an Ethernet frame and is used to detect transmission errors?","o":["Preamble","Source MAC address","Frame Check Sequence (FCS)","Payload"],"c":2,"e":"The FCS (Frame Check Sequence) is a CRC checksum at the end of the frame; the receiver recalculates it to detect corruption. The preamble is at the start, and the MAC address and payload sit in the middle."},{"d":2,"q":"At which OSI layer do MAC addresses and Ethernet frames operate?","o":["Layer 1 - Physical","Layer 2 - Data Link","Layer 3 - Network","Layer 4 - Transport"],"c":1,"e":"MAC addressing and frames are Layer 2 (Data Link). Layer 1 is the physical medium, Layer 3 handles IP/routing, and Layer 4 handles TCP/UDP ports."},{"d":2,"q":"How many layers are in the OSI model?","o":["Four","Five","Seven","Eight"],"c":2,"e":"The OSI model has seven layers: Physical, Data Link, Network, Transport, Session, Presentation, and Application. The TCP/IP model condenses these into four."},{"d":2,"q":"The FCS in an Ethernet frame relies on what kind of calculation to check integrity?","o":["Encryption key","Cyclic redundancy check (CRC)","Subnet mask","MAC lookup"],"c":1,"e":"The FCS uses a CRC (cyclic redundancy check). The sender computes it and the receiver recomputes it; a mismatch means the frame was corrupted and is discarded."}];

 {t:"OS types, file systems & lifecycle", h:`
  <p><b>Workstation OSes:</b> Windows, macOS, and Linux. <b>Mobile:</b> iOS and Android (Android is built on a Linux base). <b>Chrome OS</b> is a lightweight, web-centric OS. Know <b>workstation vs. server</b> and the idea of <b>cell-phone/tablet</b> vs. smart-device OSes.</p>
  <p><b>File systems to recognize:</b></p>
  <table class="ports">
   <tr><td class="mono">NTFS</td><td>Windows default — permissions, encryption (EFS), journaling, large files</td></tr>
   <tr><td class="mono">FAT32</td><td>old/compatible — 4&nbsp;GB file-size limit, no permissions</td></tr>
   <tr><td class="mono">exFAT</td><td>cross-platform for large flash drives/SD cards, no 4&nbsp;GB limit</td></tr>
   <tr><td class="mono">ext4</td><td>common Linux file system</td></tr>
   <tr><td class="mono">APFS</td><td>modern macOS file system</td></tr>
  </table>
  <p><b>Lifecycle:</b> software has an <span class="kw">end-of-life (EOL)</span> date; once support ends it stops getting security patches and becomes a risk. Always check <b>compatibility</b> (hardware and app) before deploying or upgrading.</p>`},
 {t:"Windows editions & differences", h:`
  <p>Editions you must compare: <span class="kw">Home</span>, <span class="kw">Pro</span>, <span class="kw">Pro for Workstations</span>, and <span class="kw">Enterprise</span>. Feature differences that show up on the exam:</p>
  <ul>
   <li><b>Domain vs. workgroup</b> — only Pro and above can join a domain (Active Directory).</li>
   <li><b>RDP host</b> — Pro and above can <i>host</i> Remote Desktop; Home can only connect out.</li>
   <li><b>BitLocker</b> drive encryption — Pro and above.</li>
   <li><b>gpedit</b> (Local Group Policy Editor) — Pro and above.</li>
   <li><b>RAM support limits</b> — Home supports less maximum RAM than Pro/Enterprise.</li>
  </ul>
  <p><b>Upgrade paths:</b> an <span class="kw">in-place upgrade</span> keeps apps/files; a <span class="kw">clean install</span> wipes and starts fresh. Windows 11 hardware requirements notably include <span class="kw">TPM 2.0</span> and <span class="kw">UEFI</span> Secure Boot.</p>`},
 {t:"Windows tools & MMC snap-ins", h:`
  <p><b>Task Manager</b> tabs: Processes, Performance, Startup, Users, Services. It's your first stop for a hung app or a resource hog.</p>
  <p><b>MMC snap-ins</b> (launch by their command name):</p>
  <table class="ports">
   <tr><td class="mono">eventvwr</td><td>Event Viewer — system/app logs</td></tr>
   <tr><td class="mono">diskmgmt</td><td>Disk Management — partitions, drive letters, format</td></tr>
   <tr><td class="mono">taskschd</td><td>Task Scheduler — run tasks on a trigger</td></tr>
   <tr><td class="mono">devmgmt</td><td>Device Manager — drivers/hardware</td></tr>
   <tr><td class="mono">lusrmgr</td><td>Local Users and Groups</td></tr>
   <tr><td class="mono">perfmon</td><td>Performance Monitor</td></tr>
   <tr><td class="mono">certmgr</td><td>Certificate Manager</td></tr>
   <tr><td class="mono">gpedit</td><td>Local Group Policy Editor (Pro+)</td></tr>
  </table>
  <p>Other tools: <span class="mono">msconfig</span> (startup/boot), <span class="mono">msinfo32</span> (system info), <span class="mono">dxdiag</span> (DirectX/graphics), <span class="mono">regedit</span> (registry — careful), and <span class="mono">resmon</span> (Resource Monitor).</p>`},
 {t:"Control Panel, Settings & admin consoles", h:`
  <p>Windows has two places to change settings — the modern <b>Settings</b> app and the legacy <b>Control Panel</b> — and the exam expects you to know which applet does what.</p>
  <p><b>Control Panel applets worth knowing:</b> Internet Options, Devices and Printers, Programs and Features (uninstall apps), Network and Sharing Center, Windows Defender Firewall, User Accounts, Power Options, File Explorer Options, Indexing Options, Sound, and Ease of Access (accessibility).</p>
  <p><b>Admin consoles:</b></p>
  <table class="ports">
   <tr><td class="mono">Computer Management</td><td>one console bundling Device Manager, Disk Management, Event Viewer, Users/Groups, Services</td></tr>
   <tr><td class="mono">Print Management</td><td>manage printers and print drivers across the system</td></tr>
   <tr><td class="mono">Data Sources (ODBC)</td><td>connect Windows apps to databases</td></tr>
   <tr><td class="mono">services.msc</td><td>start/stop/configure background services</td></tr>
  </table>`},
