/* ============ QUIZ ENGINE ============ */
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];} return a; }
function buildOrder(ids){ const Q=P().questions, o={}; ids.forEach(id=>{ o[id]=Q[id].o?shuffle(Q[id].o.map((_,i)=>i)):[]; }); return o; }
function startQuiz(){
  const QUESTIONS=P().questions;
  let pool = setupDomain==='mix' ? QUESTIONS.map((q,i)=>i) : qByDomain(+setupDomain).map(o=>o.i);
  pool = shuffle(pool).slice(0, setupLen);
  quiz={ phase, mode:'practice', domain:setupDomain, ids:pool, order:buildOrder(pool), cur:0, score:0, answered:false, missed:[], picks:{} };
  go('quiz');
}
function startWrong(){
  const pool=shuffle(prog().wrong.slice());
  if(!pool.length) return;
  quiz={ phase, mode:'wrong', domain:'wrong', ids:pool, order:buildOrder(pool), cur:0, score:0, answered:false, missed:[], picks:{} };
  go('quiz');
}
function viewQuiz(){
  const QUESTIONS=P().questions, DOMAINS=P().domains;
  const id=quiz.ids[quiz.cur], q=QUESTIONS[id];
  const cv=COLORVAR[q.d], dom=DOMAINS.find(x=>x.n===q.d);
  const pctW=(quiz.cur/quiz.ids.length*100);
  const isF=isFlash(q);
  if(isF){
    el(`
      <div class="qbar">
        <div class="progress"><i style="width:${pctW}%"></i></div>
        <span class="qcount">Q ${quiz.cur+1}/${quiz.ids.length}</span>
        <span class="qscore"><b>${quiz.score}</b> correct</span>
        ${quiz.mode==='exam'?'<span class="timer" id="timer">90:00</span>':''}
      </div>
      <span class="qtag" style="--dc:var(${cv})">Obj ${objectiveLabel(q)} · ${esc(dom.title)}</span>
      <div class="exam-note">Open-answer study card: think of the answer, then reveal it and self-grade.</div>
      <h2 class="question">${fmt(q.q)}</h2>
      <div id="flashwrap"><button class="btn primary" onclick="revealFlash()">Reveal answer</button></div>
      <div class="qfoot" id="qfoot"></div>
    `);
    quiz.answered=false;
    if(quiz.mode==='exam') startTimer(); else stopTimer();
    return;
  }
  const keys='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  const ord=(quiz.order&&quiz.order[id]) || q.o.map((_,i)=>i);
  const multi = Array.isArray(q.c);
  quiz.picks = quiz.picks || {};
  quiz.picks[id] = quiz.picks[id] || [];
  const opts=ord.map((origIdx,pos)=>`<button class="ans ${multi && quiz.picks[id].includes(origIdx)?'selpick':''}" data-i="${origIdx}" onclick="${multi?'toggleMulti':'answer'}(${origIdx})" style="--dc:var(${cv})">
    <span class="key">${keys[pos]}</span><span class="atext">${fmt(q.o[origIdx])}</span></button>`).join('');
  el(`
    <div class="qbar">
      <div class="progress"><i style="width:${pctW}%"></i></div>
      <span class="qcount">Q ${quiz.cur+1}/${quiz.ids.length}</span>
      <span class="qscore"><b>${quiz.score}</b> correct</span>
      ${quiz.mode==='exam'?'<span class="timer" id="timer">90:00</span>':''}
    </div>
    <span class="qtag" style="--dc:var(${cv})">Obj ${objectiveLabel(q)} · ${esc(dom.title)}</span>
    ${quiz.mode==='exam'?'<div class="exam-note">Exam Mode: no explanation is shown until your results. Pick the best answer and continue.</div>':''}
    ${multi?'<div class="exam-note">Select all correct answers, then check.</div>':''}
    <h2 class="question">${fmt(q.q)}</h2>
    <div class="answers" id="answers">${opts}</div>
    <div id="exwrap"></div>
    <div class="qfoot" id="qfoot">${multi?'<button class="btn primary" onclick="submitMulti()">Check answers →</button>':''}</div>
  `);

}
function revealFlash(){
  if(quiz.answered) return;
  const QUESTIONS=P().questions;
  const id=quiz.ids[quiz.cur], q=QUESTIONS[id], cv=COLORVAR[q.d];
  document.getElementById('flashwrap').innerHTML=`
    <div class="flashbox" style="--dc:var(${cv})">
      <div class="ft">Expected answer</div>
      <div class="fa">${fmt(q.a || q.e || '')}</div>
    </div>
    <div class="explain" style="--dc:var(${cv})">
      <div class="et">Explanation</div>${fmt(q.e || q.a || '')}
    </div>`;
  document.getElementById('qfoot').innerHTML=`
    <button class="btn" onclick="gradeFlash(false)">I missed it</button>
    <button class="btn primary" onclick="gradeFlash(true)">I knew it</button>`;
}
function gradeFlash(ok){
  if(quiz.answered) return; quiz.answered=true;
  const id=quiz.ids[quiz.cur], p=prog();
  if(ok){ quiz.score++; p.wrong=p.wrong.filter(x=>x!==id); }
  else { quiz.missed.push(id); if(!p.wrong.includes(id)) p.wrong.push(id); }
  store.write(allProg);
  const last = quiz.cur===quiz.ids.length-1;
  document.getElementById('qfoot').innerHTML=`<button class="btn primary" onclick="next()">${last?'See results →':'Next question →'}</button>`;
}

function answerText(q, list){
  if(isFlash(q)) return q.a || '';
  const vals=(Array.isArray(list)?list:[list]).filter(x=>Number.isInteger(x) && q.o && q.o[x]!==undefined).map(x=>q.o[x]);
  return vals.length ? vals.join('; ') : 'No answer selected';
}
function correctAnswerText(q){
  if(isFlash(q)) return q.a || '';
  const c=Array.isArray(q.c)?q.c:[q.c];
  return answerText(q,c);
}
function explanationHTML(q, pickList, ok, cv){
  const your=answerText(q,pickList);
  const correct=correctAnswerText(q);
  const body=q.e ? fmt(q.e) : 'No explanation was provided for this item.';
  return `<div class="explain" style="--dc:var(${cv})">
    <div class="et">${ok?'Correct':'Review'}</div>
    <div><b>Your answer:</b> ${fmt(your)}</div>
    <div><b>Correct answer:</b> ${fmt(correct)}</div>
    <div style="margin-top:10px"><b>Explanation:</b><br>${body}</div>
  </div>`;
}

function toggleMulti(i){
  if(quiz.answered) return;
  const id=quiz.ids[quiz.cur];
  quiz.picks = quiz.picks || {};
  const picks = quiz.picks[id] || [];
  const n = picks.indexOf(i);
  if(n>=0) picks.splice(n,1); else picks.push(i);
  quiz.picks[id]=picks;
  const b=document.querySelector('.ans[data-i="'+i+'"]');
  if(b) b.classList.toggle('selpick', picks.includes(i));
}
function sameSet(a,b){ a=a.slice().sort((x,y)=>x-y); b=b.slice().sort((x,y)=>x-y); return a.length===b.length && a.every((v,i)=>v===b[i]); }
function submitMulti(){
  const id=quiz.ids[quiz.cur];
  const picks=(quiz.picks&&quiz.picks[id])?quiz.picks[id].slice():[];
  if(!picks.length){ alert('Select at least one answer.'); return; }
  answer(picks);
}
function answer(i){
  if(quiz.answered) return; quiz.answered=true;
  const QUESTIONS=P().questions;
  const id=quiz.ids[quiz.cur], q=QUESTIONS[id], cv=COLORVAR[q.d];
  const btns=[...document.querySelectorAll('.ans')];
  btns.forEach(b=>b.disabled=true);
  const correctList=Array.isArray(q.c)?q.c.slice():[q.c];
  const pickList=Array.isArray(i)?i.slice():[i];
  const ok=sameSet(pickList, correctList);
  const p=prog();
  btns.forEach(b=>{
    const idx=+b.dataset.i;
    const picked=pickList.includes(idx), correct=correctList.includes(idx);
    b.classList.remove('selpick');
    if(correct) b.classList.add('correct');
    if(picked && !correct) b.classList.add('wrong');
  });
  if(ok){
    quiz.score++;
    p.wrong=p.wrong.filter(x=>x!==id);
  } else {
    quiz.missed.push(id);
    if(!p.wrong.includes(id)) p.wrong.push(id);
  }
  store.write(allProg);
  if(quiz.mode!=='exam'){
    document.getElementById('exwrap').innerHTML=explanationHTML(q, pickList, ok, cv);
  } else {
    document.getElementById('exwrap').innerHTML='';
  }
  const last = quiz.cur===quiz.ids.length-1;
  document.getElementById('qfoot').innerHTML=
    `<button class="btn primary" onclick="next()">${last?'See results →':'Next question →'}</button>`;
}
function next(){
  if(quiz.cur===quiz.ids.length-1){ finishQuiz(); }
  else { quiz.cur++; go('quiz'); }
}
function finishQuiz(){
  stopTimer();
  if(quiz.domain!=='mix' && quiz.domain!=='wrong' && quiz.domain!=='exam' && quiz.domain!=='weak'){
    const d=+quiz.domain, p=prog(), prev=p.best[d];
    const ratio=quiz.score/quiz.ids.length;
    if(!prev || ratio > prev.score/prev.total) p.best[d]={score:quiz.score,total:quiz.ids.length};
    store.write(allProg);
  }
  go('results');
}

/* ============ RESULTS ============ */
function viewResults(){
  const QUESTIONS=P().questions, DOMAINS=P().domains;
  const total=quiz.ids.length, score=quiz.score, pct=Math.round(score/total*100);
  const pass=pct>=75;
  const R=70,C=2*Math.PI*R, off=C*(1-score/total);
  const ringColor=pass?'var(--led)':'var(--wrong)';
  const counts={};
  quiz.ids.forEach(id=>{const d=QUESTIONS[id].d;counts[d]=counts[d]||{t:0,c:0};counts[d].t++;});
  quiz.ids.forEach(id=>{ if(!quiz.missed.includes(id)){const d=QUESTIONS[id].d;counts[d].c++;} });
  const rows=Object.keys(counts).sort().map(d=>{
    const dom=DOMAINS.find(x=>x.n==d),cv=COLORVAR[d],o=counts[d];
    return `<div class="brow" style="--dc:var(${cv})"><span class="bd"></span><span class="bn">${d}.0</span>
      <span class="btitle">${dom.title}</span><span class="bsc">${o.c}/${o.t}</span></div>`;
  }).join('');
  const msg = pct>=90?'Bench-ready. Excellent.':pct>=75?'Passing range — keep sharpening.':pct>=50?'Getting there. Re-read the weak domains.':'Early days. Work the lessons, then retry.';
  el(`
    <div class="result-hero">
      <svg class="ring" viewBox="0 0 160 160">
        <circle cx="80" cy="80" r="${R}" fill="none" stroke="var(--border)" stroke-width="12"/>
        <circle cx="80" cy="80" r="${R}" fill="none" stroke="${ringColor}" stroke-width="12" stroke-linecap="round"
          stroke-dasharray="${C}" stroke-dashoffset="${off}" transform="rotate(-90 80 80)"
          style="transition:stroke-dashoffset 1s ease"/>
        <text x="80" y="74" text-anchor="middle" font-family="Space Grotesk" font-size="34" font-weight="700" fill="var(--text)">${pct}%</text>
        <text x="80" y="96" text-anchor="middle" font-family="JetBrains Mono" font-size="11" fill="var(--muted)">${score} / ${total}</text>
      </svg>
      <h2>${score} of ${total} correct</h2>
      <p>${msg}</p>
      <div class="verdict ${pass?'pass':'fail'}">${pass?'▲ PASSING RANGE':'▼ BELOW 75%'}</div>
    </div>
    <div class="result-actions">
      <button class="btn primary" onclick="go('setup','${['wrong','exam','weak'].includes(quiz.domain)?'mix':quiz.domain}')">New quiz</button>
      ${quiz.missed.length?`<button class="btn" onclick="retryMissed()">Retry ${quiz.missed.length} missed</button>`:''}
      <button class="btn" onclick="go('home')">Home</button>
    </div>
    ${rows?`<div class="section-h"><h3>By domain</h3><div class="line"></div></div><div class="breakdown">${rows}</div>`:''}
    ${quiz.missed.length?missedReviewHtml():''}
  `);
}
function retryMissed(){
  const pool=shuffle(quiz.missed.slice());
  quiz={ phase, mode:'wrong', domain:quiz.domain, ids:pool, order:buildOrder(pool), cur:0, score:0, answered:false, missed:[], picks:{} };
  go('quiz');
}


function missedReviewHtml(){
  const Q=P().questions;
  const cards=quiz.missed.slice(0,12).map(id=>{
    const q=Q[id], correct=isFlash(q)?(q.a||''):Array.isArray(q.c)?q.c.map(i=>q.o[i]).join('; '):q.o[q.c];
    return `<div class="review-card"><div class="ra">Obj ${objectiveLabel(q)}</div><div class="rq">${fmt(q.q)}</div><div class="ra"><b>Correct answer:</b> ${fmt(correct)}</div><div><b>Explanation:</b><br>${fmt(q.e)}</div></div>`;
  }).join('');
  const more=quiz.missed.length>12?`<p style="color:var(--muted);font-size:13px">Showing 12 of ${quiz.missed.length} missed explanations. Retry missed to drill all of them.</p>`:'';
  return `<div class="section-h"><h3>Missed explanation review</h3><div class="line"></div></div><div class="review-list">${cards}</div>${more}`;
}

/* ============ PBQ DRILLS ============ */
let pbq=null;
function viewPBQList(){
  const cards=PBQS[phase].map((x,i)=>`<div class="pbq-card" onclick="startPBQ(${i})"><span class="eyebrow">${x.objective}</span><h4>${esc(x.title)}</h4><p>${esc(x.scenario)}</p></div>`).join('');
  el(`
    <button class="back" onclick="go('home')">← Home</button>
    <span class="eyebrow">${P().name} · PBQ-style drills</span>
    <h2 style="font-family:var(--display);font-size:28px;margin:8px 0 4px;letter-spacing:-.02em">Performance-style practice</h2>
    <p style="color:var(--muted);margin:0 0 8px">These are simplified browser drills, not a copy of the real exam interface. They train the same skill: applying facts in a scenario.</p>
    ${cards}
  `);
}
function startPBQ(i){ pbq={idx:i, picks:{}, checked:false}; go('pbq'); }
function viewPBQ(){
  const x=PBQS[phase][pbq.idx];
  const cv=COLORVAR[x.d]||'--led';
  const rows=x.items.map((it,i)=>{
    const opts=[''].concat(it.options).map(o=>`<option value="${esc(o)}" ${pbq.picks[i]===o?'selected':''}>${o?esc(o):'Choose...'}</option>`).join('');
    const cls=pbq.checked?(pbq.picks[i]===it.answer?'good':'bad'):'';
    return `<div class="pbq-row ${cls}" id="pbqrow${i}"><label>${esc(it.label)}</label><select onchange="pbqPick(${i},this.value)" ${pbq.checked?'disabled':''}>${opts}</select></div>`;
  }).join('');
  const score=pbq.checked?pbqScoreHtml(x):'';
  el(`
    <button class="back" onclick="go('pbqs')">← PBQ list</button>
    <span class="eyebrow">${x.objective}</span>
    <div class="lesson-card" style="--dc:var(${cv})">
      <h3>${esc(x.title)}</h3>
      <p>${esc(x.scenario)}</p>
      <p style="color:var(--muted)">${esc(x.prompt)}</p>
      <div>${rows}</div>
      ${score}
      <div class="lesson-foot">
        ${pbq.checked?`<button class="btn" onclick="startPBQ(${pbq.idx})">Retry drill</button><button class="btn primary" onclick="go('pbqs')">Choose another</button>`:`<button class="btn primary" onclick="checkPBQ()">Check answers →</button>`}
      </div>
    </div>
  `);
}
function pbqPick(i,v){ pbq.picks[i]=v; }
function checkPBQ(){ pbq.checked=true; go('pbq'); }
function pbqScoreHtml(x){
  let correct=0;
  const detail=x.items.map((it,i)=>{ const ok=pbq.picks[i]===it.answer; if(ok) correct++; return `<li><b>${esc(it.label)}</b>: ${ok?'correct':'answer = '+esc(it.answer)}. ${esc(it.explain)}</li>`; }).join('');
  return `<div class="pbq-score"><b>Score: ${correct}/${x.items.length}</b><ul>${detail}</ul></div>`;
}

/* ============ BOOT ============ */
document.getElementById('verBadge').textContent='v'+VERSION;
initTheme();
paintChrome();
footerCounts();
go('home');
</script>
